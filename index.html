        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }

        .btn-glass-purple { background: linear-gradient(135deg, rgba(168, 85, 247, 0.8), rgba(107, 33, 168, 0.8)); transition: 0.3s; }
        .tabs-container { position: relative; display: flex; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-indicator { position: absolute; height: calc(100% - 8px); top: 4px; left: 4px; border-radius: 12px; background: linear-gradient(135deg, #a855f7, #6b21a8); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        .tab-btn { position: relative; z-index: 2; transition: color 0.3s; }
        input, textarea, select { background: rgba(15, 23, 42, 0.8) !important; border: 1px solid rgba(168, 85, 247, 0.3) !important; color: white !important; border-radius: 12px !important; }
        .magic-box { border: 2px dashed rgba(168, 85, 247, 0.4) !important; background: rgba(168, 85, 247, 0.05) !important; transition: all 0.3s ease; }
        .magic-box:focus { border-color: #a855f7 !important; background: rgba(168, 85, 247, 0.1) !important; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .table-container { max-height: 60vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 10px; }
        #modalDetalhes { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .modal-card { max-height: 90vh; display: flex; flex-direction: column; width: 95%; max-width: 32rem; margin: auto; }

        .empresa-card img { width: 100%; height: 100px; object-fit: contain; border-radius: 12px; background: #000; margin-bottom: 12px; }
    </style>
</head>
<body>

        <!-- ABA EMPRESAS -->

                <div class="glass p-8 rounded-3xl min-h-[300px]"><canvas id="chartComposicao"></canvas></div>
                <div class="glass p-8 rounded-3xl min-h-[300px]"><canvas id="chartStatusPagamento"></canvas></div>

    <script>
        const SB_URL = "https://ctvnkjrpoyaancoxwles.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm5ranJwb3lhYW5jb3h3bGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDA2OTYsImV4cCI6MjA5NzIxNjY5Nn0.SSY-ys7ZC2wqOdprejhYILJUzdXZjWkZ8upocSGqaQ8";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let dadosCompletos = [], itemSendoEditado = null, editMode = false, tipoAtual = 'Entrada';
        let empresasConfig = [], chart1, chart2, chart3, chart4;
        const mesesNomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

        // --- GESTÃO DE VALORES AUTOMÁTICOS ---
        function calcularAutomacaoValores() {
            const empresaNome = document.getElementById('EMPRESA').value.toUpperCase();
            const hInicio = document.getElementById('HORA_INICIO').value;
            const hFim = document.getElementById('HORA_FIM').value;
            const ratInput = document.getElementById('RAT').value;

            const config = empresasConfig.find(e => e.nome === empresaNome);
            if (!config) return;

            let valorBase = 0;
            let valorExtra = 0;

            if (hInicio && hFim) {
                const duracao = (new Date(`1970-01-01T${hFim}`) - new Date(`1970-01-01T${hInicio}`)) / 1000 / 60 / 60;
                const duracaoDecimal = Math.max(0, duracao);

                // Lógica de Tiers (Ex: Prompt IT)
                if (config.tiers && Object.keys(config.tiers).length > 0) {
                    const horasOrdenadas = Object.keys(config.tiers).map(Number).sort((a, b) => a - b);
                    let tierEncontrado = false;

                    for (let h of horasOrdenadas) {
                        if (duracaoDecimal <= h) {
                            valorBase = config.tiers[h];
                            tierEncontrado = true;
                            break;
                        }
                    }

                    // Se passar do último Tier (9h+)
                    if (!tierEncontrado) {
                        const maxH = horasOrdenadas[horasOrdenadas.length - 1];
                        const valorMaxH = config.tiers[maxH];
                        const horasExcedentes = Math.floor(duracaoDecimal - maxH);
                        valorBase = valorMaxH;
                        if (horasExcedentes > 0) {
                            valorExtra = horasExcedentes * (config.hora_ext || 0);
                        }
                    }
                } 
                // Lógica Base + Hora Extra (Ex: WT)
                else {
                    valorBase = config.base_v || 0;
                    if (duracaoDecimal > config.base_h) {
                        const horasExtras = Math.ceil(duracaoDecimal - config.base_h);
                        valorExtra = horasExtras * (config.hora_ext || 0);
                    }
                }
            }

            // Lógica de Ativos Extras (Ex: WT - vírgula ou espaço separa RATs)
            if (config.ativo_ext > 0 && ratInput) {
                const qtdRats = ratInput.split(/[\s,/]+/).filter(x => x.length > 2).length;
                if (qtdRats > 1) {
                    valorExtra += (qtdRats - 1) * config.ativo_ext;
                }
            }

            document.getElementById('VALOR').value = formatarParaDB(valorBase);
            document.getElementById('EXTRA').value = formatarParaDB(valorExtra);
        }

        // --- GESTÃO DE EMPRESAS ---
        async function carregarEmpresas() {
            const { data } = await supabaseClient.from('empresas_config').select('*').order('nome');
            empresasConfig = data || [];
            renderizarEmpresas();
        }

        function renderizarEmpresas() {
            const container = document.getElementById('listaEmpresasCards');
            container.innerHTML = '';
            empresasConfig.forEach(emp => {
                // Puxa do seu repositório GitHub automaticamente se for apenas o nome do arquivo
                const fotoUrl = emp.foto && !emp.foto.includes('http') ? `./${emp.foto}` : (emp.foto || '');
                container.innerHTML += `
                    <div class="glass p-5 rounded-3xl empresa-card border border-white/5 relative group">
                        <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editarEmpresa(${emp.id})" class="p-2 bg-purple-500/20 text-purple-400 rounded-lg text-[8px] font-black">EDITAR</button>
                        </div>
                        <img src="${fotoUrl}" onerror="this.src='https://via.placeholder.com/100/020617/a855f7?text=LOGO'">
                        <h3 class="text-xs font-black text-white uppercase">${emp.nome}</h3>
                        <p class="text-[8px] text-purple-400 font-bold mb-3">${emp.intermedio || 'DIRETO'}</p>
                        <div class="grid grid-cols-2 gap-2 text-[8px] text-slate-400 uppercase font-bold">
                            <div class="bg-black/20 p-2 rounded-lg">Base: <span class="text-white">${formatarParaDB(emp.base_v)}</span></div>
                            <div class="bg-black/20 p-2 rounded-lg">Hora Extra: <span class="text-white">${formatarParaDB(emp.hora_ext)}</span></div>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('formEmpresa').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('empresa_id').value;
            const payload = {
                nome: document.getElementById('emp_nome').value.toUpperCase(),
                intermedio: document.getElementById('emp_intermedio').value.toUpperCase(),
                foto: document.getElementById('emp_foto').value,
                base_v: parseFloat(document.getElementById('emp_base_v').value || 0),
                base_h: parseInt(document.getElementById('emp_base_h').value || 0),
                hora_ext: parseFloat(document.getElementById('emp_hora_ext').value || 0),
                ativo_ext: parseFloat(document.getElementById('emp_ativo_ext').value || 0),
                tiers: document.getElementById('emp_tiers').value ? JSON.parse(document.getElementById('emp_tiers').value) : null
            };
            if(id) await supabaseClient.from('empresas_config').update(payload).eq('id', id);
            else await supabaseClient.from('empresas_config').insert([payload]);
            document.getElementById('formEmpresa').reset();
            carregarEmpresas();
        });

        async function editarEmpresa(id) {
            const emp = empresasConfig.find(e => e.id === id);
            document.getElementById('empresa_id').value = emp.id;
            document.getElementById('emp_nome').value = emp.nome;
            document.getElementById('emp_intermedio').value = emp.intermedio;
            document.getElementById('emp_foto').value = emp.foto;
            document.getElementById('emp_base_v').value = emp.base_v;
            document.getElementById('emp_base_h').value = emp.base_h;
            document.getElementById('emp_hora_ext').value = emp.hora_ext;
            document.getElementById('emp_ativo_ext').value = emp.ativo_ext;
            document.getElementById('emp_tiers').value = emp.tiers ? JSON.stringify(emp.tiers) : '';
        }

        // --- MÁGICA DE COLAR ---
        document.getElementById('magicPaste').addEventListener('input', function(e) {
            const lines = e.target.value.split('\n');
            lines.forEach(line => {
                const clean = line.trim();
                if (clean.toUpperCase().startsWith('DATA:')) {
                    const date = clean.split(':')[1].trim();
                    if(date.includes('/')) {
                        const p = date.split('/');
                        document.getElementById('DIA').value = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
                    }
                }
                if (clean.toUpperCase().startsWith('EMPRESA:')) document.getElementById('EMPRESA').value = clean.split(':')[1].trim().toUpperCase();
                if (clean.toUpperCase().startsWith('LOCAL:')) document.getElementById('Local').value = clean.split(':')[1].trim().toUpperCase();
                if (clean.toUpperCase().startsWith('RAT / OS:')) document.getElementById('RAT').value = clean.split(':')[1].trim();
                if (clean.toUpperCase().startsWith('DESCRIÇÃO:')) document.getElementById('DESCRICAO').value = clean.split(':')[1].trim();
            });
            calcularAutomacaoValores();
            setTimeout(() => e.target.value = '', 500);
        });

        // --- FUNÇÕES AUXILIARES ---
        function fixVal(v) {
            if (!v) return 0;
            let str = v.toString().replace("R$", "").replace(/\s/g, "").replace(".", "");
            return parseFloat(str.replace(",", ".")) || 0;
        }
        function formatarParaDB(num) {
            return "R$ " + (num || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function setTipo(t) {
            tipoAtual = t;
            document.getElementById('TIPO').value = t;
            document.getElementById('btnEntrada').className = t === 'Entrada' ? "flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white" : "flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500";
            document.getElementById('btnSaida').className = t === 'Saída' ? "flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white" : "flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500";
        }
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.getElementById('tabIndicator').style.width = btn.offsetWidth + 'px';
            document.getElementById('tabIndicator').style.left = btn.offsetLeft + 'px';
            if(id === 'dashboard') renderCharts();
            if(id === 'fechamento') carregarFechamentoFinal();
        }

        async function carregarLancamentos() {
            const { data } = await supabaseClient.from('atendimentos').select('*').order('id', { ascending: false });
            dadosCompletos = data || [];
            const lista = document.getElementById('listaLancamentos');
            lista.innerHTML = dadosCompletos.map(d => `
                <tr onclick="abrirDetalhesDeFila(${d.id})" class="hover:bg-white/5 cursor-pointer border-b border-white/5 transition-colors text-slate-300">
                    <td class="p-5 ${d.TIPO === 'Saída' ? 'status-saida' : (d.PAGAMENTO === 'PAGO' ? 'status-pago' : 'status-naopago-tab')}">
                        <div class="font-bold text-slate-100">${d.DIA}</div>
                    </td>
                    <td class="p-5">
                        <div class="font-bold text-slate-200 uppercase leading-tight">${d.EMPRESA || '-'}</div>
                        <div class="text-[9px] text-purple-700 font-bold italic">${d.RAT || ''}</div>
                    </td>
                    <td class="p-5 text-right font-black ${d.TIPO === 'Saída' ? 'text-red-400' : 'text-emerald-400'}">${d.TOTAL}</td>
                </tr>`).join('');
        }

        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const d = document.getElementById('DIA').value.split('-');
            const vBase = fixVal(document.getElementById('VALOR').value);
            const vExtra = fixVal(document.getElementById('EXTRA').value);
            const total = vBase + vExtra + fixVal(document.getElementById('MATERIAL').value) + fixVal(document.getElementById('TRANSP').value);
            
            const payload = {
                TIPO: tipoAtual, DIA: `${d[2]}/${d[1]}/${d[0]}`,
                EMPRESA: document.getElementById('EMPRESA').value.toUpperCase(),
                "INTERMÉDIO": document.getElementById('INTERMEDIO').value.toUpperCase(),
                Local: document.getElementById('Local').value.toUpperCase(),
                RAT: document.getElementById('RAT').value,
                "DESCRIÇÃO": document.getElementById('DESCRICAO').value,
                VALOR: formatarParaDB(vBase), EXTRA: formatarParaDB(vExtra),
                MATERIAL: formatarParaDB(fixVal(document.getElementById('MATERIAL').value)),
                TRANSP: formatarParaDB(fixVal(document.getElementById('TRANSP').value)),
                TOTAL: formatarParaDB(total),
                PAGAMENTO: tipoAtual === 'Saída' ? 'SAÍDA' : 'NÃO PAGO',
                Mês: parseInt(d[1]), ANO: parseInt(d[0])
            };
            await supabaseClient.from('atendimentos').insert([payload]);
            location.reload();
        });

        async function carregarFechamentoFinal() {
            const container = document.getElementById('tab-fechamento');
            container.innerHTML = '<div class="p-20 text-center animate-pulse text-purple-500 font-black">CARREGANDO...</div>';
            const { data: lancamentos } = await supabaseClient.from('atendimentos').select('*').eq('TIPO', 'Entrada');
            
            const grupos = {};
            lancamentos.forEach(l => {
                const pts = l.DIA.split('/');
                const chave = `${pts[2]}${pts[1]}`;
                if(!grupos[chave]) grupos[chave] = { nome: `${mesesNomes[pts[1]-1]} ${pts[2]}`, p: {}, trec: 0, tp: 0 };
                const v = fixVal(l.TOTAL);
                if(l.PAGAMENTO === 'PAGO') grupos[chave].trec += v;
                else {
                    if(!grupos[chave].p[l.EMPRESA]) grupos[chave].p[l.EMPRESA] = { total: 0, ids: [] };
                    grupos[chave].p[l.EMPRESA].total += v;
                    grupos[chave].p[l.EMPRESA].ids.push(l.id);
                    grupos[chave].tp += v;
                }
            });

            container.innerHTML = `<h2 class="text-2xl font-black text-purple-400 italic uppercase">Resumo de Fechamento</h2>`;
            Object.keys(grupos).sort().reverse().forEach(k => {
                const g = grupos[k];
                container.innerHTML += `
                <div class="glass p-8 rounded-3xl mb-8 border-l-8 border-purple-600">
                    <div class="flex justify-between mb-6">
                        <span class="text-xl font-black uppercase">${g.nome}</span>
                        <div class="text-right">
                            <p class="text-emerald-400 font-black">PAGO: ${formatarParaDB(g.trec)}</p>
                            <p class="text-purple-400 font-black">PENDENTE: ${formatarParaDB(g.tp)}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        ${Object.keys(g.p).map(emp => `
                        <div class="bg-black/20 p-4 rounded-2xl border border-white/5">
                            <p class="text-[10px] font-black text-purple-400 mb-2">${emp}</p>
                            <p class="text-lg font-black mb-4">${formatarParaDB(g.p[emp].total)}</p>
                            <button onclick="marcarPago([${g.p[emp].ids}])" class="w-full py-2 bg-emerald-500/20 text-emerald-400 rounded-xl text-[8px] font-black uppercase">CONFIRMAR RECEBIMENTO</button>
                        </div>`).join('')}
                    </div>
                </div>`;
            });
        }

        async function marcarPago(ids) {
            if(confirm("Confirmar recebimento?")) {
                await supabaseClient.from('atendimentos').update({ PAGAMENTO: 'PAGO' }).in('id', ids);
                carregarFechamentoFinal();
            }
        }

        window.onload = () => { carregarLancamentos(); carregarEmpresas(); };
    </script>
</body>
</html>
