<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro - Ultra Aurora Glass</title>
    
    <!-- MINIATURA DO SITE (FAVICON) -->
    <link rel="icon" type="image/png" href="1781706422626.png">
    <link rel="apple-touch-icon" href="1781706422626.png">
    <!-- Meta tags para visualização em redes sociais -->
    <meta property="og:image" content="1781706422626.png">
    <meta name="twitter:image" content="1781706422626.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: #f1f5f9; min-height: 100vh; position: relative; overflow-x: hidden; }

        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .logo-central { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%); width: 320px; height: 320px; background: url("1781706422626.png") no-repeat center; background-size: contain; filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.6)); }

        .glass { background: rgba(15, 23, 42, 0.45) !important; backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.12); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); }
        .btn-glass-purple { background: linear-gradient(135deg, rgba(168, 85, 247, 0.8), rgba(107, 33, 168, 0.8)); transition: 0.3s; }

        .tabs-container { position: relative; display: flex; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-indicator { position: absolute; height: calc(100% - 8px); top: 4px; left: 4px; border-radius: 12px; background: linear-gradient(135deg, #a855f7, #6b21a8); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        .tab-btn { position: relative; z-index: 2; transition: color 0.3s; }

        input, textarea, select { 
            background: rgba(15, 23, 42, 0.8) !important; 
            border: 1px solid rgba(168, 85, 247, 0.3) !important; 
            color: white !important; 
            border-radius: 12px !important;
        }

        .magic-box { border: 2px dashed rgba(168, 85, 247, 0.4) !important; background: rgba(168, 85, 247, 0.05) !important; transition: 0.3s; }
        .magic-box:focus { border-color: #a855f7 !important; background: rgba(168, 85, 247, 0.1) !important; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }

        .status-pago { border-left: 6px solid #10b981; }
        .status-naopago-tab { border-left: 6px solid #f97316; }
        .status-saida { border-left: 6px solid #ef4444; }
        .card-pendente-moldura { border: 2.5px solid #ef4444 !important; }

        .table-container { max-height: 60vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 10px; }

        #modalDetalhes { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .modal-card { max-height: 90vh; display: flex; flex-direction: column; width: 95%; max-width: 32rem; margin: auto; }
        .modal-body-scroll { overflow-y: auto; flex-grow: 1; padding: 1.5rem; }
        .circle-icon-btn { background: rgba(255, 255, 255, 0.15); border: 1.5px solid rgba(255, 255, 255, 0.5); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: white; transition: 0.2s; }
        .circle-icon-btn:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.05); }
        .circle-icon-btn.btn-delete:hover { background: rgba(239, 68, 68, 0.4); border-color: #ef4444; }
        .edit-input { width: 100%; border: 1px solid #a855f7 !important; padding: 10px; font-size: 14px; }
        
        .empresa-card img { width: 100%; height: 100px; object-fit: contain; border-radius: 12px; background: #000; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div class="bg-pattern">
        <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <path d="M-100,200 C300,100 500,600 900,100" fill="none" stroke="#a855f7" stroke-width="6" opacity="0.2" />
            <path d="M1100,800 C700,900 400,400 -100,800" fill="none" stroke="white" stroke-width="3" opacity="0.1" />
        </svg>
        <div class="logo-central"></div>
    </div>

    <nav class="glass sticky top-0 z-50 px-4 h-20 border-b border-white/5 flex items-center">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <img src="1781706422626.png" class="h-14 w-14 rounded-xl object-cover">
            <div class="tabs-container">
                <div id="tabIndicator" class="tab-indicator"></div>
                <button onclick="showTab('lancamentos', this)" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold text-white">LANÇAMENTOS</button>
                <button onclick="showTab('empresas', this)" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold text-slate-400">EMPRESAS</button>
                <button onclick="showTab('fechamento', this)" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold text-slate-400">FECHAMENTO</button>
                <button onclick="showTab('dashboard', this)" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold text-slate-400">DASHBOARD</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- ABA LANÇAMENTOS -->
        <section id="tab-lancamentos" class="tab-content grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-3xl sticky top-28">
                    <!-- MAGIC BOX -->
                    <div class="mb-6">
                        <textarea id="magicPaste" placeholder="Cole aqui o texto copiado do Gemini..." class="w-full p-3 text-[10px] h-20 magic-box rounded-xl resize-none placeholder:text-slate-600 outline-none"></textarea>
                    </div>

                    <form id="formAtendimento" class="space-y-4">
                        <div class="flex gap-2">
                            <button type="button" id="btnEntrada" onclick="setTipo('Entrada')" class="flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white">ENTRADA</button>
                            <button type="button" id="btnSaida" onclick="setTipo('Saída')" class="flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500">SAÍDA</button>
                        </div>
                        <input type="hidden" id="TIPO" value="Entrada">
                        <input type="date" id="DIA" class="w-full p-3 text-xs" required>
                        
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="text-[8px] text-purple-400 font-bold ml-1 uppercase">Início</label><input type="time" id="HORA_INICIO" oninput="calcularAutomacaoValores()" class="w-full p-3 text-xs"></div>
                            <div><label class="text-[8px] text-purple-400 font-bold ml-1 uppercase">Fim</label><input type="time" id="HORA_FIM" oninput="calcularAutomacaoValores()" class="w-full p-3 text-xs"></div>
                        </div>

                        <input type="text" id="EMPRESA" placeholder="EMPRESA" oninput="calcularAutomacaoValores()" class="w-full p-3 text-xs uppercase">
                        <input type="text" id="INTERMEDIO" placeholder="INTERMÉDIO" class="w-full p-3 text-xs uppercase">
                        <input type="text" id="Local" placeholder="LOCAL" class="w-full p-3 text-xs uppercase">
                        <input type="text" id="RAT" placeholder="RAT / OS" oninput="calcularAutomacaoValores()" class="w-full p-3 text-xs">
                        <textarea id="DESCRICAO" placeholder="Descrição..." class="w-full p-3 text-xs h-20"></textarea>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div class="relative"><span class="absolute top-1 left-2 text-[7px] text-purple-400 font-black uppercase">Valor Base</span><input type="text" id="VALOR" placeholder="0,00" class="w-full p-3 pt-5 text-xs font-bold text-emerald-400"></div>
                            <div class="relative"><span class="absolute top-1 left-2 text-[7px] text-purple-400 font-black uppercase">Extra</span><input type="text" id="EXTRA" placeholder="0,00" class="w-full p-3 pt-5 text-xs font-bold text-orange-400"></div>
                            <input type="number" step="0.01" id="MATERIAL" placeholder="MATERIAL" class="w-full p-3 text-xs uppercase">
                            <input type="number" step="0.01" id="TRANSP" placeholder="TRANSP" class="w-full p-3 text-xs uppercase">
                        </div>
                        <button type="submit" id="btnSalvar" class="w-full btn-glass-purple text-white py-3 rounded-2xl font-black uppercase text-[10px]">GRAVAR</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-4">
                <div class="glass p-2 rounded-2xl flex items-center px-6">
                    <svg class="w-5 h-5 text-slate-500 mr-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <input type="text" id="inputBusca" onkeyup="filtrarLancamentos()" placeholder="Pesquisar por empresa, data ou RAT..." class="w-full bg-transparent border-none outline-none text-base p-4 placeholder:text-slate-500">
                </div>
                <div class="glass rounded-3xl overflow-hidden">
                    <div class="table-container">
                        <table class="w-full text-left text-xs relative">
                            <thead class="bg-black/40 text-purple-300 font-bold uppercase sticky top-0 z-10 backdrop-blur-md">
                                <tr><th class="p-5">Data</th><th class="p-5">Empresa / RAT</th><th class="p-5 text-right">Total</th></tr>
                            </thead>
                            <tbody id="listaLancamentos" class="divide-y divide-white/5 text-slate-300"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- ABA EMPRESAS -->
        <section id="tab-empresas" class="tab-content hidden grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-3xl sticky top-28">
                    <h2 class="text-xs font-black text-purple-400 mb-6 uppercase tracking-widest text-center italic">Configurar Empresa</h2>
                    <form id="formEmpresa" class="space-y-4">
                        <input type="hidden" id="empresa_id">
                        <input type="text" id="emp_foto" placeholder="ex: prompt.png" class="w-full p-3 text-xs">
                        <input type="text" id="emp_nome" placeholder="NOME DA EMPRESA" class="w-full p-3 text-xs uppercase" required>
                        <input type="text" id="emp_intermedio" placeholder="INTERMÉDIO" class="w-full p-3 text-xs uppercase">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" step="0.01" id="emp_base_v" placeholder="VALOR BASE" class="w-full p-3 text-xs">
                            <input type="number" id="emp_base_h" placeholder="HORAS BASE" class="w-full p-3 text-xs">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" step="0.01" id="emp_hora_ext" placeholder="V. HORA EXTRA" class="w-full p-3 text-xs">
                            <input type="number" step="0.01" id="emp_ativo_ext" placeholder="V. ATIVO EXTRA" class="w-full p-3 text-xs">
                        </div>
                        <textarea id="emp_tiers" placeholder='Tiers JSON ex: {"3":110, "5":130}' class="w-full p-3 text-[9px] h-20 font-mono"></textarea>
                        <button type="submit" class="w-full btn-glass-purple text-white py-3 rounded-2xl font-black uppercase text-[10px]">SALVAR EMPRESA</button>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="listaEmpresasCards"></div>
        </section>
        
        <section id="tab-fechamento" class="tab-content hidden space-y-12"></section>

        <!-- DASHBOARD -->
        <section id="tab-dashboard" class="tab-content hidden flex flex-col gap-8">
            <div class="glass p-6 rounded-3xl flex flex-wrap items-center gap-6">
                <h2 class="text-xl font-black text-purple-400 italic uppercase">Filtros Analíticos</h2>
                <div class="flex gap-4">
                    <select id="filtroAnoDash" onchange="renderCharts()" class="p-3 text-xs font-bold uppercase min-w-[120px]"></select>
                    <select id="filtroMesDash" onchange="renderCharts()" class="p-3 text-xs font-bold uppercase min-w-[150px]">
                        <option value="TODOS">Todos os Meses</option>
                        <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3">Março</option>
                        <option value="4">Abril</option><option value="5">Maio</option><option value="6">Junho</option>
                        <option value="7">Julho</option><option value="8">Agosto</option><option value="9">Setembro</option>
                        <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass p-8 rounded-3xl min-h-[350px]"><canvas id="chartFluxo"></canvas></div>
                <div class="glass p-8 rounded-3xl min-h-[350px]"><canvas id="chartEmpresas"></canvas></div>
                <div class="glass p-8 rounded-3xl min-h-[350px]"><canvas id="chartComposicao"></canvas></div>
                <div class="glass p-8 rounded-3xl min-h-[350px]"><canvas id="chartStatusPagamento"></canvas></div>
            </div>
        </section>
    </main>

    <!-- MODAL DETALHES -->
    <div id="modalDetalhes">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="glass modal-card rounded-3xl overflow-hidden border border-purple-500/30">
                <div id="modalHeader" class="p-6 flex justify-between items-center text-white border-b border-white/10 sticky top-0 z-20 backdrop-blur-xl">
                    <span id="modalStatusText" class="font-black uppercase text-[10px] opacity-60 tracking-widest">DETALHES</span>
                    <div class="flex items-center gap-3">
                        <button onclick="deletarLancamento()" class="circle-icon-btn btn-delete" title="Excluir Lançamento"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"/></svg></button>
                        <button onclick="toggleEditMode()" class="circle-icon-btn"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2.5"/></svg></button>
                        <button onclick="fecharModal()" class="text-4xl leading-none font-light ml-2">&times;</button>
                    </div>
                </div>
                <div id="modalBody" class="modal-body-scroll space-y-6"></div>
                <div id="modalFooter" class="p-6 hidden flex justify-end gap-3 border-t border-white/10 bg-black/60 backdrop-blur-md">
                    <button onclick="toggleEditMode()" class="px-5 py-2 text-xs font-bold text-slate-400">Cancelar</button>
                    <button onclick="salvarAlteracoes()" class="px-8 py-2 bg-emerald-600 rounded-xl text-xs font-black uppercase text-white shadow-lg">Confirmar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ctvnkjrpoyaancoxwles.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm5ranJwb3lhYW5jb3h3bGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDA2OTYsImV4cCI6MjA5NzIxNjY5Nn0.SSY-ys7ZC2wqOdprejhYILJUzdXZjWkZ8upocSGqaQ8";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let dadosCompletos = [], itemSendoEditado = null, editMode = false, tipoAtual = 'Entrada';
        let empresasConfig = [], filtroFechamento = 'TODOS', chart1 = null, chart2 = null, chart3 = null, chart4 = null;
        const mesesNomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

        // --- LÓGICA CORE ---
        function fixVal(v) {
            if (!v) return 0;
            let str = v.toString().replace("R$", "").replace(/\s/g, "");
            if (str.includes(',') && str.includes('.')) { str = str.replace(/\./g, "").replace(",", "."); } 
            else { str = str.replace(",", "."); }
            return parseFloat(str) || 0;
        }

        function formatarParaDB(num) {
            return "R$ " + (num || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function exibirMoeda(v) {
            if (!v) return "R$ 0,00";
            let limpo = v.toString().replace("R$", "").trim();
            return "R$ " + limpo;
        }

        function normalizar(t) { return t ? t.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : ""; }

        // --- MAGIC PASTE & CÁLCULOS ---
        document.getElementById('magicPaste').addEventListener('input', function(e) {
            const lines = e.target.value.split('\n');
            lines.forEach(line => {
                const clean = line.trim();
                if (clean.toUpperCase().startsWith('DATA:')) {
                    const d = clean.split(':')[1].trim();
                    if(d.includes('/')) {
                        const p = d.split('/');
                        document.getElementById('DIA').value = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
                    }
                }
                if (clean.toUpperCase().startsWith('EMPRESA:')) document.getElementById('EMPRESA').value = clean.split(':')[1].trim().toUpperCase();
                if (clean.toUpperCase().startsWith('LOCAL:')) document.getElementById('Local').value = clean.split(':')[1].trim().toUpperCase();
                if (clean.toUpperCase().startsWith('RAT / OS:')) document.getElementById('RAT').value = clean.split(':')[1].trim();
                if (clean.toUpperCase().startsWith('DESCRIÇÃO:')) document.getElementById('DESCRICAO').value = clean.split(':')[1].trim();
            });
            calcularAutomacaoValores();
            setTimeout(() => e.target.value = '', 500);
        });

        function calcularAutomacaoValores() {
            const empNome = document.getElementById('EMPRESA').value.toUpperCase();
            const hI = document.getElementById('HORA_INICIO').value;
            const hF = document.getElementById('HORA_FIM').value;
            const rat = document.getElementById('RAT').value;
            const config = empresasConfig.find(e => e.nome === empNome);
            if (!config) return;

            if (!document.getElementById('INTERMEDIO').value) {
                document.getElementById('INTERMEDIO').value = config.intermedio || '';
            }

            let vBase = config.base_v || 0, vExtra = 0;
            if (hI && hF) {
                const diff = (new Date(`1970-01-01T${hF}`) - new Date(`1970-01-01T${hI}`)) / 3600000;
                const hrsReal = Math.max(0, diff);
                if (config.tiers && Object.keys(config.tiers).length > 0) {
                    const hrs = Object.keys(config.tiers).map(Number).sort((a,b)=>a-b);
                    let found = false;
                    for(let h of hrs) { if(hrsReal <= h) { vBase = config.tiers[h]; found = true; break; } }
                    if(!found) {
                        const maxH = hrs[hrs.length-1];
                        vBase = config.tiers[maxH];
                        const exc = Math.floor(hrsReal - maxH);
                        if(exc > 0) vExtra = exc * (config.hora_ext || 0);
                    }
                } else if(hrsReal > config.base_h) {
                    vExtra = Math.ceil(hrsReal - config.base_h) * (config.hora_ext || 0);
                }
            }
            if (config.ativo_ext > 0 && rat) {
                const qtd = rat.split(/[\s,/]+/).filter(x => x.length > 2).length;
                if(qtd > 1) vExtra += (qtd - 1) * config.ativo_ext;
            }
            document.getElementById('VALOR').value = vBase.toFixed(2).replace('.',',');
            document.getElementById('EXTRA').value = vExtra.toFixed(2).replace('.',',');
        }

        // --- GESTÃO DE EMPRESAS ---
        async function carregarEmpresas() {
            const { data } = await supabaseClient.from('empresas_config').select('*').order('nome');
            empresasConfig = data || [];
            document.getElementById('listaEmpresasCards').innerHTML = empresasConfig.map(emp => `
                <div class="glass p-5 rounded-3xl border border-white/5 relative group">
                    <button onclick="editarEmpresa(${emp.id})" class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 p-2 bg-purple-500/20 text-purple-400 rounded-lg text-[8px] font-black uppercase">Editar</button>
                    <img src="./${emp.foto}" onerror="this.src='https://via.placeholder.com/100/020617/a855f7?text=LOGO'">
                    <h3 class="text-xs font-black text-white uppercase truncate">${emp.nome}</h3>
                    <p class="text-[8px] text-purple-400 font-bold mb-3 uppercase tracking-tighter">Intermédio: ${emp.intermedio || 'Direto'}</p>
                    <div class="grid grid-cols-2 gap-2 text-[8px] text-slate-400 font-bold uppercase">
                        <div class="bg-black/20 p-2 rounded-lg text-center">Base (${emp.base_h}h):<br><span class="text-white">${formatarParaDB(emp.base_v)}</span></div>
                        <div class="bg-black/20 p-2 rounded-lg text-center">Hora Ext:<br><span class="text-white">${formatarParaDB(emp.hora_ext)}</span></div>
                    </div>
                </div>`).join('');
        }

        document.getElementById('formEmpresa').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('empresa_id').value;
            const payload = {
                nome: document.getElementById('emp_nome').value.toUpperCase(),
                intermedio: document.getElementById('emp_intermedio').value.toUpperCase(),
                foto: document.getElementById('emp_foto').value,
                base_v: parseFloat(document.getElementById('emp_base_v').value || 0),
                base_h: parseInt(document.getElementById('emp_base_h').value || 0),
                hora_ext: parseFloat(document.getElementById('emp_hora_ext').value || 0),
                ativo_ext: parseFloat(document.getElementById('emp_ativo_ext').value || 0),
                tiers: document.getElementById('emp_tiers').value ? JSON.parse(document.getElementById('emp_tiers').value) : null
            };
            if(id) await supabaseClient.from('empresas_config').update(payload).eq('id', id);
            else await supabaseClient.from('empresas_config').insert([payload]);
            document.getElementById('formEmpresa').reset();
            document.getElementById('empresa_id').value = '';
            carregarEmpresas();
        });

        function editarEmpresa(id) {
            const emp = empresasConfig.find(e => e.id === id);
            document.getElementById('empresa_id').value = emp.id;
            document.getElementById('emp_nome').value = emp.nome;
            document.getElementById('emp_intermedio').value = emp.intermedio;
            document.getElementById('emp_foto').value = emp.foto;
            document.getElementById('emp_base_v').value = emp.base_v;
            document.getElementById('emp_base_h').value = emp.base_h;
            document.getElementById('emp_hora_ext').value = emp.hora_ext;
            document.getElementById('emp_ativo_ext').value = emp.ativo_ext;
            document.getElementById('emp_tiers').value = emp.tiers ? JSON.stringify(emp.tiers) : '';
        }

        // --- NAVEGAÇÃO & LANÇAMENTOS ---
        function setTipo(t) {
            tipoAtual = t;
            document.getElementById('TIPO').value = t;
            const btnE = document.getElementById('btnEntrada'), btnS = document.getElementById('btnSaida');
            btnE.className = t === 'Entrada' ? "flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white" : "flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500";
            btnS.className = t === 'Saída' ? "flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white" : "flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500";
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            const ind = document.getElementById('tabIndicator');
            ind.style.width = btn.offsetWidth + 'px'; ind.style.left = btn.offsetLeft + 'px';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('text-white', 'text-slate-400'));
            btn.classList.replace('text-slate-400', 'text-white');
            if(id === 'dashboard') renderCharts();
            if(id === 'fechamento') carregarFechamentoFinal();
            if(id === 'lancamentos') carregarLancamentos();
            if(id === 'empresas') carregarEmpresas();
        }

        async function carregarLancamentos() {
            const { data } = await supabaseClient.from('atendimentos').select('*').order('id', { ascending: false });
            dadosCompletos = data || [];
            document.getElementById('listaLancamentos').innerHTML = dadosCompletos.map(d => `<tr onclick="abrirDetalhesDeFila(${d.id})" class="hover:bg-white/5 cursor-pointer border-b border-white/5 transition-colors text-slate-300"><td class="p-5 ${d.TIPO === 'Saída' ? 'status-saida' : (d.PAGAMENTO === 'PAGO' ? 'status-pago' : 'status-naopago-tab')}"><div class="font-bold text-slate-100">${d.DIA}</div></td><td class="p-5 uppercase font-bold text-slate-200">${d.EMPRESA || '-'}<div class="text-[9px] text-purple-700 italic">${d.RAT || ''}</div></td><td class="p-5 text-right font-black ${d.TIPO === 'Saída' ? 'text-red-400' : 'text-emerald-400'}">${exibirMoeda(d.TOTAL)}</td></tr>`).join('');
            popularFiltroAno();
        }

        function filtrarLancamentos() {
            const t = normalizar(document.getElementById('inputBusca').value);
            const fil = dadosCompletos.filter(d => normalizar(d.DIA).includes(t) || normalizar(d.EMPRESA).includes(t) || normalizar(d.RAT).includes(t));
            document.getElementById('listaLancamentos').innerHTML = fil.map(d => `<tr onclick="abrirDetalhesDeFila(${d.id})" class="hover:bg-white/5 cursor-pointer border-b border-white/5 transition-colors text-slate-300"><td class="p-5 ${d.TIPO === 'Saída' ? 'status-saida' : (d.PAGAMENTO === 'PAGO' ? 'status-pago' : 'status-naopago-tab')}"><div class="font-bold text-slate-100">${d.DIA}</div></td><td class="p-5 uppercase font-bold text-slate-200">${d.EMPRESA || '-'}<div class="text-[9px] text-purple-700 italic">${d.RAT || ''}</div></td><td class="p-5 text-right font-black ${d.TIPO === 'Saída' ? 'text-red-400' : 'text-emerald-400'}">${exibirMoeda(d.TOTAL)}</td></tr>`).join('');
        }

        // --- RESTAURADO: FECHAMENTO INTEGRAL (INDEX 1) ---
        async function carregarFechamentoFinal() {
            const container = document.getElementById('tab-fechamento'); 
            container.innerHTML = '<div class="p-20 text-center animate-pulse uppercase font-black text-purple-500 italic text-xs">Mapeando histórico...</div>';
            const { data: lancamentos } = await supabaseClient.from('atendimentos').select('*').eq('TIPO', 'Entrada').order('id', { ascending: false });
            const { data: configs } = await supabaseClient.from('empresas_config').select('*');
            const grupos = {};

            lancamentos.forEach(l => {
                if(!l.DIA) return;
                let pts = l.DIA.includes('-') ? l.DIA.split('-') : l.DIA.split('/');
                let dia = l.DIA.includes('-') ? pts[2] : pts[0], mes = pts[1], ano = l.DIA.includes('-') ? pts[0] : pts[2];
                const chaveSort = `${ano}${mes.toString().padStart(2, '0')}`; 
                const chaveNome = `${ano} - ${mesesNomes[parseInt(mes)-1]}`;
                if(!grupos[chaveSort]) grupos[chaveSort] = { nome: chaveNome, p: {}, pagos: [], tp: 0, trec: 0 };
                const v = fixVal(l.TOTAL);
                if(l.PAGAMENTO !== 'PAGO') {
                    const emp = l.EMPRESA || 'Outros'; 
                    if(!grupos[chaveSort].p[emp]) grupos[chaveSort].p[emp] = { total: 0, chamados: [], ids: [] };
                    grupos[chaveSort].p[emp].total += v; grupos[chaveSort].p[emp].chamados.push(l); grupos[chaveSort].p[emp].ids.push(l.id); grupos[chaveSort].tp += v;
                } else { grupos[chaveSort].pagos.push(l); grupos[chaveSort].trec += v; }
            });

            container.innerHTML = `<h2 class="text-2xl font-black text-purple-400 italic uppercase">Fechamentos Inteligentes</h2>`;
            Object.keys(grupos).sort((a,b) => b - a).forEach(mKey => {
                const g = grupos[mKey];
                let htmlMês = `<div class="space-y-8 mt-12"><div class="glass p-6 rounded-3xl border-l-8 border-purple-600 flex justify-between items-center shadow-2xl gap-4"><div><h3 class="text-sm font-black text-slate-100 uppercase tracking-widest">${g.nome}</h3></div><div class="flex gap-10 text-right"><div><span class="text-[9px] font-bold text-slate-400 uppercase block">Recebido</span><span class="text-lg md:text-2xl font-black text-emerald-400 italic">${formatarParaDB(g.trec)}</span></div><div><span class="text-[9px] font-bold text-slate-400 uppercase block">Pendente</span><span class="text-lg md:text-2xl font-black text-purple-400 italic">${formatarParaDB(g.tp)}</span></div></div></div><div class="grid grid-cols-1 md:grid-cols-3 gap-6">`;
                Object.keys(g.p).forEach(e => {
                    const info = g.p[e];
                    htmlMês += `<div class="glass p-6 rounded-3xl card-pendente-moldura flex flex-col justify-between shadow-xl"><div><h4 class="font-black text-white text-[10px] uppercase mb-4 border-b border-white/10 pb-2 tracking-widest">${e}</h4><div class="space-y-2 mb-6">${info.chamados.map(i => `<div class="flex justify-between items-start text-[9px] border-b border-white/5 pb-1"><div class="text-slate-400 font-bold">${i.DIA}</div><div class="font-black text-white italic">${exibirMoeda(i.TOTAL)}</div></div>`).join('')}</div></div><div><div class="flex justify-between items-center mb-4 px-2"><span class="text-[9px] font-black text-red-500 uppercase">Total:</span><span class="text-xl font-black text-purple-400 italic">${formatarParaDB(info.total)}</span></div><button onclick="marcarComoPago([${info.ids}])" class="w-full bg-emerald-500/20 border border-emerald-500/50 text-emerald-400 py-2 rounded-xl text-[9px] font-black uppercase hover:bg-emerald-500 transition-all">RECEBI PAGAMENTO</button></div></div>`;
                });
                htmlMês += `</div></div>`; container.innerHTML += htmlMês;
            });
        }

        async function marcarComoPago(ids) { if(confirm("Confirmar recebimento?")) { await supabaseClient.from('atendimentos').update({ PAGAMENTO: 'PAGO' }).in('id', ids); carregarFechamentoFinal(); } }

        // --- RESTAURADO: DASHBOARD INTEGRAL (INDEX 1) ---
        function popularFiltroAno() {
            const selectAno = document.getElementById('filtroAnoDash');
            if(selectAno.options.length > 0) return;
            const anosUnicos = new Set();
            dadosCompletos.forEach(d => { if(d.DIA) { let pts = d.DIA.includes('-') ? d.DIA.split('-') : d.DIA.split('/'); let a = d.DIA.includes('-') ? pts[0] : pts[2]; if(a) anosUnicos.add(a); } });
            Array.from(anosUnicos).sort().reverse().forEach(ano => {
                let opt = document.createElement('option'); opt.value = ano; opt.innerText = ano; selectAno.appendChild(opt);
            });
            if(anosUnicos.size > 0) selectAno.value = Array.from(anosUnicos).sort().reverse()[0];
        }

        async function renderCharts() {
            const anoSel = document.getElementById('filtroAnoDash').value, mesSel = document.getElementById('filtroMesDash').value;
            const { data } = await supabaseClient.from('atendimentos').select('*');
            if(!data) return;
            if(chart1) chart1.destroy(); if(chart2) chart2.destroy(); if(chart3) chart3.destroy(); if(chart4) chart4.destroy();
            let labels = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"], ganhos = new Array(12).fill(0), gastos = new Array(12).fill(0), eMap = {}, comp = [0,0,0,0], status = [0,0];

            data.forEach(d => {
                if(!d.DIA) return;
                let pts = d.DIA.includes('-') ? d.DIA.split('-') : d.DIA.split('/');
                let a = d.DIA.includes('-') ? pts[0] : pts[2], m = parseInt(pts[1]);
                if (a == anoSel && (mesSel === 'TODOS' || m == mesSel)) {
                    let v = fixVal(d.TOTAL);
                    if(d.TIPO === 'Entrada') { ganhos[m-1] += v; eMap[d.EMPRESA] = (eMap[d.EMPRESA]||0)+v; comp[0]+=fixVal(d.VALOR); comp[1]+=fixVal(d.EXTRA); comp[2]+=fixVal(d.MATERIAL); comp[3]+=fixVal(d.TRANSP); if(d.PAGAMENTO==='PAGO')status[0]+=v; else status[1]+=v; }
                    else gastos[m-1] += v;
                }
            });

            chart1 = new Chart(document.getElementById('chartFluxo').getContext('2d'), { type: 'bar', data: { labels, datasets: [{label:'Ganhos',data:ganhos,backgroundColor:'#10b981'},{label:'Gastos',data:gastos,backgroundColor:'#ef4444'}]}, options: { responsive: true, maintainAspectRatio: false }});
            const topEmp = Object.entries(eMap).sort((a,b) => b[1]-a[1]).slice(0, 5);
            chart2 = new Chart(document.getElementById('chartEmpresas').getContext('2d'), { type: 'doughnut', data: { labels: topEmp.map(x=>x[0]), datasets: [{data: topEmp.map(x=>x[1]), backgroundColor: ['#a855f7','#10b981','#f59e0b','#ef4444','#3b82f6']}]}, options: { responsive: true, maintainAspectRatio: false }});
            chart3 = new Chart(document.getElementById('chartComposicao').getContext('2d'), { type: 'polarArea', data: { labels: ['Base','Extra','Material','Transp'], datasets: [{data: comp, backgroundColor: ['rgba(168,85,247,0.7)','rgba(16, 185, 129, 0.7)','rgba(245, 158, 11, 0.7)','rgba(59, 130, 246, 0.7)']}]}, options: { responsive: true, maintainAspectRatio: false }});
            chart4 = new Chart(document.getElementById('chartStatusPagamento').getContext('2d'), { type: 'pie', data: { labels: ['Recebido','Pendente'], datasets: [{data: status, backgroundColor: ['#10b981','#f59e0b']}]}, options: { responsive: true, maintainAspectRatio: false }});
        }

        // --- SALVAMENTO INTEGRAL (INDEX 1) ---
        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dpts = document.getElementById('DIA').value.split('-');
            const vB = fixVal(document.getElementById('VALOR').value), vE = fixVal(document.getElementById('EXTRA').value), vM = fixVal(document.getElementById('MATERIAL').value), vT = fixVal(document.getElementById('TRANSP').value);
            const payload = {
                TIPO: tipoAtual, DIA: `${dpts[2]}/${dpts[1]}/${dpts[0]}`, 
                HORA_INICIO: document.getElementById('HORA_INICIO').value,
                HORA_FIM: document.getElementById('HORA_FIM').value,
                EMPRESA: document.getElementById('EMPRESA').value.toUpperCase(), 
                "INTERMÉDIO": document.getElementById('INTERMEDIO').value.toUpperCase(), 
                Local: document.getElementById('Local').value.toUpperCase(), 
                RAT: document.getElementById('RAT').value, 
                "DESCRIÇÃO": document.getElementById('DESCRICAO').value,
                VALOR: formatarParaDB(vB), EXTRA: formatarParaDB(vE), 
                MATERIAL: formatarParaDB(vM), TRANSP: formatarParaDB(vT), 
                TOTAL: formatarParaDB(vB+vE+vM+vT), 
                PAGAMENTO: tipoAtual === 'Saída' ? 'SAÍDA' : 'NÃO PAGO', 
                "Mês": parseInt(dpts[1]), "ANO": parseInt(dpts[0])
            };
            const { error } = await supabaseClient.from('atendimentos').insert([payload]);
            if(!error) location.reload(); else alert("Erro ao gravar atendimento!");
        });

        // --- MODAL DETALHES RESTAURADO ---
        async function abrirDetalhesDeFila(id) {
            itemSendoEditado = dadosCompletos.find(x => x.id === id); 
            editMode = false;
            document.getElementById('modalFooter').classList.add('hidden');
            renderizarModalBody();
            document.getElementById('modalDetalhes').style.display = "block";
        }

        function renderizarModalBody() {
            const item = itemSendoEditado;
            const head = document.getElementById('modalHeader');
            let colorClass = item.TIPO === 'Saída' ? 'bg-red-500/80' : (item.PAGAMENTO === 'PAGO' ? 'bg-emerald-600/80' : 'bg-orange-500/80');
            head.className = `p-6 flex justify-between items-center text-white border-b border-white/10 sticky top-0 z-20 backdrop-blur-xl ${colorClass}`;

            let tempoTotal = "---";
            if(item.HORA_INICIO && item.HORA_FIM) {
                const diff = (new Date(`1970-01-01T${item.HORA_FIM}`) - new Date(`1970-01-01T${item.HORA_INICIO}`)) / 60000;
                if(diff > 0) tempoTotal = `${Math.floor(diff/60)}h ${Math.floor(diff%60)}min`;
            }

            document.getElementById('modalBody').innerHTML = `
                <div class="grid grid-cols-2 gap-4 uppercase border-b border-white/10 pb-4">
                    <div><label class="text-[9px] font-black text-purple-400">EMPRESA</label>${editMode ? `<input id="edit_empresa" class="edit-input" value="${item.EMPRESA || ''}">` : `<p class="font-black text-white text-base leading-tight">${item.EMPRESA || '-'}</p>`}</div>
                    <div><label class="text-[9px] font-black text-purple-400">RAT</label>${editMode ? `<input id="edit_rat" class="edit-input" value="${item.RAT || ''}">` : `<p class="font-black text-purple-500 italic text-base font-mono">${item.RAT || '-'}</p>`}</div>
                </div>
                <div class="grid grid-cols-2 gap-4 uppercase border-b border-white/10 pb-4">
                    <div><label class="text-[9px] font-black text-purple-400">LOCAL</label>${editMode ? `<input id="edit_local" class="edit-input" value="${item.Local || ''}">` : `<p class="font-bold text-slate-200 text-sm">${item.Local || '-'}</p>`}</div>
                    <div><label class="text-[9px] font-black text-purple-400">TEMPO TOTAL</label><p class="font-bold text-white text-sm italic">${tempoTotal}</p></div>
                </div>
                <div><label class="text-[9px] font-black text-purple-400 uppercase">Descrição</label>${editMode ? `<textarea id="edit_desc" class="edit-input h-24">${item["DESCRIÇÃO"] || ''}</textarea>` : `<div class="bg-black/40 p-4 rounded-xl italic text-slate-400 text-xs border border-white/5 leading-relaxed">"${item["DESCRIÇÃO"] || '---'}"</div>`}</div>
                <div class="grid grid-cols-4 gap-2 text-center text-[8px] font-black uppercase">
                    <div class="bg-white/5 p-2 rounded-xl">Base<br>${editMode ? `<input id="edit_val" class="edit-input !p-1 text-center" value="${fixVal(item.VALOR)}">` : `<span class="text-white text-xs">${exibirMoeda(item.VALOR)}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Extra<br>${editMode ? `<input id="edit_extra" class="edit-input !p-1 text-center" value="${fixVal(item.EXTRA)}">` : `<span class="text-white text-xs">${exibirMoeda(item.EXTRA)}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Mat.<br>${editMode ? `<input id="edit_mat" class="edit-input !p-1 text-center" value="${fixVal(item.MATERIAL)}">` : `<span class="text-white text-xs">${exibirMoeda(item.MATERIAL)}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Transp.<br>${editMode ? `<input id="edit_transp" class="edit-input !p-1 text-center" value="${fixVal(item.TRANSP)}">` : `<span class="text-white text-xs">${exibirMoeda(item.TRANSP)}</span>`}</div>
                </div>
                <div class="btn-glass-purple p-6 rounded-3xl flex justify-between items-center text-white"><span class="text-[10px] font-black opacity-60 uppercase">Total Líquido</span><span class="text-2xl font-black italic">${item.TOTAL}</span></div>`;
        }

        async function deletarLancamento() {
            if(confirm("Deseja realmente excluir este lançamento?")) {
                const { error } = await supabaseClient.from('atendimentos').delete().eq('id', itemSendoEditado.id);
                if(!error) { fecharModal(); carregarLancamentos(); } else alert("Erro ao excluir!");
            }
        }

        async function salvarAlteracoes() {
            const v = fixVal(document.getElementById('edit_val').value), ex = fixVal(document.getElementById('edit_extra').value), ma = fixVal(document.getElementById('edit_mat').value), tr = fixVal(document.getElementById('edit_transp').value);
            const updates = { 
                EMPRESA: document.getElementById('edit_empresa').value.toUpperCase(), RAT: document.getElementById('edit_rat').value, Local: document.getElementById('edit_local').value.toUpperCase(), "DESCRIÇÃO": document.getElementById('edit_desc').value,
                VALOR: formatarParaDB(v), EXTRA: formatarParaDB(ex), MATERIAL: formatarParaDB(ma), TRANSP: formatarParaDB(tr), TOTAL: formatarParaDB(v+ex+ma+tr)
            };
            const { error } = await supabaseClient.from('atendimentos').update(updates).eq('id', itemSendoEditado.id);
            if (!error) { fecharModal(); carregarLancamentos(); } else alert("Erro ao salvar!");
        }

        function toggleEditMode() { editMode = !editMode; document.getElementById('modalFooter').classList.toggle('hidden', !editMode); renderizarModalBody(); }
        function fecharModal() { document.getElementById('modalDetalhes').style.display = "none"; editMode = false; }

        window.onload = () => { carregarLancamentos(); carregarEmpresas(); };
    </script>
</body>
</html>
