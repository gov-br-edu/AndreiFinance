<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro - Ultra Aurora Glass</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: #f1f5f9; min-height: 100vh; position: relative; overflow-x: hidden; }

        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .logo-central { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%); width: 320px; height: 320px; background: url("1781706422626.png") no-repeat center; background-size: contain; filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.6)); }

        .glass { background: rgba(15, 23, 42, 0.45) !important; backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.12); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); }
        .btn-glass-purple { background: linear-gradient(135deg, rgba(168, 85, 247, 0.8), rgba(107, 33, 168, 0.8)); transition: 0.3s; }

        /* Menu de Abas Animado */
        .tabs-container { position: relative; display: flex; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-indicator { position: absolute; height: calc(100% - 8px); top: 4px; left: 4px; border-radius: 12px; background: linear-gradient(135deg, #a855f7, #6b21a8); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        .tab-btn { position: relative; z-index: 2; transition: color 0.3s; }

        /* Inputs Dark */
        input, textarea, select { 
            background: rgba(15, 23, 42, 0.8) !important; 
            border: 1px solid rgba(168, 85, 247, 0.3) !important; 
            color: white !important; 
            border-radius: 12px !important;
        }

        .status-pago { border-left: 6px solid #10b981; }
        .status-naopago-tab { border-left: 6px solid #f97316; }
        .status-saida { border-left: 6px solid #ef4444; }
        .card-pendente-moldura { border: 2.5px solid #ef4444 !important; }

        .table-container { max-height: 60vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 10px; }

        #modalDetalhes { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .modal-card { max-height: 90vh; display: flex; flex-direction: column; width: 95%; max-width: 32rem; margin: auto; }
        .modal-body-scroll { overflow-y: auto; flex-grow: 1; padding: 1.5rem; }
        .circle-icon-btn { background: rgba(255, 255, 255, 0.15); border: 1.5px solid rgba(255, 255, 255, 0.5); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: white; transition: 0.2s; }
        .edit-input { width: 100%; border: 1px solid #a855f7 !important; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="bg-pattern">
        <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <path d="M-100,200 C300,100 500,600 900,100" fill="none" stroke="#a855f7" stroke-width="6" opacity="0.2" />
            <path d="M1100,800 C700,900 400,400 -100,800" fill="none" stroke="white" stroke-width="3" opacity="0.1" />
            <path d="M200,1100 C500,700 800,900 1100,600" fill="none" stroke="#6b21a8" stroke-width="8" opacity="0.2" />
            <path d="M0,500 C300,800 700,200 1000,500" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.1" />
            <path d="M-100,100 C200,400 800,0 1100,300" fill="none" stroke="white" stroke-width="2" opacity="0.05" />
        </svg>
        <div class="logo-central"></div>
    </div>

    <nav class="glass sticky top-0 z-50 px-4 h-20 border-b border-white/5 flex items-center">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <img src="1781706422626.png" class="h-14 w-14 rounded-xl object-cover">
            <div class="tabs-container">
                <div id="tabIndicator" class="tab-indicator"></div>
                <button onclick="showTab('lancamentos', this)" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold text-white">LANÇAMENTOS</button>
                <button onclick="showTab('fechamento', this)" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold text-slate-400">FECHAMENTO</button>
                <button onclick="showTab('dashboard', this)" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold text-slate-400">DASHBOARD</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <section id="tab-lancamentos" class="tab-content grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-3xl sticky top-28">
                    <form id="formAtendimento" class="space-y-4">
                        <div class="flex gap-2">
                            <button type="button" id="btnEntrada" onclick="setTipo('Entrada')" class="flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white">ENTRADA</button>
                            <button type="button" id="btnSaida" onclick="setTipo('Saída')" class="flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500">SAÍDA</button>
                        </div>
                        <input type="hidden" id="TIPO" value="Entrada">
                        <input type="date" id="DIA" class="w-full p-3 text-xs" required>
                        <input type="text" id="EMPRESA" placeholder="EMPRESA" class="w-full p-3 text-xs uppercase">
                        <input type="text" id="INTERMEDIO" placeholder="INTERMÉDIO" class="w-full p-3 text-xs uppercase">
                        <input type="text" id="Local" placeholder="LOCAL" class="w-full p-3 text-xs uppercase">
                        <input type="text" id="RAT" placeholder="RAT / OS" class="w-full p-3 text-xs">
                        <textarea id="DESCRICAO" placeholder="Descrição..." class="w-full p-3 text-xs h-20"></textarea>
                        <div class="grid grid-cols-2 gap-2 text-[10px]">
                            <input type="number" step="0.01" id="VALOR" placeholder="Valor Base">
                            <input type="number" step="0.01" id="EXTRA" placeholder="Extra">
                            <input type="number" step="0.01" id="ALIM" placeholder="Alim">
                            <input type="number" step="0.01" id="TRANSP" placeholder="Transp">
                        </div>
                        <button type="submit" id="btnSalvar" class="w-full btn-glass-purple text-white py-3 rounded-2xl font-black uppercase text-[10px]">GRAVAR</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-4">
                <div class="glass p-4 rounded-2xl">
                    <input type="text" id="inputBusca" onkeyup="filtrarLancamentos()" placeholder="Pesquisar..." class="w-full bg-transparent border-none outline-none text-sm">
                </div>
                <div class="glass rounded-3xl overflow-hidden">
                    <div class="table-container">
                        <table class="w-full text-left text-xs relative">
                            <thead class="bg-black/40 text-purple-300 font-bold uppercase sticky top-0 z-10 backdrop-blur-md">
                                <tr><th class="p-5">Data</th><th class="p-5">Empresa / RAT</th><th class="p-5 text-right">Total</th></tr>
                            </thead>
                            <tbody id="listaLancamentos" class="divide-y divide-white/5 text-slate-300"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
        <section id="tab-fechamento" class="tab-content hidden space-y-12"></section>
        <section id="tab-dashboard" class="tab-content hidden grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass p-8 rounded-3xl"><canvas id="chartFluxo"></canvas></div>
            <div class="glass p-8 rounded-3xl"><canvas id="chartEmpresas"></canvas></div>
        </section>
    </main>

    <!-- MODAL -->
    <div id="modalDetalhes">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="glass modal-card rounded-3xl overflow-hidden border border-purple-500/30">
                <div id="modalHeader" class="p-6 flex justify-between items-center text-white border-b border-white/10 sticky top-0 z-20 backdrop-blur-xl">
                    <span id="modalStatusText" class="font-black uppercase text-[10px] opacity-60 tracking-widest">DETALHES</span>
                    <div class="flex items-center gap-4">
                        <button onclick="toggleEditMode()" class="circle-icon-btn">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2.5"/></svg>
                        </button>
                        <button onclick="fecharModal()" class="text-4xl leading-none font-light">&times;</button>
                    </div>
                </div>
                <div id="modalBody" class="modal-body-scroll space-y-6"></div>
                <div id="modalFooter" class="p-6 hidden flex justify-end gap-3 border-t border-white/10 bg-black/60 backdrop-blur-md">
                    <button onclick="toggleEditMode()" class="px-5 py-2 text-xs font-bold text-slate-400">Cancelar</button>
                    <button onclick="salvarAlteracoes()" class="px-8 py-2 bg-emerald-600 rounded-xl text-xs font-black uppercase text-white shadow-lg">Confirmar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ctvnkjrpoyaancoxwles.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm5ranJwb3lhYW5jb3h3bGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDA2OTYsImV4cCI6MjA5NzIxNjY5Nn0.SSY-ys7ZC2wqOdprejhYILJUzdXZjWkZ8upocSGqaQ8";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let dadosCompletos = [], itemSendoEditado = null, editMode = false, tipoAtual = 'Entrada';
        const mesesNomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

        // --- FUNÇÕES DE MOEDA ---
        
        // Transforma string "R$ 1.200,50" ou "1200.50" em número real
        function fixVal(v) {
            if (!v) return 0;
            let str = v.toString().replace("R$", "").replace(/\s/g, "");
            // Se tiver vírgula e ponto, remove o ponto (milhar) e troca vírgula por ponto (decimal)
            if (str.includes(',') && str.includes('.')) {
                str = str.replace(/\./g, "").replace(",", ".");
            } else {
                // Se tiver apenas vírgula, assume que é decimal
                str = str.replace(",", ".");
            }
            return parseFloat(str) || 0;
        }

        // Formata número para string de banco de dados "R$ 1.200,50"
        function formatarParaDB(num) {
            return "R$ " + num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Exibe na tela limpando duplicidade
        function exibirMoeda(v) {
            if (!v) return "R$ 0,00";
            let limpo = v.toString().replace("R$", "").trim();
            return "R$ " + limpo;
        }

        // --- LÓGICA DE TABELA E FILTROS ---

        function normalizar(t) { return t ? t.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : ""; }

        async function carregarLancamentos() {
            const { data, error } = await supabaseClient.from('atendimentos').select('*').order('id', { ascending: false });
            if(!error) { dadosCompletos = data; renderizarTabela(data); }
        }

        function renderizarTabela(dados) {
            const lista = document.getElementById('listaLancamentos'); lista.innerHTML = '';
            dados.forEach(d => {
                let status = d.TIPO === 'Saída' ? "status-saida" : (d.PAGAMENTO === 'PAGO' ? "status-pago" : "status-naopago-tab");
                lista.innerHTML += `<tr onclick="abrirDetalhesDeFila(${d.id})" class="hover:bg-white/5 cursor-pointer border-b border-white/5 transition-colors text-slate-300"><td class="p-5 ${status}"><div class="font-bold text-slate-100">${d.DIA}</div><div class="text-[9px] text-purple-400 font-bold uppercase">${d.HORA || ''}</div></td><td class="p-5"><div class="font-bold text-slate-200 uppercase leading-tight">${d.EMPRESA || '-'}</div><div class="text-[9px] text-purple-700 font-bold italic">${d.RAT || ''}</div></td><td class="p-5 text-right font-black ${d.TIPO === 'Saída' ? 'text-red-400' : 'text-emerald-400'}">${exibirMoeda(d.TOTAL)}</td></tr>`;
            });
        }

        function filtrarLancamentos() {
            const t = normalizar(document.getElementById('inputBusca').value);
            renderizarTabela(dadosCompletos.filter(d => normalizar(d.DIA).includes(t) || normalizar(d.EMPRESA).includes(t) || normalizar(d.RAT).includes(t) || normalizar(d.Local).includes(t) || normalizar(d["INTERMÉDIO"]).includes(t) || d.TOTAL.toString().includes(t)));
        }

        // --- MODAL E EDIÇÃO ---

        async function abrirDetalhesDeFila(id) {
            itemSendoEditado = dadosCompletos.find(x => x.id === id); editMode = false;
            document.getElementById('modalFooter').classList.add('hidden');
            renderizarModalBody();
            document.getElementById('modalDetalhes').style.display = "block";
        }

        function renderizarModalBody() {
            const item = itemSendoEditado; const body = document.getElementById('modalBody'); const head = document.getElementById('modalHeader');
            let colorClass = item.TIPO === 'Saída' ? 'bg-red-500/80' : (item.PAGAMENTO === 'PAGO' ? 'bg-emerald-600/80' : 'bg-orange-500/80');
            head.className = `p-6 flex justify-between items-center text-white border-b border-white/10 sticky top-0 z-20 backdrop-blur-xl ${colorClass}`;

            body.innerHTML = `
                <div class="grid grid-cols-2 gap-4 uppercase border-b border-white/10 pb-4">
                    <div><label class="text-[9px] font-black text-purple-400">EMPRESA</label>${editMode ? `<input id="edit_empresa" class="edit-input" value="${item.EMPRESA || ''}">` : `<p class="font-black text-white text-base leading-tight">${item.EMPRESA || '-'}</p>`}</div>
                    <div><label class="text-[9px] font-black text-purple-400">RAT</label>${editMode ? `<input id="edit_rat" class="edit-input" value="${item.RAT || ''}">` : `<p class="font-black text-purple-500 italic text-base font-mono">${item.RAT || '-'}</p>`}</div>
                </div>
                <div class="grid grid-cols-2 gap-4 uppercase border-b border-white/10 pb-4">
                    <div><label class="text-[9px] font-black text-purple-400">INTERMÉDIO</label>${editMode ? `<input id="edit_inter" class="edit-input" value="${item["INTERMÉDIO"] || ''}">` : `<p class="font-bold text-slate-200 text-sm">${item["INTERMÉDIO"] || '-'}</p>`}</div>
                    <div><label class="text-[9px] font-black text-purple-400">LOCAL</label>${editMode ? `<input id="edit_local" class="edit-input" value="${item.Local || ''}">` : `<p class="font-bold text-slate-200 text-sm">${item.Local || '-'}</p>`}</div>
                </div>
                <div><label class="text-[9px] font-black text-purple-400 uppercase">Descrição</label>${editMode ? `<textarea id="edit_desc" class="edit-input h-24">${item["DESCRIÇÃO"] || ''}</textarea>` : `<div class="bg-black/40 p-4 rounded-xl italic text-slate-400 text-xs border border-white/5 leading-relaxed">"${item["DESCRIÇÃO"] || '---'}"</div>`}</div>
                <div class="grid grid-cols-4 gap-2 text-center text-[8px] font-black uppercase">
                    <div class="bg-white/5 p-2 rounded-xl">Base<br>${editMode ? `<input id="edit_val" class="edit-input !p-1 text-center" value="${fixVal(item.VALOR)}">` : `<span class="text-white text-xs">${exibirMoeda(item.VALOR)}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Extra<br>${editMode ? `<input id="edit_extra" class="edit-input !p-1 text-center" value="${fixVal(item.EXTRA)}">` : `<span class="text-white text-xs">${exibirMoeda(item.EXTRA)}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Alim<br>${editMode ? `<input id="edit_alim" class="edit-input !p-1 text-center" value="${fixVal(item.ALIM)}">` : `<span class="text-white text-xs">${exibirMoeda(item.ALIM)}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Transp<br>${editMode ? `<input id="edit_transp" class="edit-input !p-1 text-center" value="${fixVal(item.TRANSP)}">` : `<span class="text-white text-xs">${exibirMoeda(item.TRANSP)}</span>`}</div>
                </div>
                <div class="btn-glass-purple p-6 rounded-3xl flex justify-between items-center text-white"><span class="text-[10px] font-black opacity-60">Total Líquido</span><span class="text-2xl font-black italic">${exibirMoeda(item.TOTAL)}</span></div>`;
        }

        async function salvarAlteracoes() {
            const v = fixVal(document.getElementById('edit_val').value), ex = fixVal(document.getElementById('edit_extra').value), al = fixVal(document.getElementById('edit_alim').value), tr = fixVal(document.getElementById('edit_transp').value);
            const totalNum = v + ex + al + tr;
            const updates = { 
                EMPRESA: document.getElementById('edit_empresa').value.toUpperCase(), RAT: document.getElementById('edit_rat').value, "INTERMÉDIO": document.getElementById('edit_inter').value.toUpperCase(), Local: document.getElementById('edit_local').value.toUpperCase(), "DESCRIÇÃO": document.getElementById('edit_desc').value,
                VALOR: formatarParaDB(v), EXTRA: formatarParaDB(ex), ALIM: formatarParaDB(al), TRANSP: formatarParaDB(tr), TOTAL: formatarParaDB(totalNum)
            };
            const { error } = await supabaseClient.from('atendimentos').update(updates).eq('id', itemSendoEditado.id);
            if (!error) { fecharModal(); carregarLancamentos(); } else alert("Erro ao salvar!");
        }

        function toggleEditMode() { editMode = !editMode; document.getElementById('modalFooter').classList.toggle('hidden', !editMode); renderizarModalBody(); }
        function fecharModal() { document.getElementById('modalDetalhes').style.display = "none"; editMode = false; }

        // --- FECHAMENTO E ABAS ---

        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            const indicator = document.getElementById('tabIndicator');
            indicator.style.width = btn.offsetWidth + 'px'; indicator.style.left = btn.offsetLeft + 'px';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('text-white', 'text-slate-400'));
            btn.classList.replace('text-slate-400', 'text-white');
            if(tabId === 'fechamento') carregarFechamentoFinal(); if(tabId === 'dashboard') renderCharts(); if(tabId === 'lancamentos') carregarLancamentos();
        }

        async function carregarFechamentoFinal() {
            const container = document.getElementById('tab-fechamento'); container.innerHTML = '<div class="p-20 text-center animate-pulse uppercase font-black text-purple-500">Mapeando histórico...</div>';
            const { data: lancamentos } = await supabaseClient.from('atendimentos').select('*').eq('TIPO', 'Entrada');
            const { data: configs } = await supabaseClient.from('empresas_config').select('*');
            const grupos = {};
            lancamentos.forEach(l => {
                if(!l.DIA) return;
                const p = l.DIA.includes('-') ? l.DIA.split('-') : l.DIA.split('/');
                const a = p[0].length === 4 ? p[0] : p[2], m = p[1];
                const chave = `${a} - ${mesesNomes[parseInt(m)-1]}`;
                if(!grupos[chave]) grupos[chave] = { p: {}, pagos: [], tp: 0, trec: 0 };
                const v = fixVal(l.TOTAL);
                if(l.PAGAMENTO !== 'PAGO') {
                    const emp = l.EMPRESA || 'Outros'; if(!grupos[chave].p[emp]) grupos[chave].p[emp] = { total: 0, chamados: [], ids: [] };
                    grupos[chave].p[emp].total += v; grupos[chave].p[emp].chamados.push(l); grupos[chave].p[emp].ids.push(l.id); grupos[chave].tp += v;
                } else { grupos[chave].pagos.push(l); grupos[chave].trec += v; }
            });
            container.innerHTML = '<h2 class="text-xl font-black text-purple-400 italic border-b border-white/10 pb-4 uppercase tracking-tighter">Fechamentos Inteligentes</h2>';
            Object.keys(grupos).sort((a,b) => b.localeCompare(a)).forEach(m => {
                const g = grupos[m];
                let h = `<div class="space-y-8 mt-10"><div class="glass p-6 rounded-3xl border-l-8 border-purple-600 flex flex-col md:flex-row justify-between items-center shadow-2xl gap-4"><div><h3 class="text-sm font-black text-slate-100 uppercase tracking-widest">${m}</h3></div><div class="flex gap-10 text-right"><div><span class="text-[9px] font-bold text-slate-400 uppercase block">Recebido</span><span class="text-lg md:text-2xl font-black text-emerald-400 italic">${formatarParaDB(g.trec)}</span></div><div><span class="text-[9px] font-bold text-slate-400 uppercase block">Pendente</span><span class="text-lg md:text-2xl font-black text-purple-400 italic">${formatarParaDB(g.tp)}</span></div></div></div><div class="grid grid-cols-1 md:grid-cols-3 gap-6">`;
                Object.keys(g.p).forEach(e => {
                    const info = g.p[e], c = configs?.find(x => x.nome_empresa === e);
                    h += `<div class="glass p-6 rounded-3xl card-pendente-moldura flex flex-col justify-between shadow-xl"><div><h4 class="font-black text-white text-[10px] uppercase mb-4 border-b border-white/10 pb-2 tracking-widest">${e}</h4><div class="space-y-2 mb-6">${info.chamados.map(i => `<div class="flex justify-between items-start text-[9px] border-b border-white/5 pb-1"><div class="text-slate-400 font-bold">${i.DIA}</div><div class="font-black text-white italic">${exibirMoeda(i.TOTAL)}</div></div>`).join('')}</div></div><div><div class="flex justify-between items-center mb-4 px-2"><span class="text-[9px] font-black text-red-500 uppercase">Total:</span><span class="text-xl font-black text-purple-400 italic">${formatarParaDB(info.total)}</span></div><button onclick="marcarComoPago([${info.ids}])" class="w-full bg-emerald-500/20 border border-emerald-500/50 text-emerald-400 py-2 rounded-xl text-[9px] font-black uppercase hover:bg-emerald-500 transition-all mb-4">RECEBI PAGAMENTO</button><div class="text-[8px] text-slate-500 bg-black/40 p-3 rounded-2xl border border-white/5 space-y-1 text-left font-bold uppercase"><p>📧 Email: <span class="text-white">${c?.email_fechamento || '---'}</span></p><p>⏳ Prazo: <span class="text-white">${c?.prazo_envio || '---'}</span></p></div></div></div>`;
                });
                if(g.pagos.length > 0) h += `<div class="w-full bg-emerald-500/5 rounded-3xl p-6 border border-emerald-500/10 mt-6"><div class="flex justify-between mb-4 uppercase"><h5 class="text-[9px] font-black text-emerald-500 italic underline tracking-widest">✔ Histórico de Recebimentos</h5><span class="text-[10px] font-black text-emerald-600 italic">Mês Liquidado: ${formatarParaDB(g.trec)}</span></div><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">${g.pagos.map(p => `<div class="flex justify-between items-center text-[9px] border-b border-white/5 pb-1"><span class="text-[9px] font-bold text-slate-500 uppercase">${p.EMPRESA}</span><span class="font-black text-emerald-400 italic text-xs">${exibirMoeda(p.TOTAL)}</span></div>`).join('')}</div></div>`;
                container.innerHTML += h + `</div></div>`;
            });
        }

        async function marcarComoPago(ids) { if(confirm("Confirmar recebimento de todos os chamados desta empresa?")) { await supabaseClient.from('atendimentos').update({ PAGAMENTO: 'PAGO' }).in('id', ids); carregarFechamentoFinal(); } }
        
        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const d = document.getElementById('DIA').value.split('-');
            const v = fixVal(document.getElementById('VALOR').value), ex = fixVal(document.getElementById('EXTRA').value), al = fixVal(document.getElementById('ALIM').value), tr = fixVal(document.getElementById('TRANSP').value);
            const totalNum = v+ex+al+tr;
            const payload = {
                TIPO: tipoAtual, DIA: `${d[2]}/${d[1]}/${d[0]}`, EMPRESA: document.getElementById('EMPRESA').value.toUpperCase(), "INTERMÉDIO": document.getElementById('INTERMEDIO').value.toUpperCase(), Local: document.getElementById('Local').value.toUpperCase(), RAT: document.getElementById('RAT').value, "DESCRIÇÃO": document.getElementById('DESCRICAO').value,
                VALOR: formatarParaDB(v), EXTRA: formatarParaDB(ex), ALIM: formatarParaDB(al), TRANSP: formatarParaDB(tr), TOTAL: formatarParaDB(totalNum), PAGAMENTO: tipoAtual === 'Saída' ? 'SAÍDA' : 'NÃO PAGO', "Mês": parseInt(d[1]), "ANO": parseInt(d[0])
            };
            const { error } = await supabaseClient.from('atendimentos').insert([payload]);
            if(!error) location.reload(); else alert("Erro!");
        });

        async function renderCharts() {
            const { data } = await supabaseClient.from('atendimentos').select('*'); if(!data) return;
            const entradas = new Array(12).fill(0), saidas = new Array(12).fill(0), eMap = {};
            data.forEach(d => {
                if(!d.DIA) return;
                const p = d.DIA.includes('-') ? d.DIA.split('-') : d.DIA.split('/');
                const m = parseInt(p[0].length === 4 ? p[1] : p[1]) - 1, v = fixVal(d.TOTAL);
                if(m >= 0 && m < 12) { if(d.TIPO === 'Entrada') { entradas[m] += v; if(d.EMPRESA) eMap[d.EMPRESA] = (eMap[d.EMPRESA] || 0) + v; } else saidas[m] += v; }
            });
            new Chart(document.getElementById('chartFluxo'), { type: 'line', data: { labels: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"], datasets: [{ label: 'Ganhos', data: entradas, borderColor: '#10b981', tension: 0.4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)' }, { label: 'Gastos', data: saidas, borderColor: '#ef4444', tension: 0.4, fill: true, backgroundColor: 'rgba(239, 68, 68, 0.1)' }] }, options: { scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } } });
            const top = Object.entries(eMap).sort((a,b) => b[1]-a[1]).slice(0, 5);
            new Chart(document.getElementById('chartEmpresas'), { type: 'doughnut', data: { labels: top.map(x => x[0]), datasets: [{ data: top.map(x => x[1]), backgroundColor: ['#a855f7', '#10b981', '#f59e0b', '#ef4444', '#3b82f6'], borderWidth: 0 }] } });
        }

        window.onload = () => showTab('lancamentos', document.querySelector('.tab-btn'));
    </script>
</body>
</html>
