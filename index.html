<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro - Liquid Glass Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        body {
            background: #020617;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f1f5f9;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo com Linhas Brilhantes e Logo Central */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .logo-bg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -45%);
            width: 320px; height: 320px;
            background-image: url("1781706422626.png");
            background-size: contain;
            background-repeat: no-repeat;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.4));
        }

        /* Estilo Liquid Glass */
        .glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .btn-glass-purple {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.7), rgba(107, 33, 168, 0.7));
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .status-pago { border-left: 6px solid #10b981; }
        .status-naopago-tab { border-left: 6px solid #f97316; }
        .status-saida { border-left: 6px solid #ef4444; }
        .card-pendente-moldura { border: 2px solid rgba(239, 68, 68, 0.8) !important; }

        .table-container { max-height: 62vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 10px; }

        /* MODAL */
        #modalDetalhes { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); }
        .modal-card { max-height: 90vh; display: flex; flex-direction: column; width: 100%; max-width: 32rem; }
        .modal-body-scroll { overflow-y: auto; flex-grow: 1; padding: 1.5rem; }

        .circle-icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .circle-icon-btn:hover { background: rgba(168, 85, 247, 0.5); border-color: white; }

        input, textarea { background: rgba(0, 0, 0, 0.2) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .edit-input { width: 100%; border: 1px solid rgba(168, 85, 247, 0.5) !important; padding: 8px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>

    <!-- Fundo Dinâmico -->
    <div class="bg-pattern">
        <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <path d="M-100,500 C200,300 300,800 600,500 C800,300 1100,700 1100,500" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" />
            <path d="M-100,200 C300,100 500,500 800,200" fill="none" stroke="white" stroke-width="0.5" opacity="0.1" />
            <path d="M200,1100 C400,800 600,900 900,1100" fill="none" stroke="purple" stroke-width="1" opacity="0.2" />
        </svg>
        <div class="logo-bg"></div>
    </div>

    <nav class="glass sticky top-0 z-50 px-4 h-20 border-b border-white/5 flex items-center">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <img src="1781706422626.png" class="h-14 w-14 rounded-xl object-cover shadow-2xl">
            <div class="flex bg-black/30 p-1 rounded-2xl border border-white/5 uppercase">
                <button onclick="showTab('lancamentos')" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] md:text-xs font-bold btn-glass-purple text-white">LANÇAMENTOS</button>
                <button onclick="showTab('fechamento')" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] md:text-xs font-bold text-slate-400">FECHAMENTO</button>
                <button onclick="showTab('dashboard')" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] md:text-xs font-bold text-slate-400">DASHBOARD</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- GUIA 1: LANÇAMENTOS -->
        <section id="tab-lancamentos" class="tab-content grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-3xl sticky top-28">
                    <form id="formAtendimento" class="space-y-4">
                        <div class="flex gap-2">
                            <button type="button" id="btnEntrada" onclick="setTipo('Entrada')" class="flex-1 py-3 rounded-xl font-black text-[10px] btn-glass-purple text-white">ENTRADA</button>
                            <button type="button" id="btnSaida" onclick="setTipo('Saída')" class="flex-1 py-3 rounded-xl font-black text-[10px] bg-black/20 text-slate-500 border border-white/5">SAÍDA</button>
                        </div>
                        <input type="hidden" id="TIPO" value="Entrada">
                        <input type="date" id="DIA" class="w-full p-3 rounded-xl text-xs" required>
                        <input type="text" id="EMPRESA" placeholder="Empresa" class="w-full p-3 rounded-xl text-xs uppercase">
                        <input type="text" id="INTERMEDIO" placeholder="Intermédio" class="w-full p-3 rounded-xl text-xs uppercase">
                        <input type="text" id="Local" placeholder="Local" class="w-full p-3 rounded-xl text-xs uppercase">
                        <input type="text" id="RAT" placeholder="RAT / OS" class="w-full p-3 rounded-xl text-xs font-mono">
                        <textarea id="DESCRICAO" placeholder="Descrição..." class="w-full p-3 rounded-xl text-xs h-24"></textarea>
                        <div class="grid grid-cols-2 gap-2 text-[10px]">
                            <input type="number" step="0.01" id="VALOR" placeholder="Valor">
                            <input type="number" step="0.01" id="EXTRA" placeholder="Extra">
                            <input type="number" step="0.01" id="ALIM" placeholder="Alim">
                            <input type="number" step="0.01" id="TRANSP" placeholder="Transp">
                        </div>
                        <button type="submit" id="btnSalvar" class="w-full btn-glass-purple text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">GRAVAR NO BANCO</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-3 h-fit flex flex-col gap-4">
                <div class="glass p-4 rounded-2xl flex items-center gap-4">
                    <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" /></svg>
                    <input type="text" id="inputBusca" onkeyup="filtrarLancamentos()" placeholder="Pesquisar empresa, data, valor, intermédio..." class="w-full bg-transparent !border-none outline-none text-sm">
                </div>
                <div class="glass rounded-3xl overflow-hidden">
                    <div class="table-container">
                        <table class="w-full text-left text-xs relative">
                            <thead class="bg-black/40 text-purple-300 font-bold uppercase sticky top-0 z-10 backdrop-blur-md">
                                <tr><th class="p-5">Data / Hora</th><th class="p-5">Empresa / RAT</th><th class="p-5 text-right font-black">Total</th></tr>
                            </thead>
                            <tbody id="listaLancamentos" class="divide-y divide-white/5 text-slate-300"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- FECHAMENTO E DASHBOARD -->
        <section id="tab-fechamento" class="tab-content hidden space-y-12"></section>
        <section id="tab-dashboard" class="tab-content hidden grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass p-8 rounded-3xl shadow-2xl"><canvas id="chartFluxo"></canvas></div>
            <div class="glass p-8 rounded-3xl shadow-2xl"><canvas id="chartEmpresas"></canvas></div>
        </section>
    </main>

    <!-- MODAL DETALHES -->
    <div id="modalDetalhes">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="glass modal-card rounded-3xl overflow-hidden border border-purple-500/30">
                <div id="modalHeader" class="p-6 flex justify-between items-center text-white border-b border-white/10 sticky top-0 z-20">
                    <span id="modalStatusText" class="font-black uppercase text-[10px] tracking-widest opacity-60">DETALHES</span>
                    <div class="flex items-center gap-3">
                        <button onclick="toggleEditMode()" class="circle-icon-btn">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2" /></svg>
                        </button>
                        <button onclick="fecharModal()" class="text-4xl font-light leading-none hover:text-purple-400">&times;</button>
                    </div>
                </div>
                <div id="modalBody" class="modal-body-scroll space-y-6"></div>
                <div id="modalFooter" class="p-6 hidden flex justify-end gap-3 border-t border-white/10 bg-black/40">
                    <button onclick="toggleEditMode()" class="px-5 py-2 text-xs font-bold text-slate-400">Cancelar</button>
                    <button onclick="salvarAlteracoes()" class="px-8 py-2 bg-emerald-600 rounded-xl text-xs font-black uppercase text-white shadow-lg">Confirmar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ctvnkjrpoyaancoxwles.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm5ranJwb3lhYW5jb3h3bGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDA2OTYsImV4cCI6MjA5NzIxNjY5Nn0.SSY-ys7ZC2wqOdprejhYILJUzdXZjWkZ8upocSGqaQ8";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let dadosCompletos = [];
        let itemSendoEditado = null;
        let editMode = false;
        let tipoAtual = 'Entrada';
        const mesesNomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

        function normalizar(t) { return t ? t.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : ""; }

        function setTipo(t) {
            tipoAtual = t;
            const bE = document.getElementById('btnEntrada'), bS = document.getElementById('btnSaida');
            bE.className = t === 'Entrada' ? "flex-1 py-3 rounded-xl font-black text-[10px] btn-glass-purple text-white" : "flex-1 py-3 rounded-xl font-black text-[10px] bg-black/20 text-slate-500 border border-white/5";
            bS.className = t === 'Saída' ? "flex-1 py-3 rounded-xl font-black text-[10px] btn-glass-purple text-white" : "flex-1 py-3 rounded-xl font-black text-[10px] bg-black/20 text-slate-500 border border-white/5";
        }

        async function carregarLancamentos() {
            const { data, error } = await supabaseClient.from('atendimentos').select('*').order('id', { ascending: false });
            if(!error) { dadosCompletos = data; renderizarTabela(data); }
        }

        function renderizarTabela(dados) {
            const lista = document.getElementById('listaLancamentos');
            lista.innerHTML = '';
            dados.forEach(d => {
                let status = d.TIPO === 'Saída' ? "status-saida" : (d.PAGAMENTO === 'PAGO' ? "status-pago" : "status-naopago-tab");
                lista.innerHTML += `<tr onclick="abrirDetalhesDeFila(${d.id})" class="hover:bg-white/5 cursor-pointer border-b border-white/5"><td class="p-5 ${status}"><div class="font-bold text-slate-100">${d.DIA}</div><div class="text-[9px] text-purple-400 font-bold uppercase">${d.HORA || ''}</div></td><td class="p-5"><div class="font-bold text-slate-200 uppercase">${d.EMPRESA || '-'}</div><div class="text-[9px] text-purple-700 font-bold italic">${d.RAT || ''}</div></td><td class="p-5 text-right font-black ${d.TIPO === 'Saída' ? 'text-red-400' : 'text-emerald-400'}">R$ ${d.TOTAL || '0.00'}</td></tr>`;
            });
        }

        function filtrarLancamentos() {
            const t = normalizar(document.getElementById('inputBusca').value);
            renderizarTabela(dadosCompletos.filter(d => normalizar(d.DIA).includes(t) || normalizar(d.EMPRESA).includes(t) || normalizar(d.RAT).includes(t) || normalizar(d.Local).includes(t) || normalizar(d["INTERMÉDIO"]).includes(t) || d.TOTAL.includes(t)));
        }

        async function abrirDetalhesDeFila(id) {
            itemSendoEditado = dadosCompletos.find(x => x.id === id);
            editMode = false;
            document.getElementById('modalFooter').classList.add('hidden');
            renderizarModalBody();
            document.getElementById('modalDetalhes').style.display = "block";
        }

        function renderizarModalBody() {
            const item = itemSendoEditado;
            const body = document.getElementById('modalBody');
            const head = document.getElementById('modalHeader');
            let bg = item.TIPO === 'Saída' ? 'bg-red-500/60' : (item.PAGAMENTO === 'PAGO' ? 'bg-emerald-600/60' : 'bg-amber-600/60');
            head.className = `p-6 flex justify-between items-center text-white ${bg} backdrop-blur-md sticky top-0 z-20 border-b border-white/10`;

            body.innerHTML = `
                <div class="grid grid-cols-2 gap-6 uppercase border-b border-white/10 pb-4">
                    <div><label class="text-[9px] font-black text-purple-400 block mb-1">EMPRESA</label>${editMode ? `<input id="edit_empresa" class="edit-input" value="${item.EMPRESA || ''}">` : `<p class="font-black text-white text-base">${item.EMPRESA || '-'}</p>`}</div>
                    <div><label class="text-[9px] font-black text-purple-400 block mb-1">RAT / OS</label>${editMode ? `<input id="edit_rat" class="edit-input" value="${item.RAT || ''}">` : `<p class="font-black text-purple-500 italic text-base">${item.RAT || '-'}</p>`}</div>
                </div>
                <div class="grid grid-cols-2 gap-6 uppercase border-b border-white/10 pb-4">
                    <div><label class="text-[9px] font-black text-purple-400 block mb-1">INTERMÉDIO</label>${editMode ? `<input id="edit_inter" class="edit-input" value="${item["INTERMÉDIO"] || ''}">` : `<p class="font-bold text-slate-200 text-sm">${item["INTERMÉDIO"] || '-'}</p>`}</div>
                    <div><label class="text-[9px] font-black text-purple-400 block mb-1">LOCAL</label>${editMode ? `<input id="edit_local" class="edit-input" value="${item.Local || ''}">` : `<p class="font-bold text-slate-200 text-sm">${item.Local || '-'}</p>`}</div>
                </div>
                <div><label class="text-[9px] font-black text-purple-400 block mb-1">DESCRIÇÃO</label>${editMode ? `<textarea id="edit_desc" class="edit-input h-24">${item["DESCRIÇÃO"] || ''}</textarea>` : `<div class="bg-black/40 p-4 rounded-xl italic text-slate-400 text-xs leading-relaxed border border-white/5">"${item["DESCRIÇÃO"] || '---'}"</div>`}</div>
                <div class="grid grid-cols-4 gap-2 text-center text-[8px] font-black uppercase">
                    <div class="bg-white/5 p-2 rounded-xl">Base<br>${editMode ? `<input id="edit_val" class="edit-input !p-1 text-center" value="${item.VALOR || 0}">` : `<span class="text-white text-xs">${item.VALOR || 0}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Extra<br>${editMode ? `<input id="edit_extra" class="edit-input !p-1 text-center" value="${item.EXTRA || 0}">` : `<span class="text-white text-xs">${item.EXTRA || 0}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Alim<br>${editMode ? `<input id="edit_alim" class="edit-input !p-1 text-center" value="${item.ALIM || 0}">` : `<span class="text-white text-xs">${item.ALIM || 0}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Transp<br>${editMode ? `<input id="edit_transp" class="edit-input !p-1 text-center" value="${item.TRANSP || 0}">` : `<span class="text-white text-xs">${item.TRANSP || 0}</span>`}</div>
                </div>
                <div class="btn-glass-purple p-6 rounded-3xl flex justify-between items-center text-white shadow-2xl mt-4"><span class="text-[10px] font-black uppercase opacity-60 italic">Total Acumulado</span><span class="text-2xl font-black italic tracking-tighter">R$ ${item.TOTAL || '0.00'}</span></div>`;
        }

        function toggleEditMode() { editMode = !editMode; document.getElementById('modalFooter').classList.toggle('hidden', !editMode); renderizarModalBody(); }

        async function salvarAlteracoes() {
            const v = parseFloat(document.getElementById('edit_val').value || 0);
            const ex = parseFloat(document.getElementById('edit_extra').value || 0);
            const al = parseFloat(document.getElementById('edit_alim').value || 0);
            const tr = parseFloat(document.getElementById('edit_transp').value || 0);
            const total = (v + ex + al + tr).toFixed(2);

            const { error } = await supabaseClient.from('atendimentos').update({
                EMPRESA: document.getElementById('edit_empresa').value,
                RAT: document.getElementById('edit_rat').value,
                "INTERMÉDIO": document.getElementById('edit_inter').value,
                Local: document.getElementById('edit_local').value,
                "DESCRIÇÃO": document.getElementById('edit_desc').value,
                VALOR: v.toFixed(2), EXTRA: ex.toFixed(2), ALIM: al.toFixed(2), TRANSP: tr.toFixed(2), TOTAL: total
            }).eq('id', itemSendoEditado.id);

            if (error) alert("Erro ao salvar!"); else { fecharModal(); carregarLancamentos(); }
        }

        function fecharModal() { document.getElementById('modalDetalhes').style.display = "none"; editMode = false; }
        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            if(t === 'fechamento') carregarFechamentoFinal();
            if(t === 'dashboard') renderCharts();
        }
        
        function fixVal(v) { return parseFloat(v.toString().replace("R$", "").replace(/\s/g, "").replace(/\./g, "").replace(",", ".")) || 0; }

        async function carregarFechamentoFinal() {
            const container = document.getElementById('tab-fechamento'); container.innerHTML = '<div class="p-20 text-center animate-pulse">Cruzando Dados...</div>';
            const { data: lancamentos } = await supabaseClient.from('atendimentos').select('*').eq('TIPO', 'Entrada');
            const { data: configs } = await supabaseClient.from('empresas_config').select('*');
            const grupos = {};
            lancamentos.forEach(l => {
                const dt = (l.DIA || "").includes('-') ? {a: l.DIA.split('-')[0], m: l.DIA.split('-')[1]} : {a: l.DIA.split('/')[2], m: l.DIA.split('/')[1]};
                const chave = `${dt.a} - ${mesesNomes[parseInt(dt.m)-1]}`;
                if(!grupos[chave]) grupos[chave] = { pendentes: {}, pagos: [], totalMesP: 0, totalMesRec: 0 };
                const val = fixVal(l.TOTAL);
                if(l.PAGAMENTO !== 'PAGO') {
                    const emp = l.EMPRESA || 'Outros'; if(!grupos[chave].pendentes[emp]) grupos[chave].pendentes[emp] = { total: 0, chamados: [], ids: [] };
                    grupos[chave].pendentes[emp].total += val; grupos[chave].pendentes[emp].chamados.push(l); grupos[chave].pendentes[emp].ids.push(l.id); grupos[chave].totalMesP += val;
                } else { grupos[chave].pagos.push(l); grupos[chave].totalMesRec += val; }
            });
            container.innerHTML = '<h2 class="text-xl font-black text-purple-400 uppercase italic border-b border-white/10 pb-4">Fechamentos Inteligentes</h2>';
            Object.keys(grupos).sort((a,b) => b.localeCompare(a)).forEach(mes => {
                const g = grupos[mes];
                let html = `<div class="space-y-8 mt-10"><div class="glass p-6 rounded-3xl border-l-8 border-purple-600 flex justify-between items-center shadow-2xl"><div><h3 class="text-sm font-black text-slate-100 uppercase">${mes}</h3></div><div class="flex gap-10 text-right"><div><span class="text-[9px] font-bold text-slate-400 uppercase block">Recebido</span><span class="text-lg md:text-2xl font-black text-emerald-400 italic font-mono">R$ ${g.totalMesRec.toFixed(2)}</span></div><div><span class="text-[9px] font-bold text-slate-400 uppercase block">Pendente</span><span class="text-lg md:text-2xl font-black text-purple-400 italic font-mono">R$ ${g.totalMesP.toFixed(2)}</span></div></div></div><div class="grid grid-cols-1 md:grid-cols-3 gap-6">`;
                Object.keys(g.pendentes).forEach(emp => {
                    const info = g.pendentes[emp]; const conf = configs?.find(x => x.nome_empresa === emp);
                    html += `<div class="glass p-6 rounded-3xl card-pendente-moldura flex flex-col justify-between shadow-xl"><div><h4 class="font-black text-white text-[10px] uppercase mb-4 border-b border-white/10 pb-2">${emp}</h4><div class="space-y-2 mb-6">${info.chamados.map(i => `<div class="flex justify-between items-start text-[9px] border-b border-white/5 pb-1"><div class="text-slate-400 font-bold">${i.DIA} <span class="text-[8px] opacity-40 ml-1">(${i.Local || '-'})</span></div><div class="font-black text-white italic">R$ ${i.TOTAL}</div></div>`).join('')}</div></div><div><div class="flex justify-between items-center mb-4 px-2"><span class="text-[9px] font-black text-red-500 uppercase">A Receber:</span><span class="text-xl font-black text-purple-400 italic">R$ ${info.total.toFixed(2)}</span></div><button onclick="marcarComoPago([${info.ids}])" class="w-full bg-emerald-500/20 border border-emerald-500/50 text-emerald-400 py-2 rounded-xl text-[9px] font-black hover:bg-emerald-600 hover:text-white transition-all mb-4">RECEBI O PAGAMENTO</button><div class="text-[8px] text-slate-500 bg-black/40 p-3 rounded-2xl border border-white/5 space-y-1"><p class="flex justify-between"><span>E-MAIL:</span> <b class="text-white">${conf?.email_fechamento || '---'}</b></p><p class="flex justify-between"><span>PRAZO:</span> <b class="text-white">${conf?.prazo_envio || '---'}</b></p></div></div></div>`;
                });
                html += `</div>`;
                if(g.pagos.length > 0) {
                    html += `<div class="bg-emerald-500/5 rounded-3xl p-6 border border-emerald-500/10"><div class="flex justify-between items-center mb-4"><h5 class="text-[9px] font-black text-emerald-500 uppercase italic">✔ HISTÓRICO DE RECEBIMENTOS</h5><span class="text-[10px] font-black text-emerald-600 uppercase italic">Mês Liquidado: R$ ${g.totalMesRec.toFixed(2)}</span></div><div class="grid grid-cols-1 md:grid-cols-4 gap-4">${g.pagos.map(p => `<div class="flex justify-between items-center text-[9px] border-b border-white/5 pb-1"><span class="font-bold text-slate-500 uppercase">${p.EMPRESA}</span><span class="font-black text-emerald-400 italic text-xs">R$ ${p.TOTAL}</span></div>`).join('')}</div></div>`;
                }
                container.innerHTML += html + `</div>`;
            });
        }
        async function marcarComoPago(ids) { if(confirm("Confirmar recebimento?")) { await supabaseClient.from('atendimentos').update({ PAGAMENTO: 'PAGO' }).in('id', ids); carregarFechamentoFinal(); } }
        
        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const d = document.getElementById('DIA').value.split('-');
            const v = fixVal(document.getElementById('VALOR').value), ex = fixVal(document.getElementById('EXTRA').value), al = fixVal(document.getElementById('ALIM').value), tr = fixVal(document.getElementById('TRANSP').value);
            const payload = {
                TIPO: tipoAtual, DIA: `${d[2]}/${d[1]}/${d[0]}`, EMPRESA: document.getElementById('EMPRESA').value.toUpperCase(), "INTERMÉDIO": document.getElementById('INTERMEDIO').value.toUpperCase(), Local: document.getElementById('Local').value.toUpperCase(), RAT: document.getElementById('RAT').value, "DESCRIÇÃO": document.getElementById('DESCRICAO').value,
                VALOR: v.toFixed(2), EXTRA: ex.toFixed(2), ALIM: al.toFixed(2), TRANSP: tr.toFixed(2), TOTAL: (v+ex+al+tr).toFixed(2), PAGAMENTO: tipoAtual === 'Saída' ? 'SAÍDA' : 'NÃO PAGO', "Mês": parseInt(d[1]), "ANO": parseInt(d[0])
            };
            await supabaseClient.from('atendimentos').insert([payload]); location.reload();
        });

        async function renderCharts() {
            const { data } = await supabaseClient.from('atendimentos').select('*'); if(!data) return;
            const entradas = new Array(12).fill(0), saidas = new Array(12).fill(0), eMap = {};
            data.forEach(d => {
                const dt = (d.DIA || "").includes('-') ? {m: d.DIA.split('-')[1]} : {m: d.DIA.split('/')[1]};
                const m = parseInt(dt.m) - 1, v = fixVal(d.TOTAL);
                if(m >= 0 && m < 12) { if(d.TIPO === 'Entrada') { entradas[m] += v; if(d.EMPRESA) eMap[d.EMPRESA] = (eMap[d.EMPRESA] || 0) + v; } else saidas[m] += v; }
            });
            new Chart(document.getElementById('chartFluxo'), { type: 'line', data: { labels: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"], datasets: [{ label: 'Ganhos', data: entradas, borderColor: '#10b981', tension: 0.4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)' }, { label: 'Gastos', data: saidas, borderColor: '#ef4444', tension: 0.4, fill: true, backgroundColor: 'rgba(239, 68, 68, 0.1)' }] }, options: { scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } } });
            const top = Object.entries(eMap).sort((a,b) => b[1]-a[1]).slice(0, 5);
            new Chart(document.getElementById('chartEmpresas'), { type: 'doughnut', data: { labels: top.map(x => x[0]), datasets: [{ data: top.map(x => x[1]), backgroundColor: ['#a855f7', '#10b981', '#f59e0b', '#ef4444', '#3b82f6'], borderWidth: 0 }] } });
        }
        carregarLancamentos();
    </script>
</body>
</html>
