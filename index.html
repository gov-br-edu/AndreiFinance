<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro - Gestão Técnica</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .entrada-paga { border-left: 6px solid #10b981; }
        .entrada-pendente { border-left: 6px solid #facc15; }
        .saida { border-left: 6px solid #ef4444; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <!-- Navegação Superior -->
    <nav class="bg-indigo-950 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <h1 class="font-black text-xl italic tracking-tighter">FINANCE_PRO</h1>
            <div class="flex space-x-1 bg-indigo-900 p-1 rounded-lg">
                <button onclick="showTab('lancamentos')" class="tab-btn px-4 py-2 rounded-md text-sm font-bold bg-indigo-700 text-white">Lançamentos</button>
                <button onclick="showTab('fechamento')" class="tab-btn px-4 py-2 rounded-md text-sm font-bold text-indigo-300 hover:bg-indigo-800">Fechamento</button>
                <button onclick="showTab('dashboard')" class="tab-btn px-4 py-2 rounded-md text-sm font-bold text-indigo-300 hover:bg-indigo-800">Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">

        <!-- GUIA 1: LANÇAMENTOS -->
        <section id="tab-lancamentos" class="tab-content grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Painel de Inserção -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-md sticky top-20 border border-slate-200">
                    <h2 class="font-black text-slate-800 mb-6 text-sm uppercase tracking-widest">Novo Lançamento</h2>
                    
                    <form id="formAtendimento" class="space-y-4">
                        <!-- Seleção de Tipo (Botões) -->
                        <div class="flex space-x-2">
                            <button type="button" id="btnEntrada" onclick="setTipo('Entrada')" class="flex-1 py-3 rounded-xl font-bold transition-all border-2 border-emerald-500 bg-emerald-500 text-white">ENTRADA</button>
                            <button type="button" id="btnSaida" onclick="setTipo('Saída')" class="flex-1 py-3 rounded-xl font-bold transition-all border-2 border-slate-200 text-slate-400">SAÍDA</button>
                        </div>
                        <input type="hidden" id="TIPO" value="Entrada">

                        <div class="grid grid-cols-1 gap-3">
                            <input type="date" id="DIA" class="w-full border p-3 rounded-xl bg-slate-50 text-sm" required>
                            <input type="text" id="HORA" placeholder="Hora (Ex: 09:00 às 17:00)" class="w-full border p-3 rounded-xl bg-slate-50 text-sm">
                            <input type="text" id="EMPRESA" placeholder="Empresa / Cliente" class="w-full border p-3 rounded-xl bg-slate-50 text-sm">
                            <input type="text" id="INTERMEDIO" placeholder="Intermédio" class="w-full border p-3 rounded-xl bg-slate-50 text-sm">
                            <input type="text" id="Local" placeholder="Local / Unidade" class="w-full border p-3 rounded-xl bg-slate-50 text-sm">
                            <input type="text" id="RAT" placeholder="RAT / Ordem de Serviço" class="w-full border p-3 rounded-xl bg-slate-50 text-sm">
                        </div>

                        <textarea id="DESCRICAO" placeholder="Descrição breve..." class="w-full border p-3 rounded-xl bg-slate-50 text-sm h-24"></textarea>

                        <div class="grid grid-cols-2 gap-2 font-bold text-xs">
                            <input type="number" step="0.01" id="VALOR" placeholder="VALOR R$" class="border p-3 rounded-xl bg-slate-50">
                            <input type="number" step="0.01" id="EXTRA" placeholder="EXTRA R$" class="border p-3 rounded-xl bg-slate-50">
                            <input type="number" step="0.01" id="ALIM" placeholder="ALIMENTAÇÃO R$" class="border p-3 rounded-xl bg-slate-50">
                            <input type="number" step="0.01" id="TRANSP" placeholder="TRANSPORTE R$" class="border p-3 rounded-xl bg-slate-50">
                        </div>

                        <button type="submit" id="btnSalvar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-black shadow-lg shadow-indigo-100 transition-all">SALVAR REGISTRO</button>
                    </form>
                </div>
            </div>

            <!-- Tabela de Dados -->
            <div class="lg:col-span-3">
                <div class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 border-b text-slate-400 font-bold uppercase text-[10px] tracking-wider">
                                <tr>
                                    <th class="p-4">Data / Hora</th>
                                    <th class="p-4">Empresa / RAT</th>
                                    <th class="p-4">Intermédio</th>
                                    <th class="p-4">Local</th>
                                    <th class="p-4 text-right">Valor Total</th>
                                </tr>
                            </thead>
                            <tbody id="listaLancamentos" class="divide-y divide-slate-100">
                                <!-- Dados via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- GUIA 2: FECHAMENTO -->
        <section id="tab-fechamento" class="tab-content hidden animate-fadeIn">
            <!-- Conteúdo de fechamento igual ao anterior -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-wrap items-end gap-4">
                <div class="flex-1 min-w-[200px]"><input type="month" id="filtroMes" class="w-full border p-3 rounded-xl bg-slate-50"></div>
                <button onclick="gerarFechamento()" class="bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold">GERAR FECHAMENTO</button>
            </div>
            <div id="cardsFechamento" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <!-- GUIA 3: DASHBOARD -->
        <section id="tab-dashboard" class="tab-content hidden grid grid-cols-1 lg:grid-cols-2 gap-6 animate-fadeIn">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200"><canvas id="chartFluxo"></canvas></div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200"><canvas id="chartEmpresas"></canvas></div>
        </section>

    </main>

    <!-- MODAL DE DETALHES -->
    <div id="modalDetalhes" class="modal flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl animate-scaleIn">
            <div id="modalHeader" class="p-6 text-white flex justify-between items-center">
                <h3 class="font-black uppercase tracking-widest text-sm">Detalhes do Lançamento</h3>
                <button onclick="fecharModal()" class="text-2xl font-bold">&times;</button>
            </div>
            <div class="p-6 space-y-4" id="modalBody">
                <!-- Conteúdo via JS -->
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ctvnkjrpoyaancoxwles.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm5ranJwb3lhYW5jb3h3bGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDA2OTYsImV4cCI6MjA5NzIxNjY5Nn0.SSY-ys7ZC2wqOdprejhYILJUzdXZjWkZ8upocSGqaQ8"; // << COLOQUE SUA KEY
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let tipoAtual = 'Entrada';
        let dadosCompletos = [];

        // --- CONTROLE DE TIPO (BOTÕES) ---
        function setTipo(tipo) {
            tipoAtual = tipo;
            document.getElementById('TIPO').value = tipo;
            const bE = document.getElementById('btnEntrada');
            const bS = document.getElementById('btnSaida');

            if(tipo === 'Entrada') {
                bE.className = "flex-1 py-3 rounded-xl font-bold transition-all border-2 border-emerald-500 bg-emerald-500 text-white";
                bS.className = "flex-1 py-3 rounded-xl font-bold transition-all border-2 border-slate-200 text-slate-400";
            } else {
                bS.className = "flex-1 py-3 rounded-xl font-bold transition-all border-2 border-red-500 bg-red-500 text-white";
                bE.className = "flex-1 py-3 rounded-xl font-bold transition-all border-2 border-slate-200 text-slate-400";
            }
        }

        // --- NAVEGAÇÃO ---
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('bg-indigo-700', 'text-white'));
            event.currentTarget.classList.add('bg-indigo-700', 'text-white');
            if(tabId === 'dashboard') renderCharts();
        }

        // --- LIMPEZA DE VALOR ---
        function fixVal(v) {
            if(!v) return 0;
            return parseFloat(v.toString().replace("R$", "").replace(/\./g, "").replace(",", ".")) || 0;
        }

        // --- CARREGAR TODOS OS LANÇAMENTOS ---
        async function carregarLancamentos() {
            const lista = document.getElementById('listaLancamentos');
            lista.innerHTML = '<tr><td colspan="5" class="p-10 text-center">Carregando histórico completo...</td></tr>';

            const { data, error } = await supabaseClient
                .from('atendimentos')
                .select('*')
                .order('id', { ascending: false });

            if(error) return alert("Erro ao carregar");
            
            dadosCompletos = data;
            lista.innerHTML = '';

            data.forEach((d, index) => {
                let statusCor = "saida"; // Padrão Saída (Vermelho)
                if(d.TIPO === 'Entrada') {
                    statusCor = (d.PAGAMENTO === 'PAGO') ? "entrada-paga" : "entrada-pendente";
                }

                lista.innerHTML += `
                    <tr onclick="abrirDetalhes(${index})" class="hover:bg-slate-50 cursor-pointer transition">
                        <td class="p-4 ${statusCor}">
                            <div class="font-bold text-slate-800">${d.DIA || '-'}</div>
                            <div class="text-[10px] text-slate-400">${d.HORA || ''}</div>
                        </td>
                        <td class="p-4">
                            <div class="font-bold text-slate-700">${d.EMPRESA || '-'}</div>
                            <div class="text-[10px] text-indigo-500 font-bold uppercase italic">${d.RAT || ''}</div>
                        </td>
                        <td class="p-4 text-slate-500 text-xs">${d["INTERMÉDIO"] || d.INTERMEDIO || '-'}</td>
                        <td class="p-4 text-slate-500 text-xs">${d.Local || '-'}</td>
                        <td class="p-4 text-right">
                            <div class="font-black ${d.TIPO === 'Saída' ? 'text-red-500' : 'text-emerald-600'}">R$ ${d.TOTAL || '0,00'}</div>
                        </td>
                    </tr>
                `;
            });
        }

        // --- SISTEMA DE DETALHES (MODAL) ---
        function abrirDetalhes(index) {
            const item = dadosCompletos[index];
            const modal = document.getElementById('modalDetalhes');
            const header = document.getElementById('modalHeader');
            const body = document.getElementById('modalBody');

            // Cor do Header baseada no Status
            let bg = "bg-red-500";
            if(item.TIPO === 'Entrada') bg = (item.PAGAMENTO === 'PAGO') ? "bg-emerald-500" : "bg-yellow-500";
            header.className = `p-6 text-white flex justify-between items-center ${bg}`;

            body.innerHTML = `
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Descrição do Serviço</label>
                    <p class="text-sm text-slate-700 bg-slate-50 p-4 rounded-xl border italic mt-1">"${item["DESCRIÇÃO"] || item.descricao || 'Sem descrição.'}"</p>
                </div>
                <div class="grid grid-cols-2 gap-4 pt-2">
                    <div class="border-b pb-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase">Valor Base</label>
                        <p class="font-bold text-slate-700">R$ ${item.VALOR || '0,00'}</p>
                    </div>
                    <div class="border-b pb-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase">Extra</label>
                        <p class="font-bold text-slate-700">R$ ${item.EXTRA || '0,00'}</p>
                    </div>
                    <div class="border-b pb-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase">Alimentação</label>
                        <p class="font-bold text-slate-700">R$ ${item.ALIM || '0,00'}</p>
                    </div>
                    <div class="border-b pb-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase">Transporte</label>
                        <p class="font-bold text-slate-700">R$ ${item.TRANSP || '0,00'}</p>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-indigo-50 p-4 rounded-2xl border border-indigo-100 mt-4">
                    <div class="text-xs font-black text-indigo-400 uppercase italic">Status: ${item.PAGAMENTO || 'NÃO PAGO'}</div>
                    <div class="text-right">
                        <span class="text-[10px] font-black text-indigo-300 uppercase">Total Final</span>
                        <p class="text-2xl font-black text-indigo-700 leading-tight">R$ ${item.TOTAL || '0,00'}</p>
                    </div>
                </div>
            `;
            modal.style.display = "flex";
        }

        function fecharModal() { document.getElementById('modalDetalhes').style.display = "none"; }

        // --- SALVAR ---
        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            const dIn = document.getElementById('DIA').value;
            const v = parseFloat(document.getElementById('VALOR').value || 0);
            const ex = parseFloat(document.getElementById('EXTRA').value || 0);
            const al = parseFloat(document.getElementById('ALIM').value || 0);
            const tr = parseFloat(document.getElementById('TRANSP').value || 0);
            const total = (v + ex + al + tr).toFixed(2);

            const payload = {
                TIPO: tipoAtual,
                DIA: dIn.split('-').reverse().join('/'),
                HORA: document.getElementById('HORA').value,
                EMPRESA: document.getElementById('EMPRESA').value,
                "INTERMÉDIO": document.getElementById('INTERMEDIO').value,
                Local: document.getElementById('Local').value,
                RAT: document.getElementById('RAT').value,
                "DESCRIÇÃO": document.getElementById('DESCRICAO').value,
                VALOR: v.toFixed(2),
                EXTRA: ex.toFixed(2),
                ALIM: al.toFixed(2),
                TRANSP: tr.toFixed(2),
                TOTAL: total,
                PAGAMENTO: tipoAtual === 'Saída' ? 'SAÍDA' : 'NÃO PAGO',
                "Mês": parseInt(dIn.split('-')[1]),
                "ANO": parseInt(dIn.split('-')[0])
            };

            const { error } = await supabaseClient.from('atendimentos').insert([payload]);
            if(error) alert(error.message);
            else {
                alert("Salvo com sucesso!");
                location.reload();
            }
        });

        // Fechamento e Gráficos seguem a mesma lógica anterior, adaptada para fixVal()
        // ... (Incluir aqui as funções gerarFechamento e renderCharts do código anterior) ...

        carregarLancamentos();
    </script>
</body>
</html>
