<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro - Metallic Dark</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --roxo: #a855f7; --roxo-dark: #6b21a8; --fundo: #0f172a; }

        body {
            background-color: var(--fundo);
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .card-metalico {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 1.25rem;
        }

        .btn-roxo {
            background: linear-gradient(135deg, var(--roxo), var(--roxo-dark));
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }

        /* Cores de Status */
        .status-pago { border-left: 8px solid #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; }
        .status-naopago { border-left: 8px solid #facc15 !important; background: rgba(250, 204, 21, 0.1) !important; }
        .status-saida { border-left: 8px solid #ef4444 !important; }

        /* Tabela Scroll */
        .table-container { max-height: 70vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--roxo); border-radius: 10px; }

        /* MODAL FIX - Agora inicia escondido */
        #modalDetalhes { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }

        input, textarea, select {
            background: rgba(15, 23, 42, 0.9) !important;
            border: 1px solid rgba(168, 85, 247, 0.2) !important;
            color: white !important;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-slate-900/90 border-b border-purple-500/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-20">
            <h1 class="font-black text-xl italic tracking-tighter">FINANCE<span class="text-purple-500 ml-1 italic">PRO</span></h1>
            <div class="flex bg-slate-800/50 p-1 rounded-xl border border-purple-500/20">
                <button onclick="showTab('lancamentos')" class="tab-btn px-4 py-2 rounded-lg text-xs font-black btn-roxo text-white">Lançamentos</button>
                <button onclick="showTab('fechamento')" class="tab-btn px-4 py-2 rounded-lg text-xs font-black text-slate-400 hover:text-purple-400">Fechamento</button>
                <button onclick="showTab('dashboard')" class="tab-btn px-4 py-2 rounded-lg text-xs font-black text-slate-400 hover:text-purple-400">Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">

        <!-- GUIA 1: LANÇAMENTOS -->
        <section id="tab-lancamentos" class="tab-content grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <div class="card-metalico p-6 sticky top-28">
                    <form id="formAtendimento" class="space-y-3">
                        <div class="flex space-x-1">
                            <button type="button" id="btnEntrada" onclick="setTipo('Entrada')" class="flex-1 py-2.5 rounded-lg font-black text-[10px] btn-roxo text-white">ENTRADA</button>
                            <button type="button" id="btnSaida" onclick="setTipo('Saída')" class="flex-1 py-2.5 rounded-lg font-black text-[10px] border border-slate-700 text-slate-500">SAÍDA</button>
                        </div>
                        <input type="hidden" id="TIPO" value="Entrada">
                        <input type="date" id="DIA" class="w-full p-2.5 rounded-xl text-xs" required>
                        <input type="text" id="HORA" placeholder="Hora" class="w-full p-2.5 rounded-xl text-xs">
                        <input type="text" id="EMPRESA" placeholder="Empresa" class="w-full p-2.5 rounded-xl text-xs">
                        <input type="text" id="INTERMEDIO" placeholder="Intermédio" class="w-full p-2.5 rounded-xl text-xs">
                        <input type="text" id="Local" placeholder="Unidade" class="w-full p-2.5 rounded-xl text-xs">
                        <input type="text" id="RAT" placeholder="RAT / OS" class="w-full p-2.5 rounded-xl text-xs">
                        <textarea id="DESCRICAO" placeholder="Descrição..." class="w-full p-2.5 rounded-xl text-xs h-20"></textarea>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" step="0.01" id="VALOR" placeholder="Valor" class="p-2.5 rounded-xl text-xs font-bold text-emerald-400">
                            <input type="number" step="0.01" id="EXTRA" placeholder="Extra" class="p-2.5 rounded-xl text-xs font-bold text-purple-400">
                            <input type="number" step="0.01" id="ALIM" placeholder="Alim" class="p-2.5 rounded-xl text-xs font-bold">
                            <input type="number" step="0.01" id="TRANSP" placeholder="Transp" class="p-2.5 rounded-xl text-xs font-bold">
                        </div>
                        <button type="submit" id="btnSalvar" class="w-full btn-roxo text-white py-3 rounded-xl font-black text-xs tracking-widest uppercase">Salvar Lançamento</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-3 card-metalico overflow-hidden">
                <div class="table-container">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-800 text-purple-300 font-black uppercase sticky top-0 z-10 shadow-lg">
                            <tr><th class="p-4">Data / Hora</th><th class="p-4">Empresa / RAT</th><th class="p-4">Unidade</th><th class="p-4 text-right">Total</th></tr>
                        </thead>
                        <tbody id="listaLancamentos" class="divide-y divide-purple-500/10"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- GUIA 2: FECHAMENTO (REMODELADA) -->
        <section id="tab-fechamento" class="tab-content hidden space-y-10">
            <h2 class="text-xl font-black text-purple-400 uppercase italic border-b border-purple-500/30 pb-4">Fechamentos Gerais por Empresa</h2>
            <div id="containerFechamento" class="space-y-12">
                <!-- Grupos de Mês/Ano via JS -->
            </div>
        </section>

        <!-- GUIA 3: DASHBOARD -->
        <section id="tab-dashboard" class="tab-content hidden grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="card-metalico p-6"><canvas id="chartFluxo"></canvas></div>
            <div class="card-metalico p-6"><canvas id="chartEmpresas"></canvas></div>
        </section>
    </main>

    <!-- MODAL -->
    <div id="modalDetalhes" class="flex items-center justify-center p-4">
        <div class="card-metalico w-full max-w-lg border-purple-500 shadow-2xl overflow-hidden">
            <div id="modalHeader" class="p-5 flex justify-between items-center font-black text-xs text-white">
                <span id="modalStatusText" class="uppercase tracking-widest">DETALHES</span>
                <button onclick="fecharModal()" class="text-2xl">&times;</button>
            </div>
            <div id="modalBody" class="p-6 space-y-4 text-xs"></div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ctvnkjrpoyaancoxwles.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm5ranJwb3lhYW5jb3h3bGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDA2OTYsImV4cCI6MjA5NzIxNjY5Nn0.SSY-ys7ZC2wqOdprejhYILJUzdXZjWkZ8upocSGqaQ8";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let tipoAtual = 'Entrada';
        let dadosCompletos = [];

        function setTipo(t) {
            tipoAtual = t;
            const bE = document.getElementById('btnEntrada');
            const bS = document.getElementById('btnSaida');
            if(t === 'Entrada') {
                bE.className = "flex-1 py-2.5 rounded-lg font-black text-[10px] btn-roxo text-white";
                bS.className = "flex-1 py-2.5 rounded-lg font-black text-[10px] border border-slate-700 text-slate-500";
            } else {
                bS.className = "flex-1 py-2.5 rounded-lg font-black text-[10px] btn-roxo text-white";
                bE.className = "flex-1 py-2.5 rounded-lg font-black text-[10px] border border-slate-700 text-slate-500";
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            if(tabId === 'fechamento') carregarFechamentoCompleto();
            if(tabId === 'dashboard') renderCharts();
        }

        function fixVal(v) {
            if(!v) return 0;
            let str = v.toString().replace("R$", "").replace(/\s/g, "");
            if (str.includes('.') && str.includes(',')) str = str.replace(/\./g, "").replace(",", ".");
            else str = str.replace(",", ".");
            return parseFloat(str) || 0;
        }

        async function carregarLancamentos() {
            const lista = document.getElementById('listaLancamentos');
            lista.innerHTML = '<tr><td colspan="4" class="p-10 text-center font-black animate-pulse">CARREGANDO...</td></tr>';
            const { data, error } = await supabaseClient.from('atendimentos').select('*').order('id', { ascending: false });
            if(error) return;
            dadosCompletos = data;
            lista.innerHTML = '';
            data.forEach((d, i) => {
                let status = (d.TIPO === 'Saída') ? "status-saida" : (d.PAGAMENTO === 'PAGO' ? "status-pago" : "status-naopago");
                lista.innerHTML += `
                    <tr onclick="abrirDetalhes(${i})" class="hover:bg-white/5 cursor-pointer border-b border-white/5">
                        <td class="p-4 ${status}">
                            <div class="font-black text-slate-200">${d.DIA}</div>
                            <div class="text-[9px] text-purple-400 font-bold">${d.HORA || ''}</div>
                        </td>
                        <td class="p-4">
                            <div class="font-black text-slate-300 uppercase">${d.EMPRESA || '-'}</div>
                            <div class="text-[9px] text-purple-600 font-black italic italic">${d.RAT || ''}</div>
                        </td>
                        <td class="p-4 text-slate-500 text-[10px]">${d.Local || '-'}</td>
                        <td class="p-4 text-right font-black ${d.TIPO === 'Saída' ? 'text-red-400' : 'text-emerald-400'}">R$ ${d.TOTAL || '0.00'}</td>
                    </tr>
                `;
            });
        }

        async function carregarFechamentoCompleto() {
            const container = document.getElementById('containerFechamento');
            container.innerHTML = '<div class="p-20 text-center font-black uppercase text-purple-500 animate-pulse">Mapeando histórico financeiro...</div>';
            
            const { data: lancamentos } = await supabaseClient.from('atendimentos').select('*').eq('TIPO', 'Entrada');
            const { data: configs } = await supabaseClient.from('empresas_config').select('*');

            // Agrupar por Ano/Mês
            const grupos = {};
            lancamentos.forEach(l => {
                const mesNome = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
                const chave = `${l.ANO} - ${mesNome[parseInt(l["Mês"])-1]}`;
                if(!grupos[chave]) grupos[chave] = {};
                
                const emp = l.EMPRESA || 'Outros';
                if(!grupos[chave][emp]) grupos[chave][emp] = { total: 0, pago: true };
                
                grupos[chave][emp].total += fixVal(l.TOTAL);
                if(l.PAGAMENTO !== 'PAGO') grupos[chave][emp].pago = false;
            });

            container.innerHTML = '';
            // Ordenar por ano desc
            const chavesOrdenadas = Object.keys(grupos).sort((a,b) => b.localeCompare(a));

            chavesOrdenadas.forEach(mes => {
                let htmlMes = `<div class="space-y-4">
                    <h3 class="text-sm font-black text-slate-400 border-l-4 border-purple-600 pl-3 uppercase tracking-tighter">${mes}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">`;
                
                Object.keys(grupos[mes]).forEach(emp => {
                    const c = grupos[mes][emp];
                    const config = configs?.find(x => x.nome_empresa === emp);
                    const statusClass = c.pago ? 'status-pago' : 'status-naopago';
                    
                    htmlMes += `
                        <div class="card-metalico p-5 ${statusClass} shadow-xl">
                            <h4 class="font-black text-white text-[10px] uppercase mb-3 border-b border-white/10 pb-2">${emp}</h4>
                            <div class="flex justify-between items-end mb-4">
                                <span class="text-[9px] font-black uppercase text-slate-500">${c.pago ? 'CONCLUÍDO' : 'PENDENTE'}</span>
                                <span class="text-lg font-black text-purple-400 italic">R$ ${c.total.toFixed(2)}</span>
                            </div>
                            <div class="text-[8px] text-slate-500 space-y-1 bg-black/30 p-2 rounded-lg">
                                <p>📧 ${config?.email_fechamento || 'N/A'}</p>
                                <p>⏳ ${config?.prazo_envio || 'S/N'}</p>
                            </div>
                        </div>`;
                });
                htmlMes += `</div></div>`;
                container.innerHTML += htmlMes;
            });
        }

        function abrirDetalhes(i) {
            const item = dadosCompletos[i];
            const modal = document.getElementById('modalDetalhes');
            const head = document.getElementById('modalHeader');
            const body = document.getElementById('modalBody');

            let bg = item.TIPO === 'Saída' ? 'bg-red-500/80' : (item.PAGAMENTO === 'PAGO' ? 'bg-emerald-600/80' : 'bg-amber-500/80');
            head.className = `p-4 flex justify-between items-center font-black text-white ${bg}`;
            
            body.innerHTML = `
                <div class="grid grid-cols-2 gap-4 border-b border-white/5 pb-4">
                    <div><label class="text-[9px] font-black text-purple-400">EMPRESA</label><p class="font-black text-white">${item.EMPRESA || '-'}</p></div>
                    <div><label class="text-[9px] font-black text-purple-400">RAT</label><p class="font-black text-purple-400 italic">${item.RAT || '-'}</p></div>
                </div>
                <div class="bg-black/30 p-4 rounded-xl italic text-slate-400 leading-relaxed border border-white/5">"${item["DESCRIÇÃO"] || '---'}"</div>
                <div class="grid grid-cols-4 gap-2 text-center text-[9px] font-black">
                    <div class="bg-slate-800 p-2 rounded-lg text-slate-400">BASE<br><span class="text-white">${item.VALOR || 0}</span></div>
                    <div class="bg-slate-800 p-2 rounded-lg text-slate-400">EXTRA<br><span class="text-white">${item.EXTRA || 0}</span></div>
                    <div class="bg-slate-800 p-2 rounded-lg text-slate-400">ALIM<br><span class="text-white">${item.ALIM || 0}</span></div>
                    <div class="bg-slate-800 p-2 rounded-lg text-slate-400">TRANSP<br><span class="text-white">${item.TRANSP || 0}</span></div>
                </div>
                <div class="btn-roxo p-5 rounded-2xl flex justify-between items-center text-white">
                    <span class="text-[9px] font-black uppercase opacity-60 italic">Total do chamado</span>
                    <span class="text-2xl font-black italic tracking-tighter">R$ ${item.TOTAL || '0.00'}</span>
                </div>`;
            modal.style.display = "flex";
        }

        function fecharModal() { document.getElementById('modalDetalhes').style.display = "none"; }

        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true; btn.innerText = "GRAVANDO...";
            const dataInput = document.getElementById('DIA').value; // Padrão HTML5: YYYY-MM-DD
            const v = fixVal(document.getElementById('VALOR').value);
            const ex = fixVal(document.getElementById('EXTRA').value);
            const al = fixVal(document.getElementById('ALIM').value);
            const tr = fixVal(document.getElementById('TRANSP').value);
            
            // Garantir que a data enviada segue o padrão YYYY/MM/DD que você solicitou
            const dataFormatada = dataInput.replace(/-/g, '/');

            const payload = {
                TIPO: tipoAtual,
                DIA: dataFormatada.split('/').reverse().join('/'), // Mantém DD/MM/YYYY para a visualização na tabela
                HORA: document.getElementById('HORA').value,
                EMPRESA: document.getElementById('EMPRESA').value,
                "INTERMÉDIO": document.getElementById('INTERMEDIO').value,
                Local: document.getElementById('Local').value,
                RAT: document.getElementById('RAT').value,
                "DESCRIÇÃO": document.getElementById('DESCRICAO').value,
                VALOR: v.toFixed(2), EXTRA: ex.toFixed(2), ALIM: al.toFixed(2), TRANSP: tr.toFixed(2),
                TOTAL: (v + ex + al + tr).toFixed(2),
                PAGAMENTO: tipoAtual === 'Saída' ? 'SAÍDA' : 'NÃO PAGO',
                "Mês": parseInt(dataInput.split('-')[1]),
                "ANO": parseInt(dataInput.split('-')[0])
            };

            await supabaseClient.from('atendimentos').insert([payload]);
            location.reload();
        });

        let fluxoChart, empresaChart;
        async function renderCharts() {
            const { data } = await supabaseClient.from('atendimentos').select('*');
            if(!data) return;
            const entradas = new Array(12).fill(0);
            const saidas = new Array(12).fill(0);
            const empresasMap = {};
            data.forEach(d => {
                const m = parseInt(d["Mês"]) - 1;
                const val = fixVal(d.TOTAL);
                if (m >= 0 && m < 12) {
                    if(d.TIPO === 'Entrada') {
                        entradas[m] += val;
                        if(d.EMPRESA) empresasMap[d.EMPRESA] = (empresasMap[d.EMPRESA] || 0) + val;
                    } else { saidas[m] += val; }
                }
            });
            if(fluxoChart) fluxoChart.destroy();
            if(empresaChart) empresaChart.destroy();
            fluxoChart = new Chart(document.getElementById('chartFluxo'), {
                type: 'line',
                data: {
                    labels: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"],
                    datasets: [
                        { label: 'Ganhos', data: entradas, borderColor: '#10b981', tension: 0.4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)' },
                        { label: 'Gastos', data: saidas, borderColor: '#ef4444', tension: 0.4, fill: true, backgroundColor: 'rgba(239, 68, 68, 0.1)' }
                    ]
                }
            });
            const topEmpresas = Object.entries(empresasMap).sort((a,b) => b[1]-a[1]).slice(0, 5);
            empresaChart = new Chart(document.getElementById('chartEmpresas'), {
                type: 'doughnut',
                data: {
                    labels: topEmpresas.map(x => x[0]),
                    datasets: [{ data: topEmpresas.map(x => x[1]), backgroundColor: ['#a855f7', '#10b981', '#f59e0b', '#ef4444', '#3b82f6'], borderWidth: 0 }]
                }
            });
        }

        carregarLancamentos();
    </script>
</body>
</html>
