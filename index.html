<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control - Financeiro Técnico</title>
    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .tab-active { @apply bg-indigo-700 text-white shadow-inner; }
        .entrada-border { border-left: 4px solid #10b981; }
        .saida-border { border-left: 4px solid #ef4444; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-900">

    <!-- Navegação -->
    <nav class="bg-indigo-900 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-indigo-500 rounded flex items-center justify-center font-bold italic">F</div>
                <h1 class="font-black text-lg tracking-tight hidden sm:block">FINANCE_PRO <span class="text-indigo-400 font-light text-xs italic">v2.0</span></h1>
            </div>
            <div class="flex bg-indigo-800/50 p-1 rounded-lg space-x-1">
                <button onclick="showTab('lancamentos')" class="tab-btn px-4 py-2 rounded-md text-sm font-bold transition-all bg-indigo-700 text-white">Lançamentos</button>
                <button onclick="showTab('fechamento')" class="tab-btn px-4 py-2 rounded-md text-sm font-bold transition-all text-indigo-200 hover:bg-indigo-700">Fechamento</button>
                <button onclick="showTab('dashboard')" class="tab-btn px-4 py-2 rounded-md text-sm font-bold transition-all text-indigo-200 hover:bg-indigo-700">Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">

        <!-- GUIA 1: LANÇAMENTOS -->
        <section id="tab-lancamentos" class="tab-content grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Formulário -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-20">
                    <h2 class="font-black text-slate-800 mb-4 flex items-center">
                        <span class="w-2 h-2 bg-indigo-500 rounded-full mr-2"></span> NOVO REGISTRO
                    </h2>
                    <form id="formAtendimento" class="space-y-3">
                        <select id="TIPO" class="w-full border border-slate-200 p-2.5 rounded-xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="Entrada">Entrada (Chamado)</option>
                            <option value="Saída">Saída (Despesa)</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="date" id="DIA" class="border border-slate-200 p-2.5 rounded-xl w-full text-sm" required>
                            <input type="text" id="RAT" placeholder="RAT / OS" class="border border-slate-200 p-2.5 rounded-xl w-full text-sm">
                        </div>
                        <input type="text" id="EMPRESA" placeholder="Empresa (Ex: Sonda)" class="border border-slate-200 p-2.5 rounded-xl w-full text-sm">
                        <input type="text" id="Local" placeholder="Unidade / Local" class="border border-slate-200 p-2.5 rounded-xl w-full text-sm">
                        <textarea id="DESCRICAO" placeholder="Descrição do atendimento ou despesa..." class="border border-slate-200 p-2.5 rounded-xl w-full h-24 text-sm"></textarea>
                        
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Valor R$</label>
                                <input type="number" step="0.01" id="VALOR" value="0" class="border border-slate-200 p-2.5 rounded-xl w-full text-emerald-600 font-bold">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Extra R$</label>
                                <input type="number" step="0.01" id="EXTRA" value="0" class="border border-slate-200 p-2.5 rounded-xl w-full text-indigo-600 font-bold">
                            </div>
                        </div>

                        <button type="submit" id="btnSalvar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-xl font-black transition-all shadow-lg shadow-indigo-100">
                            SALVAR NO BANCO
                        </button>
                    </form>
                </div>
            </div>

            <!-- Tabela Recente -->
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                        <h3 class="font-bold text-slate-700 text-sm uppercase tracking-widest">Últimos Lançamentos</h3>
                        <button onclick="carregarDadosIniciais()" class="text-xs text-indigo-600 font-bold hover:underline">Atualizar</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-slate-400 font-medium border-b">
                                <tr>
                                    <th class="p-4">Data</th>
                                    <th class="p-4">Empresa / RAT</th>
                                    <th class="p-4 text-right">Total</th>
                                </tr>
                            </thead>
                            <tbody id="listaRecente" class="divide-y divide-slate-50">
                                <!-- Carregado via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- GUIA 2: FECHAMENTO -->
        <section id="tab-fechamento" class="tab-content hidden animate-fadeIn">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-wrap items-end gap-4">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-black text-slate-400 uppercase mb-1">Mês de Referência</label>
                    <input type="month" id="filtroMes" class="w-full border border-slate-200 p-2.5 rounded-xl bg-slate-50">
                </div>
                <button onclick="gerarFechamento()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg shadow-emerald-100">
                    GERAR RELATÓRIO
                </button>
            </div>
            
            <div id="cardsFechamento" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Cards de empresa aparecem aqui -->
                <div class="col-span-full text-center py-20 text-slate-400 italic">
                    Selecione o mês para visualizar os agrupamentos por empresa.
                </div>
            </div>
        </section>

        <!-- GUIA 3: DASHBOARD -->
        <section id="tab-dashboard" class="tab-content hidden grid grid-cols-1 lg:grid-cols-2 gap-6 animate-fadeIn">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-slate-800 mb-6 flex items-center">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full mr-2"></span> FLUXO ANUAL (Ganhos vs Gastos)
                </h3>
                <canvas id="chartFluxo" height="250"></canvas>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                <h3 class="font-bold text-slate-800 mb-6 flex items-center text-left">
                    <span class="w-2 h-2 bg-indigo-500 rounded-full mr-2"></span> FATURAMENTO POR CLIENTE
                </h3>
                <div class="max-w-[300px] mx-auto">
                    <canvas id="chartEmpresas"></canvas>
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- CONFIGURAÇÃO ---
        const SB_URL = "https://ctvnkjrpoyaancoxwles.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm5ranJwb3lhYW5jb3h3bGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDA2OTYsImV4cCI6MjA5NzIxNjY5Nn0.SSY-ys7ZC2wqOdprejhYILJUzdXZjWkZ8upocSGqaQ8"; // << COLOQUE SUA KEY AQUI
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // --- UTILITÁRIOS ---
        function limparValor(valor) {
            if (!valor) return 0;
            // Trata formatos: "R$ 1.200,50", "1200.50", "1.200,00"
            let str = valor.toString().replace("R$", "").replace(/\s/g, "");
            // Se houver ponto e vírgula (formato brasileiro), remove o ponto e troca a vírgula por ponto
            if (str.includes('.') && str.includes(',')) {
                str = str.replace(/\./g, "").replace(",", ".");
            } else {
                str = str.replace(",", ".");
            }
            return parseFloat(str) || 0;
        }

        // --- NAVEGAÇÃO ---
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-700', 'text-white');
                btn.classList.add('text-indigo-200');
            });
            event.currentTarget.classList.add('bg-indigo-700', 'text-white');
            event.currentTarget.classList.remove('text-indigo-200');
            
            if(tabId === 'dashboard') renderCharts();
            if(tabId === 'lancamentos') carregarDadosIniciais();
        }

        // --- CARREGAR LISTA RECENTE ---
        async function carregarDadosIniciais() {
            const lista = document.getElementById('listaRecente');
            lista.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-slate-400">Consultando banco...</td></tr>';

            try {
                const { data, error } = await supabaseClient
                    .from('atendimentos')
                    .select('*')
                    .order('id', { ascending: false })
                    .limit(15);

                if (error) throw error;

                lista.innerHTML = '';
                data.forEach(d => {
                    const isSaida = d.TIPO === 'Saída';
                    lista.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="p-4 border-l-4 ${isSaida ? 'border-red-500' : 'border-emerald-500'}">
                                <p class="font-bold text-slate-700 text-xs">${d.DIA || '-'}</p>
                            </td>
                            <td class="p-4">
                                <p class="font-bold text-slate-800">${d.EMPRESA || 'S/N'}</p>
                                <p class="text-[10px] text-slate-400 uppercase tracking-tighter italic">RAT: ${d.RAT || '-'}</p>
                            </td>
                            <td class="p-4 text-right">
                                <p class="font-black ${isSaida ? 'text-red-500' : 'text-emerald-600'}">R$ ${d.TOTAL || '0.00'}</p>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                lista.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-red-400 text-xs font-bold">ERRO DE CONEXÃO: ${err.message}</td></tr>`;
            }
        }

        // --- SALVAR REGISTRO ---
        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            const dataInput = document.getElementById('DIA').value;
            const v = parseFloat(document.getElementById('VALOR').value || 0);
            const ex = parseFloat(document.getElementById('EXTRA').value || 0);
            const totalFinal = (v + ex).toFixed(2);
            
            const payload = {
                TIPO: document.getElementById('TIPO').value,
                DIA: dataInput.split('-').reverse().join('/'),
                EMPRESA: document.getElementById('EMPRESA').value,
                Local: document.getElementById('Local').value,
                RAT: document.getElementById('RAT').value,
                "DESCRIÇÃO": document.getElementById('DESCRICAO').value,
                VALOR: v.toFixed(2),
                EXTRA: ex.toFixed(2),
                TOTAL: totalFinal,
                PAGAMENTO: "PENDENTE",
                "Mês": parseInt(dataInput.split('-')[1]),
                "ANO": parseInt(dataInput.split('-')[0])
            };

            const { error } = await supabaseClient.from('atendimentos').insert([payload]);

            if (error) {
                alert("Erro ao gravar no banco: " + error.message);
                btn.disabled = false;
                btn.innerText = "SALVAR NO BANCO";
            } else {
                alert("Dados gravados com sucesso!");
                document.getElementById('formAtendimento').reset();
                btn.disabled = false;
                btn.innerText = "SALVAR NO BANCO";
                carregarDadosIniciais();
            }
        });

        // --- FECHAMENTO MENSAL ---
        async function gerarFechamento() {
            const filtro = document.getElementById('filtroMes').value;
            if(!filtro) return alert("Selecione o mês e o ano.");

            const [ano, mes] = filtro.split('-').map(Number);
            const container = document.getElementById('cardsFechamento');
            container.innerHTML = '<div class="col-span-full text-center py-10">Calculando totais...</div>';

            const { data: chamados } = await supabaseClient.from('atendimentos')
                .select('*').eq('ANO', ano).eq('Mês', mes).eq('PAGAMENTO', 'PENDENTE').eq('TIPO', 'Entrada');
            
            const { data: configs } = await supabaseClient.from('empresas_config').select('*');

            if(!chamados || chamados.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400 italic">Nenhum chamado pendente encontrado para este período.</div>';
                return;
            }

            const agrupado = {};
            chamados.forEach(c => {
                const emp = c.EMPRESA || 'Não Identificado';
                if(!agrupado[emp]) agrupado[emp] = { total: 0, qtd: 0 };
                agrupado[emp].total += limparValor(c.TOTAL);
                agrupado[emp].qtd++;
            });

            container.innerHTML = "";
            Object.keys(agrupado).forEach(emp => {
                const conf = configs ? configs.find(x => x.nome_empresa === emp) : null;
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-black text-slate-800 uppercase text-sm">${emp}</h3>
                            <span class="bg-amber-100 text-amber-600 text-[10px] font-black px-2 py-1 rounded">PENDENTE</span>
                        </div>
                        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl mb-4">
                            <div class="text-xs text-slate-400 font-bold uppercase">Chamados<br><span class="text-slate-800 text-lg">${agrupado[emp].qtd}</span></div>
                            <div class="text-right text-xs text-slate-400 font-bold uppercase">Total a Receber<br><span class="text-indigo-600 text-lg">R$ ${agrupado[emp].total.toFixed(2)}</span></div>
                        </div>
                        <div class="space-y-2 border-t pt-3">
                            <p class="text-[10px] text-slate-500">📧 <b>EMAIL:</b> ${conf?.email_fechamento || '<span class="text-red-300">Não cadastrado</span>'}</p>
                            <p class="text-[10px] text-slate-500">⏳ <b>PRAZO:</b> ${conf?.prazo_envio || '-'}</p>
                            <p class="text-[10px] text-slate-500">📄 <b>NOTA FISCAL:</b> ${conf?.exige_nf ? 'Obrigatória' : 'Não exigida'}</p>
                        </div>
                    </div>
                `;
            });
        }

        // --- DASHBOARD (CHARTS) ---
        let fluxoChart, empresaChart;
        async function renderCharts() {
            try {
                const { data } = await supabaseClient.from('atendimentos').select('*');
                if(!data) return;

                const entradas = new Array(12).fill(0);
                const saidas = new Array(12).fill(0);
                const empresasMap = {};

                data.forEach(d => {
                    const m = parseInt(d["Mês"]) - 1;
                    const val = limparValor(d.TOTAL);
                    if (m >= 0 && m < 12) {
                        if(d.TIPO === 'Entrada') {
                            entradas[m] += val;
                            if(d.EMPRESA) empresasMap[d.EMPRESA] = (empresasMap[d.EMPRESA] || 0) + val;
                        } else {
                            saidas[m] += val;
                        }
                    }
                });

                // Limpar gráficos anteriores
                if(fluxoChart) fluxoChart.destroy();
                if(empresaChart) empresaChart.destroy();

                // Gráfico 1: Fluxo
                fluxoChart = new Chart(document.getElementById('chartFluxo'), {
                    type: 'line',
                    data: {
                        labels: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"],
                        datasets: [
                            { label: 'Entradas', data: entradas, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.4 },
                            { label: 'Saídas', data: saidas, borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', fill: true, tension: 0.4 }
                        ]
                    },
                    options: { plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true } } }
                });

                // Gráfico 2: Empresas
                const sortedEmpresas = Object.entries(empresasMap).sort((a,b) => b[1] - a[1]).slice(0, 5);
                empresaChart = new Chart(document.getElementById('chartEmpresas'), {
                    type: 'doughnut',
                    data: {
                        labels: sortedEmpresas.map(x => x[0]),
                        datasets: [{
                            data: sortedEmpresas.map(x => x[1]),
                            backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                        }]
                    },
                    options: { plugins: { legend: { position: 'bottom' } } }
                });
            } catch (e) {
                console.error("Erro nos gráficos:", e);
            }
        }

        // Inicialização
        carregarDadosIniciais();
    </script>
</body>
</html>
