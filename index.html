<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro - Ultra Aurora Glass</title>
    
    <link rel="icon" type="image/png" href="1781706422626.png">
    <link rel="apple-touch-icon" href="1781706422626.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: #f1f5f9; min-height: 100vh; position: relative; overflow-x: hidden; }

        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .logo-central { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%); width: 320px; height: 320px; background: url("1781706422626.png") no-repeat center; background-size: contain; filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.6)); }

        .glass { background: rgba(15, 23, 42, 0.45) !important; backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.12); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); }
        .btn-glass-purple { background: linear-gradient(135deg, rgba(168, 85, 247, 0.8), rgba(107, 33, 168, 0.8)); transition: 0.3s; }

        .tabs-container { position: relative; display: flex; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-indicator { position: absolute; height: calc(100% - 8px); top: 4px; left: 4px; border-radius: 12px; background: linear-gradient(135deg, #a855f7, #6b21a8); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        .tab-btn { position: relative; z-index: 2; transition: color 0.3s; }

        input, textarea, select { 
            background: rgba(15, 23, 42, 0.8) !important; 
            border: 1px solid rgba(168, 85, 247, 0.3) !important; 
            color: white !important; 
            border-radius: 12px !important;
        }

        .status-pago { border-left: 6px solid #10b981; }
        .status-naopago-tab { border-left: 6px solid #f97316; }
        .status-saida { border-left: 6px solid #ef4444; }
        .card-pendente-moldura { border: 2.5px solid #ef4444 !important; }

        .table-container { max-height: 60vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 10px; }

        #modalDetalhes { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .modal-card { max-height: 90vh; display: flex; flex-direction: column; width: 95%; max-width: 32rem; margin: auto; }
        .modal-body-scroll { overflow-y: auto; flex-grow: 1; padding: 1.5rem; }
        .circle-icon-btn { background: rgba(255, 255, 255, 0.15); border: 1.5px solid rgba(255, 255, 255, 0.5); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: white; transition: 0.2s; }
        .circle-icon-btn:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.05); }
        .circle-icon-btn.btn-delete:hover { background: rgba(239, 68, 68, 0.4); border-color: #ef4444; }
        .edit-input { width: 100%; border: 1px solid #a855f7 !important; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="bg-pattern">
        <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <path d="M-100,200 C300,100 500,600 900,100" fill="none" stroke="#a855f7" stroke-width="6" opacity="0.2" />
        </svg>
        <div class="logo-central"></div>
    </div>

    <nav class="glass sticky top-0 z-50 px-4 h-20 border-b border-white/5 flex items-center">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <img src="1781706422626.png" class="h-14 w-14 rounded-xl object-cover">
            <div class="tabs-container">
                <div id="tabIndicator" class="tab-indicator"></div>
                <button onclick="showTab('lancamentos', this)" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold text-white">LANÇAMENTOS</button>
                <button onclick="showTab('fechamento', this)" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold text-slate-400">FECHAMENTO</button>
                <button onclick="showTab('dashboard', this)" class="tab-btn px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold text-slate-400">DASHBOARD</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- LANÇAMENTOS -->
        <section id="tab-lancamentos" class="tab-content grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-3xl sticky top-28">
                    <!-- BOTÃO AUTO RAT GEMINI -->
                    <div class="mb-6">
                        <input type="file" id="fileRAT" accept="image/*,application/pdf" class="hidden" onchange="handleAutoRAT(this)">
                        <button type="button" id="btnAutoRAT" onclick="document.getElementById('fileRAT').click()" class="w-full py-4 rounded-2xl font-black uppercase text-[10px] border border-purple-500/50 text-purple-400 hover:bg-purple-500/10 transition-all flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg>
                            AUTO RAT (IA)
                        </button>
                    </div>

                    <form id="formAtendimento" class="space-y-4">
                        <div class="flex gap-2">
                            <button type="button" id="btnEntrada" onclick="setTipo('Entrada')" class="flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white">ENTRADA</button>
                            <button type="button" id="btnSaida" onclick="setTipo('Saída')" class="flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500">SAÍDA</button>
                        </div>
                        <input type="hidden" id="TIPO" value="Entrada">
                        <input type="date" id="DIA" class="w-full p-3 text-xs" required>
                        <input type="text" id="EMPRESA" placeholder="EMPRESA" class="w-full p-3 text-xs uppercase">
                        <input type="text" id="INTERMEDIO" placeholder="INTERMÉDIO" class="w-full p-3 text-xs uppercase">
                        <input type="text" id="Local" placeholder="LOCAL" class="w-full p-3 text-xs uppercase">
                        <input type="text" id="RAT" placeholder="RAT / OS" class="w-full p-3 text-xs">
                        <textarea id="DESCRICAO" placeholder="Descrição..." class="w-full p-3 text-xs h-20"></textarea>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" step="0.01" id="VALOR" placeholder="VALOR BASE" class="w-full p-3 text-xs uppercase">
                            <input type="number" step="0.01" id="EXTRA" placeholder="EXTRA" class="w-full p-3 text-xs uppercase">
                            <input type="number" step="0.01" id="MATERIAL" placeholder="MATERIAL" class="w-full p-3 text-xs uppercase">
                            <input type="number" step="0.01" id="TRANSP" placeholder="TRANSP" class="w-full p-3 text-xs uppercase">
                        </div>
                        <button type="submit" id="btnSalvar" class="w-full btn-glass-purple text-white py-3 rounded-2xl font-black uppercase text-[10px]">GRAVAR</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-4">
                <div class="glass p-2 rounded-2xl flex items-center px-6">
                    <input type="text" id="inputBusca" onkeyup="filtrarLancamentos()" placeholder="Pesquisar por empresa, data ou RAT..." class="w-full bg-transparent border-none outline-none text-base p-4">
                </div>
                <div class="glass rounded-3xl overflow-hidden">
                    <div class="table-container">
                        <table class="w-full text-left text-xs relative">
                            <thead class="bg-black/40 text-purple-300 font-bold uppercase sticky top-0 z-10">
                                <tr><th class="p-5">Data</th><th class="p-5">Empresa / RAT</th><th class="p-5 text-right">Total</th></tr>
                            </thead>
                            <tbody id="listaLancamentos" class="divide-y divide-white/5 text-slate-300"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- FECHAMENTO -->
        <section id="tab-fechamento" class="tab-content hidden space-y-12"></section>

        <!-- DASHBOARD -->
        <section id="tab-dashboard" class="tab-content hidden flex flex-col gap-8">
            <div class="glass p-6 rounded-3xl flex flex-wrap items-center gap-6">
                <select id="filtroAnoDash" onchange="renderCharts()" class="p-3 text-xs font-bold uppercase min-w-[120px]"></select>
                <select id="filtroMesDash" onchange="renderCharts()" class="p-3 text-xs font-bold uppercase min-w-[150px]">
                    <option value="TODOS">Todos os Meses</option>
                    <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3">Março</option>
                    <option value="4">Abril</option><option value="5">Maio</option><option value="6">Junho</option>
                    <option value="7">Julho</option><option value="8">Agosto</option><option value="9">Setembro</option>
                    <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass p-8 rounded-3xl min-h-[350px]"><canvas id="chartFluxo"></canvas></div>
                <div class="glass p-8 rounded-3xl min-h-[350px]"><canvas id="chartEmpresas"></canvas></div>
                <div class="glass p-8 rounded-3xl min-h-[350px]"><canvas id="chartComposicao"></canvas></div>
                <div class="glass p-8 rounded-3xl min-h-[350px]"><canvas id="chartStatusPagamento"></canvas></div>
            </div>
        </section>
    </main>

    <!-- MODAL DETALHES -->
    <div id="modalDetalhes">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="glass modal-card rounded-3xl overflow-hidden border border-purple-500/30">
                <div id="modalHeader" class="p-6 flex justify-between items-center text-white border-b border-white/10 sticky top-0 z-20 backdrop-blur-xl">
                    <span id="modalStatusText" class="font-black uppercase text-[10px] opacity-60">DETALHES</span>
                    <div class="flex items-center gap-3">
                        <button onclick="deletarLancamento()" class="circle-icon-btn btn-delete"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"/></svg></button>
                        <button onclick="toggleEditMode()" class="circle-icon-btn"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2.5"/></svg></button>
                        <button onclick="fecharModal()" class="text-4xl leading-none font-light ml-2">&times;</button>
                    </div>
                </div>
                <div id="modalBody" class="modal-body-scroll space-y-6"></div>
                <div id="modalFooter" class="p-6 hidden flex justify-end gap-3 border-t border-white/10 bg-black/60">
                    <button onclick="toggleEditMode()" class="px-5 py-2 text-xs font-bold text-slate-400">Cancelar</button>
                    <button onclick="salvarAlteracoes()" class="px-8 py-2 bg-emerald-600 rounded-xl text-xs font-black text-white">SALVAR ALTERAÇÕES</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÕES ---
        const SB_URL = "https://ctvnkjrpoyaancoxwles.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm5ranJwb3lhYW5jb3h3bGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDA2OTYsImV4cCI6MjA5NzIxNjY5Nn0.SSY-ys7ZC2wqOdprejhYILJUzdXZjWkZ8upocSGqaQ8";
        const GEMINI_KEY = "AIzaSyCl_fF_o7kEeB_bUU-hnNDKD3-lAFOmkKw"; // Sua chave atualizada
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let dadosCompletos = [], itemSendoEditado = null, editMode = false, tipoAtual = 'Entrada';
        let filtroFechamento = 'TODOS', chart1 = null, chart2 = null, chart3 = null, chart4 = null;
        const mesesNomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        
        // --- UTILITÁRIOS ---
        function fixVal(v) {
            if (!v) return 0;
            let str = v.toString().replace("R$", "").replace(/\s/g, "");
            str = str.replace(/\./g, "").replace(",", ".");
            return parseFloat(str) || 0;
        }
        function formatarParaDB(num) { return "R$ " + num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        function exibirMoeda(v) { return v || "R$ 0,00"; }
        function normalizar(t) { return t ? t.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : ""; }
        
        function setTipo(t) {
            tipoAtual = t;
            document.getElementById('TIPO').value = t;
            const btnE = document.getElementById('btnEntrada'), btnS = document.getElementById('btnSaida');
            btnE.className = t === 'Entrada' ? "flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white" : "flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500";
            btnS.className = t === 'Saída' ? "flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white" : "flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500";
        }
        
        // --- MOTOR IA GEMINI (CORRIGIDO) ---
        async function handleAutoRAT(input) {
            const file = input.files[0];
            if (!file) return;
            const btn = document.getElementById('btnAutoRAT');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<span class="animate-pulse">PROCESSANDO...</span>`;
            btn.disabled = true;
        
            try {
                // Converte para Base64
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = e => reject(e);
                });
        
                const promptText = `Aja como um extrator de dados de relatórios técnicos (RAT). Analise o arquivo e retorne EXATAMENTE este formato:
                DATA: [DD/MM/AAAA]
                EMPRESA: [NOME DA PRESTADORA EM MAIÚSCULO]
                INTERMÉDIO: 
                LOCAL: [NOME DO CLIENTE FINAL EM MAIÚSCULO]
                RAT / OS: [NÚMERO DO CHAMADO]
                DESCRIÇÃO: [RESUMO CURTO DE DEFEITO E SOLUÇÃO]`;
        
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptText },
                                { inline_data: { mime_type: file.type, data: base64 } }
                            ]
                        }]
                    })
                });
        
                const result = await response.json();
        
                if (result.error) {
                    throw new Error(`Erro do Google: ${result.error.message}`);
                }
        
                const textoIA = result.candidates[0].content.parts[0].text;
                
                // Função interna para limpar o texto da IA
                const extrair = (campo) => {
                    const regex = new RegExp(`${campo}:\\s*(.*)`, "i");
                    const match = textoIA.match(regex);
                    return match ? match[1].trim() : "";
                };
        
                // Preencher o formulário
                const d = extrair("DATA");
                if (d.includes('/')) {
                    const [dia, mes, ano] = d.split('/');
                    document.getElementById('DIA').value = `${ano}-${mes.padStart(2,'0')}-${dia.padStart(2,'0')}`;
                }
                document.getElementById('EMPRESA').value = extrair("EMPRESA");
                document.getElementById('Local').value = extrair("LOCAL");
                document.getElementById('RAT').value = extrair("RAT / OS");
                document.getElementById('DESCRICAO').value = extrair("DESCRIÇÃO");
        
                btn.innerHTML = "CONCLUÍDO!";
                btn.classList.add('bg-emerald-500/20');
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('bg-emerald-500/20');
                    btn.disabled = false;
                }, 3000);
        
            } catch (e) {
                console.error(e);
                alert(`Falha no AUTO RAT: ${e.message}`);
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }
        
        // --- CARREGAMENTO & TABELA ---
        async function carregarLancamentos() {
            const { data, error } = await supabaseClient.from('atendimentos').select('*').order('id', { ascending: false });
            if (!error) {
                dadosCompletos = data || [];
                renderizarTabela(dadosCompletos);
                popularFiltroAno();
            }
        }
        
        function renderizarTabela(dados) {
            const lista = document.getElementById('listaLancamentos');
            lista.innerHTML = dados.map(d => `
                <tr onclick="abrirDetalhes(${d.id})" class="hover:bg-white/5 cursor-pointer border-b border-white/5 text-slate-300">
                    <td class="p-5 ${d.TIPO === 'Saída' ? 'status-saida' : (d.PAGAMENTO === 'PAGO' ? 'status-pago' : 'status-naopago-tab')}">
                        <div class="font-bold text-slate-100">${d.DIA}</div>
                    </td>
                    <td class="p-5 uppercase">
                        <div class="font-bold text-slate-200">${d.EMPRESA || '-'}</div>
                        <div class="text-[9px] text-purple-700 font-bold italic">${d.RAT || ''}</div>
                    </td>
                    <td class="p-5 text-right font-black ${d.TIPO === 'Saída' ? 'text-red-400' : 'text-emerald-400'}">${exibirMoeda(d.TOTAL)}</td>
                </tr>
            `).join('');
        }
        
        function filtrarLancamentos() {
            const t = normalizar(document.getElementById('inputBusca').value);
            renderizarTabela(dadosCompletos.filter(d => normalizar(d.DIA).includes(t) || normalizar(d.EMPRESA).includes(t) || normalizar(d.RAT).includes(t)));
        }
        
        // --- FECHAMENTO ---
        async function carregarFechamentoFinal() {
            const container = document.getElementById('tab-fechamento');
            container.innerHTML = '<div class="p-20 text-center animate-pulse uppercase font-black text-purple-500">Mapeando histórico...</div>';
            
            const { data: lancamentos } = await supabaseClient.from('atendimentos').select('*').eq('TIPO', 'Entrada');
            const { data: configs } = await supabaseClient.from('empresas_config').select('*');
            
            const grupos = {};
            lancamentos.forEach(l => {
                if(!l.DIA) return;
                const pts = l.DIA.split('/');
                const chave = `${pts[2]}${pts[1].padStart(2, '0')}`;
                if (!grupos[chave]) grupos[chave] = { nome: `${mesesNomes[parseInt(pts[1])-1]} ${pts[2]}`, p: {}, trec: 0, tp: 0 };
                const v = fixVal(l.TOTAL);
                if (l.PAGAMENTO === 'PAGO') { grupos[chave].trec += v; }
                else {
                    if (!grupos[chave].p[l.EMPRESA]) grupos[chave].p[l.EMPRESA] = { total: 0, ids: [], chamados: [] };
                    grupos[chave].p[l.EMPRESA].total += v;
                    grupos[chave].p[l.EMPRESA].ids.push(l.id);
                    grupos[chave].p[l.EMPRESA].chamados.push(l);
                    grupos[chave].tp += v;
                }
            });
        
            container.innerHTML = `<h2 class="text-2xl font-black text-purple-400 italic uppercase">Fechamentos Inteligentes</h2>`;
            Object.keys(grupos).sort((a,b) => b-a).forEach(k => {
                const g = grupos[k];
                let html = `<div class="glass p-6 rounded-3xl mb-8 border-l-8 border-purple-600">
                    <div class="flex justify-between items-center mb-6">
                        <span class="font-black text-xl uppercase">${g.nome}</span>
                        <div class="text-right flex gap-8">
                            <div><span class="text-[9px] block text-slate-400">RECEBIDO</span><span class="text-emerald-400 font-black text-xl">${formatarParaDB(g.trec)}</span></div>
                            <div><span class="text-[9px] block text-slate-400">PENDENTE</span><span class="text-purple-400 font-black text-xl">${formatarParaDB(g.tp)}</span></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
                
                Object.keys(g.p).forEach(emp => {
                    const info = g.p[emp], conf = configs?.find(c => c.nome_empresa === emp);
                    html += `<div class="bg-black/20 p-5 rounded-2xl border border-white/5 flex flex-col justify-between">
                        <div>
                            <p class="font-black text-[10px] text-purple-500 mb-4 border-b border-white/10 pb-2 uppercase tracking-widest">${emp}</p>
                            <div class="space-y-1 mb-4">${info.chamados.map(c => `<div class="flex justify-between text-[9px] font-bold"><span class="text-slate-500">${c.DIA}</span><span class="text-slate-300">${c.TOTAL}</span></div>`).join('')}</div>
                            <p class="text-2xl font-black text-white italic mb-4">${formatarParaDB(info.total)}</p>
                        </div>
                        <button onclick="marcarComoPago([${info.ids}])" class="w-full py-2 bg-emerald-500/20 text-emerald-400 rounded-xl text-[10px] font-black uppercase hover:bg-emerald-500 hover:text-white transition-all">RECEBI PAGAMENTO</button>
                    </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }
        
        async function marcarComoPago(ids) {
            if(confirm("Confirmar pagamento recebido?")) {
                await supabaseClient.from('atendimentos').update({ PAGAMENTO: 'PAGO' }).in('id', ids);
                carregarFechamentoFinal();
            }
        }
        
        // --- DASHBOARD ---
        function popularFiltroAno() {
            const s = document.getElementById('filtroAnoDash');
            const anos = [...new Set(dadosCompletos.map(d => d.DIA.split('/')[2]))].sort((a,b) => b-a);
            s.innerHTML = anos.map(a => `<option value="${a}">${a}</option>`).join('');
        }
        
        function renderCharts() {
            const ano = document.getElementById('filtroAnoDash').value;
            const mes = document.getElementById('filtroMesDash').value;
            const filtrados = dadosCompletos.filter(d => {
                const pts = d.DIA.split('/');
                return pts[2] === ano && (mes === 'TODOS' || parseInt(pts[1]) === parseInt(mes));
            });
        
            const flux = new Array(12).fill(0), fluxGastos = new Array(12).fill(0), eMap = {};
            let [b, e, m, t, pago, pend] = [0, 0, 0, 0, 0, 0];
        
            filtrados.forEach(d => {
                const v = fixVal(d.TOTAL), pts = d.DIA.split('/'), mIdx = parseInt(pts[1]) - 1;
                if (d.TIPO === 'Entrada') {
                    flux[mIdx] += v; eMap[d.EMPRESA] = (eMap[d.EMPRESA] || 0) + v;
                    b += fixVal(d.VALOR); e += fixVal(d.EXTRA); m += fixVal(d.MATERIAL); t += fixVal(d.TRANSP);
                    if (d.PAGAMENTO === 'PAGO') pago += v; else pend += v;
                } else { fluxGastos[mIdx] += v; }
            });
        
            if (chart1) chart1.destroy();
            chart1 = new Chart(document.getElementById('chartFluxo'), {
                type: 'bar', data: { labels: mesesNomes, datasets: [{ label: 'Ganhos', data: flux, backgroundColor: '#10b981' }, { label: 'Gastos', data: fluxGastos, backgroundColor: '#ef4444' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } } }
            });
        
            if (chart2) chart2.destroy();
            const topEmp = Object.entries(eMap).sort((a,b) => b[1]-a[1]).slice(0, 5);
            chart2 = new Chart(document.getElementById('chartEmpresas'), {
                type: 'doughnut', data: { labels: topEmp.map(x => x[0]), datasets: [{ data: topEmp.map(x => x[1]), backgroundColor: ['#a855f7', '#10b981', '#f59e0b', '#3b82f6', '#ef4444'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } } }
            });
        
            if (chart3) chart3.destroy();
            chart3 = new Chart(document.getElementById('chartComposicao'), {
                type: 'polarArea', data: { labels: ['Base', 'Extra', 'Material', 'Transp'], datasets: [{ data: [b, e, m, t], backgroundColor: ['rgba(168, 85, 247, 0.5)', 'rgba(16, 185, 129, 0.5)', 'rgba(245, 158, 11, 0.5)', 'rgba(59, 130, 246, 0.5)'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } } }
            });
        
            if (chart4) chart4.destroy();
            chart4 = new Chart(document.getElementById('chartStatusPagamento'), {
                type: 'pie', data: { labels: ['Recebido', 'Pendente'], datasets: [{ data: [pago, pend], backgroundColor: ['#10b981', '#f59e0b'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } } }
            });
        }
        
        // --- NAVEGAÇÃO & MODAL ---
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            const ind = document.getElementById('tabIndicator');
            ind.style.width = btn.offsetWidth + 'px'; ind.style.left = btn.offsetLeft + 'px';
            if (id === 'fechamento') carregarFechamentoFinal();
            if (id === 'dashboard') renderCharts();
        }
        
        function abrirDetalhes(id) {
            itemSendoEditado = dadosCompletos.find(d => d.id === id);
            const b = document.getElementById('modalBody');
            b.innerHTML = `
                <div class="space-y-4">
                    <p><b class="text-purple-400">EMPRESA:</b> ${itemSendoEditado.EMPRESA}</p>
                    <p><b class="text-purple-400">LOCAL:</b> ${itemSendoEditado.Local}</p>
                    <p><b class="text-purple-400">RAT:</b> ${itemSendoEditado.RAT}</p>
                    <div class="bg-black/40 p-4 rounded-xl border border-white/5">
                        <p class="text-xs italic text-slate-400">"${itemSendoEditado.DESCRIÇÃO || 'Sem descrição'}"</p>
                    </div>
                    <p class="text-3xl font-black text-purple-400 mt-6">${itemSendoEditado.TOTAL}</p>
                </div>
            `;
            document.getElementById('modalDetalhes').style.display = 'block';
        }
        function fecharModal() { document.getElementById('modalDetalhes').style.display = 'none'; }
        
        // --- FORMULÁRIO ---
        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const d = document.getElementById('DIA').value.split('-'), vB = fixVal(document.getElementById('VALOR').value), vE = fixVal(document.getElementById('EXTRA').value), vM = fixVal(document.getElementById('MATERIAL').value), vT = fixVal(document.getElementById('TRANSP').value);
            const total = vB + vE + vM + vT;
            const payload = {
                TIPO: tipoAtual, DIA: `${d[2]}/${d[1]}/${d[0]}`, EMPRESA: document.getElementById('EMPRESA').value.toUpperCase(), INTERMÉDIO: document.getElementById('INTERMEDIO').value.toUpperCase(), Local: document.getElementById('Local').value.toUpperCase(), RAT: document.getElementById('RAT').value, DESCRIÇÃO: document.getElementById('DESCRICAO').value,
                VALOR: formatarParaDB(vB), EXTRA: formatarParaDB(vE), MATERIAL: formatarParaDB(vM), TRANSP: formatarParaDB(vT), TOTAL: formatarParaDB(total), PAGAMENTO: tipoAtual === 'Saída' ? 'SAÍDA' : 'NÃO PAGO', Mês: parseInt(d[1]), ANO: parseInt(d[0])
            };
            await supabaseClient.from('atendimentos').insert([payload]);
            location.reload();
        });
        
        window.onload = carregarLancamentos;
    </script>
</body>
</html>
