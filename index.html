    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: #f1f5f9; min-height: 100vh; position: relative; overflow-x: hidden; }

        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .logo-central { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%); width: 320px; height: 320px; background: url("1781706422626.png") no-repeat center; background-size: contain; filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.6)); }

        .glass { background: rgba(15, 23, 42, 0.45) !important; backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.12); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); }
        .btn-glass-purple { background: linear-gradient(135deg, rgba(168, 85, 247, 0.8), rgba(107, 33, 168, 0.8)); transition: 0.3s; }

        .tabs-container { position: relative; display: flex; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-indicator { position: absolute; height: calc(100% - 8px); top: 4px; left: 4px; border-radius: 12px; background: linear-gradient(135deg, #a855f7, #6b21a8); z-index: 1; }
        .tab-btn { position: relative; z-index: 2; transition: color 0.3s; }

        input, textarea, select { 
            background: rgba(15, 23, 42, 0.8) !important; 
            border: 1px solid rgba(168, 85, 247, 0.3) !important; 
            color: white !important; 
            border-radius: 12px !important;
        }

        .status-pago { border-left: 6px solid #10b981; }
        .status-naopago-tab { border-left: 6px solid #f97316; }
        .status-saida { border-left: 6px solid #ef4444; }
        .card-pendente-moldura { border: 2.5px solid #ef4444 !important; }

        .table-container { max-height: 60vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 10px; }

        #modalDetalhes { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .modal-card { max-height: 90vh; display: flex; flex-direction: column; width: 95%; max-width: 32rem; margin: auto; }
        .modal-body-scroll { overflow-y: auto; flex-grow: 1; padding: 1.5rem; }
        .circle-icon-btn { background: rgba(255, 255, 255, 0.15); border: 1.5px solid rgba(255, 255, 255, 0.5); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: white; transition: 0.2s; }
        .circle-icon-btn:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.05); }
        .circle-icon-btn.btn-delete:hover { background: rgba(239, 68, 68, 0.4); border-color: #ef4444; }
        .edit-input { width: 100%; border: 1px solid #a855f7 !important; padding: 10px; font-size: 14px; }
        
        /* Loading OCR */
        #loadingOCR { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

    <script>
        const SB_URL = "https://ctvnkjrpoyaancoxwles.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm5ranJwb3lhYW5jb3h3bGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDA2OTYsImV4cCI6MjA5NzIxNjY5Nn0.SSY-ys7ZC2wqOdprejhYILJUzdXZjWkZ8upocSGqaQ8";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let dadosCompletos = [], itemSendoEditado = null, editMode = false, tipoAtual = 'Entrada';
        let filtroFechamento = 'TODOS', chart1 = null, chart2 = null, chart3 = null, chart4 = null;
        let isAutoRAT = false; // Flag para diferenciar preview de edição
        const mesesNomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

        // --- FUNÇÕES DE UTILIDADE ---

        function fixVal(v) {
            if (!v) return 0;
            let str = v.toString().replace("R$", "").replace(/\s/g, "");
            if (str.includes(',') && str.includes('.')) { str = str.replace(/\./g, "").replace(",", "."); } 
            else { str = str.replace(",", "."); }
            return parseFloat(str) || 0;
        }

        function formatarParaDB(num) {
            return "R$ " + num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function exibirMoeda(v) {
            if (!v) return "R$ 0,00";
            let limpo = v.toString().replace("R$", "").trim();
            return "R$ " + limpo;
        }

        function normalizar(t) { return t ? t.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : ""; }

        // --- TAB INDICATOR ---
        function initTab() {
            setTimeout(() => {
                const btn = document.getElementById('btnTabLancamentos');
                const indicator = document.getElementById('tabIndicator');
                indicator.style.width = btn.offsetWidth + 'px';
                indicator.style.left = btn.offsetLeft + 'px';
            }, 500);
        }

        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            const indicator = document.getElementById('tabIndicator');
            indicator.style.width = btn.offsetWidth + 'px';
            indicator.style.left = btn.offsetLeft + 'px';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('text-white', 'text-slate-400'));
            btn.classList.replace('text-slate-400', 'text-white');
            if(tabId === 'fechamento') carregarFechamentoFinal(); 
            if(tabId === 'dashboard') renderCharts(); 
            if(tabId === 'lancamentos') carregarLancamentos();
        }

        function setTipo(t) {
            tipoAtual = t;
            document.getElementById('TIPO').value = t;
            const btnE = document.getElementById('btnEntrada');
            const btnS = document.getElementById('btnSaida');
            if(t === 'Entrada') {
                btnE.className = "flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white";
                btnS.className = "flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500";
            } else {
                btnS.className = "flex-1 py-2.5 rounded-xl font-black text-[10px] btn-glass-purple text-white";
                btnE.className = "flex-1 py-2.5 rounded-xl font-black text-[10px] bg-black/20 text-slate-500";
            }
        }

        // --- OCR / AUTO RAT LOGIC ---

        async function processarAutoRAT(input) {
            if (!input.files || !input.files[0]) return;
            document.getElementById('loadingOCR').style.display = 'flex';
            
            const file = input.files[0];
            let imageSource;

            try {
                if (file.type === 'application/pdf') {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const page = await pdf.getPage(1);
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    imageSource = canvas.toDataURL('image/png');
                } else {
                    imageSource = URL.createObjectURL(file);
                }

                const result = await Tesseract.recognize(imageSource, 'por', {
                    logger: m => console.log(m)
                });

                extrairDadosOCR(result.data.text);
            } catch (err) {
                alert("Erro ao processar documento: " + err.message);
                document.getElementById('loadingOCR').style.display = 'none';
            }
        }

        function extrairDadosOCR(texto) {
            console.log("Texto Extraído:", texto);
            // Regex básicas para encontrar padrões comuns em RATs
            const empresaMatch = texto.match(/(?:Empresa|Cliente|Razão Social):\s*(.*)/i);
            const ratMatch = texto.match(/(?:RAT|OS|Relatório|Nº):\s*(\d+)/i);
            const dataMatch = texto.match(/(\d{2}[\/|-]\d{2}[\/|-]\d{4})/);
            const localMatch = texto.match(/(?:Local|Cidade|Endereço):\s*(.*)/i);
            
            // Tentamos encontrar a descrição após palavras-chave
            const descMatch = texto.match(/(?:Serviços Realizados|Descrição|Atividade):\s*([\s\S]*?)(?:\n\n|Valor|Assinatura|$)/i);

            let dataFormatada = "";
            if (dataMatch) {
                const parts = dataMatch[0].replace(/-/g, '/').split('/');
                // Garante formato DD/MM/AAAA
                dataFormatada = `${parts[0].padStart(2,'0')}/${parts[1].padStart(2,'0')}/${parts[2]}`;
            }

            itemSendoEditado = {
                EMPRESA: empresaMatch ? empresaMatch[1].trim().toUpperCase() : "",
                RAT: ratMatch ? ratMatch[1].trim() : "",
                DIA: dataFormatada || new Date().toLocaleDateString('pt-BR'),
                Local: localMatch ? localMatch[1].trim().toUpperCase() : "",
                "DESCRIÇÃO": descMatch ? descMatch[1].trim() : "",
                VALOR: "R$ 0,00", EXTRA: "R$ 0,00", MATERIAL: "R$ 0,00", TRANSP: "R$ 0,00", TOTAL: "R$ 0,00",
                "INTERMÉDIO": "", TIPO: 'Entrada'
            };

            document.getElementById('loadingOCR').style.display = 'none';
            abrirPreviewAutoRAT();
        }

        function abrirPreviewAutoRAT() {
            isAutoRAT = true;
            editMode = true; // Já abre para correção
            renderizarModalBody();
            
            // Ajustes no Modal para o modo Preview
            document.getElementById('modalStatusText').innerText = "PRÉVIA DE LANÇAMENTO";
            document.getElementById('modalBtnDelete').style.display = "none";
            document.getElementById('modalBtnEdit').style.display = "none";
            document.getElementById('modalFooter').classList.remove('hidden');
            document.getElementById('modalConfirmBtn').innerText = "SALVAR NO BANCO";
            
            document.getElementById('modalDetalhes').style.display = "block";
        }

        // --- LANÇAMENTOS E MODAL ---

        async function carregarLancamentos() {
            const { data, error } = await supabaseClient.from('atendimentos').select('*').order('id', { ascending: false });
            if(!error) { 
                dadosCompletos = data; 
                renderizarTabela(data);
                popularFiltroAno();
            }
        }

        function renderizarTabela(dados) {
            const lista = document.getElementById('listaLancamentos'); lista.innerHTML = '';
            dados.forEach(d => {
                let status = d.TIPO === 'Saída' ? "status-saida" : (d.PAGAMENTO === 'PAGO' ? "status-pago" : "status-naopago-tab");
                lista.innerHTML += `<tr onclick="abrirDetalhesDeFila(${d.id})" class="hover:bg-white/5 cursor-pointer border-b border-white/5 transition-colors text-slate-300"><td class="p-5 ${status}"><div class="font-bold text-slate-100">${d.DIA}</div><div class="text-[9px] text-purple-400 font-bold uppercase">${d.HORA || ''}</div></td><td class="p-5"><div class="font-bold text-slate-200 uppercase leading-tight">${d.EMPRESA || '-'}</div><div class="text-[9px] text-purple-700 font-bold italic">${d.RAT || ''}</div></td><td class="p-5 text-right font-black ${d.TIPO === 'Saída' ? 'text-red-400' : 'text-emerald-400'}">${exibirMoeda(d.TOTAL)}</td></tr>`;
            });
        }

        function abrirDetalhesDeFila(id) {
            isAutoRAT = false;
            itemSendoEditado = dadosCompletos.find(x => x.id === id); 
            editMode = false;
            
            document.getElementById('modalStatusText').innerText = "DETALHES";
            document.getElementById('modalBtnDelete').style.display = "flex";
            document.getElementById('modalBtnEdit').style.display = "flex";
            document.getElementById('modalFooter').classList.add('hidden');
            document.getElementById('modalConfirmBtn').innerText = "Confirmar Alterações";
            
            renderizarModalBody();
            document.getElementById('modalDetalhes').style.display = "block";
        }

        function renderizarModalBody() {
            const item = itemSendoEditado; const body = document.getElementById('modalBody'); const head = document.getElementById('modalHeader');
            let colorClass = item.TIPO === 'Saída' ? 'bg-red-500/80' : (item.PAGAMENTO === 'PAGO' ? 'bg-emerald-600/80' : 'bg-orange-500/80');
            if(isAutoRAT) colorClass = 'bg-purple-600/90';

            head.className = `p-6 flex justify-between items-center text-white border-b border-white/10 sticky top-0 z-20 backdrop-blur-xl ${colorClass}`;
            
            body.innerHTML = `
                <div class="grid grid-cols-2 gap-4 uppercase border-b border-white/10 pb-4">
                    <div><label class="text-[9px] font-black text-purple-400">EMPRESA</label>${editMode ? `<input id="edit_empresa" class="edit-input" value="${item.EMPRESA || ''}">` : `<p class="font-black text-white text-base leading-tight">${item.EMPRESA || '-'}</p>`}</div>
                    <div><label class="text-[9px] font-black text-purple-400">RAT</label>${editMode ? `<input id="edit_rat" class="edit-input" value="${item.RAT || ''}">` : `<p class="font-black text-purple-500 italic text-base font-mono">${item.RAT || '-'}</p>`}</div>
                </div>
                <div class="grid grid-cols-2 gap-4 uppercase border-b border-white/10 pb-4">
                    <div><label class="text-[9px] font-black text-purple-400">INTERMÉDIO</label>${editMode ? `<input id="edit_inter" class="edit-input" value="${item["INTERMÉDIO"] || ''}">` : `<p class="font-bold text-slate-200 text-sm">${item["INTERMÉDIO"] || '-'}</p>`}</div>
                    <div><label class="text-[9px] font-black text-purple-400">LOCAL</label>${editMode ? `<input id="edit_local" class="edit-input" value="${item.Local || ''}">` : `<p class="font-bold text-slate-200 text-sm">${item.Local || '-'}</p>`}</div>
                </div>
                <div><label class="text-[9px] font-black text-purple-400 uppercase">Data</label>${editMode ? `<input id="edit_dia" class="edit-input" value="${item.DIA || ''}">` : `<p class="font-bold text-white text-sm">${item.DIA || '-'}</p>`}</div>
                <div><label class="text-[9px] font-black text-purple-400 uppercase">Descrição</label>${editMode ? `<textarea id="edit_desc" class="edit-input h-24">${item["DESCRIÇÃO"] || ''}</textarea>` : `<div class="bg-black/40 p-4 rounded-xl italic text-slate-400 text-xs border border-white/5 leading-relaxed">"${item["DESCRIÇÃO"] || '---'}"</div>`}</div>
                <div class="grid grid-cols-4 gap-2 text-center text-[8px] font-black uppercase">
                    <div class="bg-white/5 p-2 rounded-xl">Base<br>${editMode ? `<input id="edit_val" class="edit-input !p-1 text-center" value="${fixVal(item.VALOR)}">` : `<span class="text-white text-xs">${exibirMoeda(item.VALOR)}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Extra<br>${editMode ? `<input id="edit_extra" class="edit-input !p-1 text-center" value="${fixVal(item.EXTRA)}">` : `<span class="text-white text-xs">${exibirMoeda(item.EXTRA)}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Material<br>${editMode ? `<input id="edit_material" class="edit-input !p-1 text-center" value="${fixVal(item.MATERIAL)}">` : `<span class="text-white text-xs">${exibirMoeda(item.MATERIAL)}</span>`}</div>
                    <div class="bg-white/5 p-2 rounded-xl">Transp<br>${editMode ? `<input id="edit_transp" class="edit-input !p-1 text-center" value="${fixVal(item.TRANSP)}">` : `<span class="text-white text-xs">${exibirMoeda(item.TRANSP)}</span>`}</div>
                </div>
                <div class="btn-glass-purple p-6 rounded-3xl flex justify-between items-center text-white"><span class="text-[10px] font-black opacity-60">Total Líquido Estimado</span><span class="text-2xl font-black italic">${exibirMoeda(item.TOTAL)}</span></div>`;
        }

        async function salvarAlteracoes() {
            const v = fixVal(document.getElementById('edit_val').value), ex = fixVal(document.getElementById('edit_extra').value), al = fixVal(document.getElementById('edit_material').value), tr = fixVal(document.getElementById('edit_transp').value);
            const totalNum = v + ex + al + tr;
            
            const payload = { 
                EMPRESA: document.getElementById('edit_empresa').value.toUpperCase(), 
                RAT: document.getElementById('edit_rat').value, 
                "INTERMÉDIO": document.getElementById('edit_inter').value.toUpperCase(), 
                Local: document.getElementById('edit_local').value.toUpperCase(), 
                "DESCRIÇÃO": document.getElementById('edit_desc').value,
                DIA: document.getElementById('edit_dia').value,
                VALOR: formatarParaDB(v), EXTRA: formatarParaDB(ex), MATERIAL: formatarParaDB(al), TRANSP: formatarParaDB(tr), TOTAL: formatarParaDB(totalNum)
            };

            if (isAutoRAT) {
                // Insere Novo
                const dataParts = payload.DIA.split('/');
                payload.TIPO = 'Entrada';
                payload.PAGAMENTO = 'NÃO PAGO';
                payload.ANO = parseInt(dataParts[2]);
                payload.Mês = parseInt(dataParts[1]);
                
                const { error } = await supabaseClient.from('atendimentos').insert([payload]);
                if (!error) { fecharModal(); await carregarLancamentos(); } else alert("Erro ao salvar lançamento automático!");
            } else {
                // Atualiza Existente
                const { error } = await supabaseClient.from('atendimentos').update(payload).eq('id', itemSendoEditado.id);
                if (!error) { fecharModal(); await carregarLancamentos(); } else alert("Erro ao atualizar!");
            }
        }

        function toggleEditMode() { editMode = !editMode; document.getElementById('modalFooter').classList.toggle('hidden', !editMode); renderizarModalBody(); }
        function fecharModal() { document.getElementById('modalDetalhes').style.display = "none"; editMode = false; isAutoRAT = false; }
        async function deletarLancamento() { if(confirm("Deseja realmente excluir este lançamento?")) { const { error } = await supabaseClient.from('atendimentos').delete().eq('id', itemSendoEditado.id); if(!error) { fecharModal(); await carregarLancamentos(); } else { alert("Erro ao excluir!"); } } }

        // --- DASHBOARD E FECHAMENTO (Restante das funções originais) ---
        function filtrarLancamentos() { const t = normalizar(document.getElementById('inputBusca').value); renderizarTabela(dadosCompletos.filter(d => normalizar(d.DIA).includes(t) || normalizar(d.EMPRESA).includes(t) || normalizar(d.RAT).includes(t) || normalizar(d.Local).includes(t) || normalizar(d["INTERMÉDIO"]).includes(t) || d.TOTAL.toString().includes(t))); }
        function popularFiltroAno() { const selectAno = document.getElementById('filtroAnoDash'); if(selectAno.options.length > 0) return; const anosUnicos = new Set(); dadosCompletos.forEach(d => { if (!d.DIA) return; let ano = d.DIA.includes('-') ? d.DIA.split('-')[0] : d.DIA.split('/')[2]; if (ano) anosUnicos.add(ano); }); const anos = Array.from(anosUnicos).sort((a,b) => b-a); anos.forEach(ano => { let opt = document.createElement('option'); opt.value = ano; opt.innerText = ano; selectAno.appendChild(opt); }); if(anos.length > 0) selectAno.value = anos[0]; }
        
        async function carregarFechamentoFinal() {
            const container = document.getElementById('tab-fechamento'); container.innerHTML = '<div class="p-20 text-center animate-pulse uppercase font-black text-purple-500">Mapeando histórico...</div>';
            const { data: lancamentos } = await supabaseClient.from('atendimentos').select('*').eq('TIPO', 'Entrada').order('id', { ascending: false });
            const { data: configs } = await supabaseClient.from('empresas_config').select('*');
            const grupos = {};
            lancamentos.forEach(l => {
                if(!l.DIA) return;
                let dia, mes, ano;
                if (l.DIA.includes('-')) { const pts = l.DIA.split('-'); ano = pts[0]; mes = pts[1]; dia = pts[2]; } 
                else { const pts = l.DIA.split('/'); dia = pts[0]; mes = pts[1]; ano = pts[2]; }
                if(!ano || !mes) return;
                const chaveSort = `${ano}${mes.toString().padStart(2, '0')}`; 
                const chaveNome = `${ano} - ${mesesNomes[parseInt(mes)-1]}`;
                if(!grupos[chaveSort]) grupos[chaveSort] = { nome: chaveNome, p: {}, pagos: [], tp: 0, trec: 0 };
                const v = fixVal(l.TOTAL);
                if(l.PAGAMENTO !== 'PAGO') {
                    const emp = l.EMPRESA || 'Outros'; 
                    if(!grupos[chaveSort].p[emp]) grupos[chaveSort].p[emp] = { total: 0, chamados: [], ids: [] };
                    grupos[chaveSort].p[emp].total += v; grupos[chaveSort].p[emp].chamados.push(l); grupos[chaveSort].p[emp].ids.push(l.id); grupos[chaveSort].tp += v;
                } else { grupos[chaveSort].pagos.push(l); grupos[chaveSort].trec += v; }
            });

            let headerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-end md:items-center border-b border-white/10 pb-6 gap-6">
                    <h2 class="text-2xl font-black text-purple-400 italic uppercase tracking-tighter">Fechamentos Inteligentes</h2>
                    <div class="flex bg-black/40 p-1.5 rounded-2xl border border-white/5">
                        <button onclick="filterFechamento('TODOS')" class="px-6 py-2 rounded-xl text-[10px] font-black transition-all ${filtroFechamento === 'TODOS' ? 'btn-glass-purple text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}">TODOS</button>
                        <button onclick="filterFechamento('PENDENTES')" class="px-6 py-2 rounded-xl text-[10px] font-black transition-all ${filtroFechamento === 'PENDENTES' ? 'btn-glass-purple text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}">PENDENTES</button>
                        <button onclick="filterFechamento('PAGOS')" class="px-6 py-2 rounded-xl text-[10px] font-black transition-all ${filtroFechamento === 'PAGOS' ? 'btn-glass-purple text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}">PAGOS</button>
                    </div>
                </div>`;
            container.innerHTML = headerHTML;
            Object.keys(grupos).sort((a,b) => b - a).forEach(mKey => {
                const g = grupos[mKey];
                const temPendentes = Object.keys(g.p).length > 0;
                const temPagos = g.pagos.length > 0;
                if ((filtroFechamento === 'PENDENTES' && !temPendentes) || (filtroFechamento === 'PAGOS' && !temPagos)) return;
                let htmlMês = `<div class="space-y-8 mt-12">
                    <div class="glass p-6 rounded-3xl border-l-8 border-purple-600 flex flex-col md:flex-row justify-between items-center shadow-2xl gap-4">
                        <div><h3 class="text-sm font-black text-slate-100 uppercase tracking-widest">${g.nome}</h3></div>
                        <div class="flex gap-10 text-right">
                            <div><span class="text-[9px] font-bold text-slate-400 uppercase block">Recebido</span><span class="text-lg md:text-2xl font-black text-emerald-400 italic">${formatarParaDB(g.trec)}</span></div>
                            <div><span class="text-[9px] font-bold text-slate-400 uppercase block">Pendente</span><span class="text-lg md:text-2xl font-black text-purple-400 italic">${formatarParaDB(g.tp)}</span></div>
                        </div>
                    </div>`;
                if (filtroFechamento !== 'PAGOS' && temPendentes) {
                    htmlMês += `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">`;
                    Object.keys(g.p).forEach(e => {
                        const info = g.p[e], c = configs?.find(x => x.nome_empresa === e);
                        htmlMês += `<div class="glass p-6 rounded-3xl card-pendente-moldura flex flex-col justify-between shadow-xl">
                            <div><h4 class="font-black text-white text-[10px] uppercase mb-4 border-b border-white/10 pb-2 tracking-widest">${e}</h4>
                            <div class="space-y-2 mb-6">${info.chamados.map(i => `<div class="flex justify-between items-start text-[9px] border-b border-white/5 pb-1"><div class="text-slate-400 font-bold">${i.DIA}</div><div class="font-black text-white italic">${exibirMoeda(i.TOTAL)}</div></div>`).join('')}</div></div>
                            <div><div class="flex justify-between items-center mb-4 px-2"><span class="text-[9px] font-black text-red-500 uppercase">Total:</span><span class="text-xl font-black text-purple-400 italic">${formatarParaDB(info.total)}</span></div>
                            <button onclick="marcarComoPago([${info.ids}])" class="w-full bg-emerald-500/20 border border-emerald-500/50 text-emerald-400 py-2 rounded-xl text-[9px] font-black uppercase hover:bg-emerald-500 hover:text-white transition-all mb-4">RECEBI PAGAMENTO</button>
                            <div class="text-[8px] text-slate-500 bg-black/40 p-3 rounded-2xl border border-white/5 space-y-1 text-left font-bold uppercase">
                                <p>📧 Email: <span class="text-white">${c?.email_fechamento || '---'}</span></p>
                                <p>⏳ Prazo: <span class="text-white">${c?.prazo_envio || '---'}</span></p>
                                <p>🛠️ Proc. Extra: <span class="text-white">${c?.procedimento_extra || '---'}</span></p>
                            </div></div></div>`;
                    });
                    htmlMês += `</div>`;
                }
                if (filtroFechamento !== 'PENDENTES' && temPagos) {
                    htmlMês += `<div class="w-full bg-emerald-500/5 rounded-3xl p-8 border border-emerald-500/10 mt-6"><div class="flex justify-between items-center mb-6 uppercase border-b border-emerald-500/20 pb-4">
                            <h5 class="text-[11px] font-black text-emerald-500 italic tracking-widest flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>Histórico de Recebimentos</h5>
                            <span class="text-[10px] font-black text-emerald-600 italic">Mês Liquidado: ${formatarParaDB(g.trec)}</span></div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-x-8 gap-y-4">${g.pagos.map(p => `<div class="flex justify-between items-center text-[10px] border-b border-white/5 pb-2 hover:bg-white/5 transition-colors px-2"><span class="font-bold text-slate-400 uppercase truncate mr-2">${p.EMPRESA}</span><span class="font-black text-emerald-400 italic whitespace-nowrap">${exibirMoeda(p.TOTAL)}</span></div>`).join('')}</div></div>`;
                }
                htmlMês += `</div>`; container.innerHTML += htmlMês;
            });
        }

        async function marcarComoPago(ids) { if(confirm("Confirmar recebimento?")) { await supabaseClient.from('atendimentos').update({ PAGAMENTO: 'PAGO' }).in('id', ids); await carregarFechamentoFinal(); } }
        
        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dpts = document.getElementById('DIA').value.split('-');
            const payload = {
                TIPO: tipoAtual, DIA: `${dpts[2]}/${dpts[1]}/${dpts[0]}`, EMPRESA: document.getElementById('EMPRESA').value.toUpperCase(), "INTERMÉDIO": document.getElementById('INTERMEDIO').value.toUpperCase(), Local: document.getElementById('Local').value.toUpperCase(), RAT: document.getElementById('RAT').value, "DESCRIÇÃO": document.getElementById('DESCRICAO').value,
                VALOR: formatarParaDB(fixVal(document.getElementById('VALOR').value)), EXTRA: formatarParaDB(fixVal(document.getElementById('EXTRA').value)), MATERIAL: formatarParaDB(fixVal(document.getElementById('MATERIAL').value)), TRANSP: formatarParaDB(fixVal(document.getElementById('TRANSP').value)), PAGAMENTO: tipoAtual === 'Saída' ? 'SAÍDA' : 'NÃO PAGO', "Mês": parseInt(dpts[1]), "ANO": parseInt(dpts[0])
            };
            payload.TOTAL = formatarParaDB(fixVal(document.getElementById('VALOR').value) + fixVal(document.getElementById('EXTRA').value) + fixVal(document.getElementById('MATERIAL').value) + fixVal(document.getElementById('TRANSP').value));
            const { error } = await supabaseClient.from('atendimentos').insert([payload]);
            if(!error) location.reload(); else alert("Erro!");
        });

        async function renderCharts() {
            const anoSel = document.getElementById('filtroAnoDash').value;
            const mesSel = document.getElementById('filtroMesDash').value;
            const { data } = await supabaseClient.from('atendimentos').select('*');
            if(!data) return;
            if(chart1) chart1.destroy(); if(chart2) chart2.destroy(); if(chart3) chart3.destroy(); if(chart4) chart4.destroy();
            let labels = [], ganhos = [], gastos = [], eMap = {};
            let compBase = 0, compExtra = 0, compMaterial = 0, compTransp = 0;
            let statusPago = 0, statusPendente = 0;
            if (mesSel === 'TODOS') {
                labels = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
                ganhos = new Array(12).fill(0); gastos = new Array(12).fill(0);
                data.forEach(d => { if (!d.DIA) return; let dAno = d.DIA.includes('-') ? d.DIA.split('-')[0] : d.DIA.split('/')[2]; let dMes = parseInt(d.DIA.includes('-') ? d.DIA.split('-')[1] : d.DIA.split('/')[1]); if(dAno == anoSel) { const mIdx = dMes - 1; const vTotal = fixVal(d.TOTAL); if(d.TIPO === 'Entrada') { ganhos[mIdx] += vTotal; eMap[d.EMPRESA] = (eMap[d.EMPRESA] || 0) + vTotal; compBase += fixVal(d.VALOR); compExtra += fixVal(d.EXTRA); compMaterial += fixVal(d.MATERIAL); compTransp += fixVal(d.TRANSP); if(d.PAGAMENTO === 'PAGO') statusPago += vTotal; else statusPendente += vTotal; } else { gastos[mIdx] += vTotal; } } });
            } else {
                const diasNoMes = new Date(anoSel, mesSel, 0).getDate();
                labels = Array.from({length: diasNoMes}, (_, i) => i + 1); ganhos = new Array(diasNoMes).fill(0); gastos = new Array(diasNoMes).fill(0);
                data.forEach(d => { if (!d.DIA) return; let dAno = d.DIA.includes('-') ? d.DIA.split('-')[0] : d.DIA.split('/')[2]; let dMes = parseInt(d.DIA.includes('-') ? d.DIA.split('-')[1] : d.DIA.split('/')[1]); let dDia = parseInt(d.DIA.includes('-') ? d.DIA.split('-')[2] : d.DIA.split('/')[0]); if(dAno == anoSel && dMes == mesSel) { const dIdx = dDia - 1; const vTotal = fixVal(d.TOTAL); if(d.TIPO === 'Entrada') { ganhos[dIdx] += vTotal; eMap[d.EMPRESA] = (eMap[d.EMPRESA] || 0) + vTotal; compBase += fixVal(d.VALOR); compExtra += fixVal(d.EXTRA); compMaterial += fixVal(d.MATERIAL); compTransp += fixVal(d.TRANSP); if(d.PAGAMENTO === 'PAGO') statusPago += vTotal; else statusPendente += vTotal; } else { gastos[dIdx] += vTotal; } } });
            }
            chart1 = new Chart(document.getElementById('chartFluxo').getContext('2d'), { type: 'bar', data: { labels: labels, datasets: [{ label: 'Ganhos', data: ganhos, backgroundColor: '#10b981', borderRadius: 6 }, { label: 'Gastos', data: gastos, backgroundColor: '#ef4444', borderRadius: 6 }]}, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#f1f5f9' } } } } });
            const topEmp = Object.entries(eMap).sort((a,b) => b[1]-a[1]).slice(0, 7);
            chart2 = new Chart(document.getElementById('chartEmpresas').getContext('2d'), { type: 'doughnut', data: { labels: topEmp.map(x => x[0]), datasets: [{ data: topEmp.map(x => x[1]), backgroundColor: ['#a855f7', '#10b981', '#f59e0b', '#ef4444', '#3b82f6', '#ec4899', '#06b6d4'], borderWidth: 0 }]}, options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'TOP EMPRESAS (R$)', color: '#a855f7' }, legend: { position: 'bottom', labels: { color: '#f1f5f9', font: { size: 9 } } } } } });
            chart3 = new Chart(document.getElementById('chartComposicao').getContext('2d'), { type: 'polarArea', data: { labels: ['Base', 'Extra', 'Material', 'Transp'], datasets: [{ data: [compBase, compExtra, compMaterial, compTransp], backgroundColor: ['rgba(168, 85, 247, 0.7)', 'rgba(16, 185, 129, 0.7)', 'rgba(245, 158, 11, 0.7)', 'rgba(59, 130, 246, 0.7)'], borderWidth: 0 }]}, options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'COMPOSIÇÃO DO FATURAMENTO', color: '#a855f7' }, legend: { position: 'bottom', labels: { color: '#f1f5f9', font: { size: 10 } } } }, scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false } } } } });
            chart4 = new Chart(document.getElementById('chartStatusPagamento').getContext('2d'), { type: 'pie', data: { labels: ['Recebido (Pago)', 'Pendente'], datasets: [{ data: [statusPago, statusPendente], backgroundColor: ['#10b981', '#f59e0b'], borderWidth: 0 }]}, options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'SAÚDE DOS RECEBÍVEIS', color: '#a855f7' }, legend: { position: 'bottom', labels: { color: '#f1f5f9', font: { size: 10 } } } } } });
        }

        window.onload = () => {
            carregarLancamentos();
            initTab();
        };
    </script>
