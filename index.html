<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento Financeiro - Técnico</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .entrada-row { border-left: 4px solid #10b981; }
        .saida-row { border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <!-- Header -->
    <header class="bg-indigo-700 text-white p-6 shadow-md mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">GERENCIAMENTO FINANCEIRO</h1>
            <span class="bg-indigo-800 px-3 py-1 rounded text-sm">Dashboard Técnico</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Formulário (Lateral) -->
        <section class="lg:col-span-1">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 sticky top-4">
                <h2 class="text-xl font-bold mb-4 text-slate-800">Novo Registro</h2>
                <form id="formAtendimento" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600">Tipo de Lançamento</label>
                        <select id="TIPO" class="w-full border-slate-300 rounded-lg p-2 bg-slate-50 border focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="Entrada">Entrada (Atendimento)</option>
                            <option value="Saída">Saída (Gasto/Mensalidade)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-sm font-medium text-slate-600">Data</label>
                            <input type="date" id="DIA" class="w-full border rounded-lg p-2 text-sm border-slate-300" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600">Hora</label>
                            <input type="text" id="HORA" placeholder="09:00 às 11:00" class="w-full border rounded-lg p-2 text-sm border-slate-300">
                        </div>
                    </div>

                    <input type="text" id="EMPRESA" placeholder="Empresa / Cliente" class="w-full border rounded-lg p-2 border-slate-300">
                    <input type="text" id="Local" placeholder="Local da Unidade" class="w-full border rounded-lg p-2 border-slate-300">
                    <input type="text" id="RAT" placeholder="Número RAT / OS" class="w-full border rounded-lg p-2 border-slate-300">
                    
                    <textarea id="DESCRICAO" placeholder="Descrição breve do serviço..." rows="3" class="w-full border rounded-lg p-2 border-slate-300 text-sm"></textarea>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-sm font-medium text-slate-600">Valor R$</label>
                            <input type="number" step="0.01" id="VALOR" value="0" class="w-full border rounded-lg p-2 border-slate-300 calc-total">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600">Transp/Extra R$</label>
                            <input type="number" step="0.01" id="EXTRA" value="0" class="w-full border rounded-lg p-2 border-slate-300 calc-total">
                        </div>
                    </div>

                    <div class="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                        <span class="text-sm text-indigo-600 font-bold uppercase">Total Estimado</span>
                        <p id="displayTotal" class="text-2xl font-black text-indigo-800 text-right">R$ 0,00</p>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-indigo-200">
                        Salvar no Banco
                    </button>
                </form>
            </div>
        </section>

        <!-- Tabela (Principal) -->
        <section class="lg:col-span-2">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                    <h2 class="font-bold text-slate-700 uppercase tracking-wider text-sm">Histórico Recente</h2>
                    <button onclick="carregarDados()" class="text-indigo-600 text-sm hover:underline">Atualizar Lista</button>
                </div>
                <div class="overflow-x-auto max-h-[700px] overflow-y-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-slate-100 text-slate-600 uppercase text-xs sticky top-0">
                            <tr>
                                <th class="p-4">Data/Hora</th>
                                <th class="p-4">Empresa/Local</th>
                                <th class="p-4">Descrição</th>
                                <th class="p-4">Total</th>
                            </tr>
                        </thead>
                        <tbody id="listaAtendimentos" class="divide-y divide-slate-100">
                            <!-- Linhas carregadas aqui -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const SB_URL = "https://ctvnkjrpoyaancoxwles.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm5ranJwb3lhYW5jb3h3bGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDA2OTYsImV4cCI6MjA5NzIxNjY5Nn0.SSY-ys7ZC2wqOdprejhYILJUzdXZjWkZ8upocSGqaQ8";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // CÁLCULO DE TOTAL EM TEMPO REAL
        const inputsTotal = document.querySelectorAll('.calc-total');
        inputsTotal.forEach(input => {
            input.addEventListener('input', () => {
                const v = parseFloat(document.getElementById('VALOR').value) || 0;
                const e = parseFloat(document.getElementById('EXTRA').value) || 0;
                document.getElementById('displayTotal').innerText = `R$ ${(v + e).toFixed(2)}`;
            });
        });

        // CARREGAR DADOS DO BANCO
        async function carregarDados() {
            const lista = document.getElementById('listaAtendimentos');
            lista.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400">Carregando dados...</td></tr>';

            const { data, error } = await supabaseClient
                .from('atendimentos')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            lista.innerHTML = '';
            data.forEach(item => {
                const tipoClasse = item.TIPO === 'Saída' ? 'saida-row text-red-600' : 'entrada-row text-emerald-600';
                lista.innerHTML += `
                    <tr class="${item.TIPO === 'Saída' ? 'bg-red-50/30' : 'bg-emerald-50/30'} hover:bg-slate-50 transition">
                        <td class="p-4 font-medium border-l-4 ${tipoClasse}">
                            ${item.DIA || '-'}<br>
                            <span class="text-xs text-slate-400">${item.HORA || ''}</span>
                        </td>
                        <td class="p-4">
                            <span class="font-bold text-slate-700">${item.EMPRESA || 'N/A'}</span><br>
                            <span class="text-xs text-slate-500">${item.Local || ''}</span>
                        </td>
                        <td class="p-4 text-slate-500 max-w-xs truncate" title="${item['DESCRIÇÃO']}">
                            ${item['DESCRIÇÃO'] || ''}
                        </td>
                        <td class="p-4 font-bold">
                            R$ ${item.TOTAL || '0,00'}
                        </td>
                    </tr>
                `;
            });
        }

        // SALVAR NOVO REGISTRO
        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const valor = parseFloat(document.getElementById('VALOR').value) || 0;
            const extra = parseFloat(document.getElementById('EXTRA').value) || 0;
            const dataInput = document.getElementById('DIA').value; // YYYY-MM-DD
            
            const novoRegistro = {
                TIPO: document.getElementById('TIPO').value,
                DIA: dataInput.split('-').reverse().join('/'), // Converte para DD/MM/YYYY
                HORA: document.getElementById('HORA').value,
                EMPRESA: document.getElementById('EMPRESA').value,
                Local: document.getElementById('Local').value,
                RAT: document.getElementById('RAT').value,
                "DESCRIÇÃO": document.getElementById('DESCRICAO').value,
                VALOR: valor.toFixed(2),
                EXTRA: extra.toFixed(2),
                TOTAL: (valor + extra).toFixed(2),
                PAGAMENTO: "PENDENTE",
                "Mês": new Date(dataInput).getMonth() + 1,
                "ANO": new Date(dataInput).getFullYear()
            };

            const { error } = await supabaseClient.from('atendimentos').insert([novoRegistro]);

            if (error) {
                alert("Erro ao salvar: " + error.message);
            } else {
                alert("Lançamento realizado com sucesso!");
                document.getElementById('formAtendimento').reset();
                document.getElementById('displayTotal').innerText = "R$ 0,00";
                carregarDados();
            }
        });

        // Iniciar carregamento
        carregarDados();
    </script>
</body>
</html>
